Giải thích: Điều trị nền tảng cho viêm màng ngoài tim cấp vô căn hoặc liên quan đến bệnh hệ thống là thuốc chống viêm. NSAIDs (như Ibuprofen, Indomethacin) ở liều chống viêm cao là lựa chọn đầu tay. Colchicine thường được thêm vào để giảm nguy cơ tái phát. Corticoid được dành cho những trường hợp không đáp ứng hoặc có chống chỉ định với NSAIDs.
Tại sao các lựa chọn khác là sai:
A: Thuốc chống đông bị chống chỉ định trong viêm màng ngoài tim cấp vì có thể gây tràn máu màng ngoài tim.
B: Thuốc ức chế men chuyển không có vai trò trong điều trị cấp tính.
D: Phẫu thuật chỉ được chỉ định cho các trường hợp tái phát, co thắt hoặc có biến chứng nặng.
Câu 4:
Sự xuất hiện của biến chứng ép tim cấp sẽ được gợi ý bởi dấu hiệu lâm sàng nào sau đây?
A. Tiếng T2 tách đôi
B. Tam chứng Beck (hạ huyết áp, tĩnh mạch cổ nổi, tiếng tim mờ)
C. Mạch nảy mạnh, chìm sâu (Corrigan's pulse)
D. Tăng huyết áp
Đáp án: B
Giải thích: Tam chứng Beck là bộ ba dấu hiệu kinh điển của ép tim cấp, một tình trạng cấp cứu y khoa. Nó bao gồm: 1) Hạ huyết áp do giảm cung lượng tim, 2) Tĩnh mạch cổ nổi do tăng áp lực đổ đầy thất phải, và 3) Tiếng tim mờ do lớp dịch ngăn cản sự truyền âm thanh.
Tại sao các lựa chọn khác là sai:
A: Tiếng T2 tách đôi là một dấu hiệu sinh lý hoặc liên quan đến các bệnh lý khác (ví dụ, block nhánh phải).
C: Mạch Corrigan là đặc trưng của hở van động mạch chủ nặng.
D: Ép tim cấp gây hạ huyết áp, không phải tăng huyết áp.

TÌNH HUỐNG LÂM SÀNG 42
Một người đàn ông 60 tuổi, tiền sử hút thuốc lá, đến khám vì sưng đau đối xứng các khớp nhỏ ở bàn tay và cổ tay, kèm theo đau dọc xương chày hai bên. Khám lâm sàng, ngoài biểu hiện viêm khớp, bệnh nhân có ngón tay dùi trống rõ.
Câu 1:
Sự kết hợp của viêm đa khớp, đau xương dài và ngón tay dùi trống gợi ý mạnh mẽ đến hội chứng nào?
A. Hội chứng Felty
B. Hội chứng Pierre-Marie-Bamberger (bệnh xương khớp phì đại)
C. Hội chứng Reiter
D. Hội chứng Turner
Đáp án: B
Giải thích: Hội chứng Pierre-Marie-Bamberger, hay bệnh xương khớp phì đại (Hypertrophic Osteoarthropathy), là một hội chứng cận ung thư đặc trưng bởi bộ ba: 1) Viêm đa khớp giống VKDT, 2) Ngón tay dùi trống, và 3) Phản ứng màng xương gây đau xương dài. Ở người lớn, nguyên nhân phổ biến nhất là một khối u trong lồng ngực, đặc biệt là ung thư phổi.
Tại sao các lựa chọn khác là sai:
A: Hội chứng Felty gồm VKDT, lách to, và giảm bạch cầu trung tính.
C: Hội chứng Reiter gồm viêm khớp, viêm niệu đạo và viêm kết mạc.
D: Hội chứng Turner là một rối loạn di truyền ở nữ giới.
Câu 2:
Với chẩn đoán nghi ngờ ở trên, bước chẩn đoán tiếp theo cần thiết nhất là gì?
A. Chụp X-quang bàn tay
B. Xét nghiệm yếu tố dạng thấp (RF)
C. Chụp X-quang ngực thẳng
D. Sinh thiết màng hoạt dịch
Đáp án: C
Giải thích: Vì bệnh xương khớp phì đại ở người lớn thường là một hội chứng cận ung thư liên quan đến bệnh lý trong lồng ngực (phổ biến nhất là ung thư phổi không tế bào nhỏ), bước chẩn đoán quan trọng nhất là phải khảo sát lồng ngực. Chụp X-quang ngực thẳng là bước đầu tiên, đơn giản và hiệu quả để tìm kiếm các khối u ở phổi hoặc trung thất.
Tại sao các lựa chọn khác là sai:
A, B, D: Các xét nghiệm này tập trung vào chẩn đoán bệnh tại khớp, trong khi nguyên nhân gốc rễ của hội chứng này thường nằm ở phổi.
Câu 3:
Chụp X-quang xương chày của bệnh nhân này có khả năng cho thấy hình ảnh gì?
A. Bào mòn xương
B. Gãy xương bệnh lý
C. Phản ứng màng xương nhiều lớp, đối xứng
D. Mất khoáng đầu xương
Đáp án: C
Giải thích: Một trong những đặc điểm X-quang kinh điển của bệnh xương khớp phì đại là phản ứng màng xương. Nó biểu hiện dưới dạng một đường cản quang mới, song song với vỏ xương của các xương dài (như xương chày, xương quay), thường có nhiều lớp giống "vỏ hành" và đối xứng hai bên.
Tại sao các lựa chọn khác là sai:
A, D: Là các dấu hiệu của VKDT.
B: Gãy xương bệnh lý có thể xảy ra do di căn xương nhưng không phải là đặc điểm của hội chứng này.
Câu 4:
Hướng điều trị hiệu quả nhất cho các triệu chứng khớp của bệnh nhân này là gì?
A. Điều trị bằng Methotrexate
B. Điều trị nguyên nhân nền (ví dụ, phẫu thuật cắt bỏ khối u phổi)
C. Dùng NSAIDs liều cao kéo dài
D. Tiêm corticoid nội khớp
Đáp án: B
Giải thích: Các triệu chứng khớp và xương trong hội chứng cận ung thư này thường thuyên giảm một cách ngoạn mục, thậm chí biến mất hoàn toàn, sau khi điều trị thành công khối u nguyên phát. Do đó, việc tìm và điều trị nguyên nhân nền là hướng đi quan trọng nhất. Các biện pháp điều trị triệu chứng tại khớp chỉ là tạm thời.
Tại sao các lựa chọn khác là sai:
A, C, D: Các phương pháp này chỉ giúp giảm triệu chứng tạm thời mà không giải quyết được gốc rễ của vấn đề.

TÌNH HUỐNG LÂM SÀNG 43
Một phụ nữ 50 tuổi bị VKDT 10 năm, đã điều trị bằng nhiều loại DMARDs nhưng bệnh vẫn hoạt động. Bà đến khám vì đau nhiều khớp, mệt mỏi và sụt cân. Khám thấy có hội chứng Cushing (mặt tròn, bướu trâu, rạn da tím). Bà thừa nhận đã tự ý mua và sử dụng một loại "thuốc nam gia truyền" dạng viên hoàn trong nhiều tháng qua để giảm đau.
Câu 1:
Nguyên nhân có khả năng nhất gây ra hội chứng Cushing ở bệnh nhân này là gì?
A. Bệnh Cushing (u tuyến yên tiết ACTH)
B. U tuyến thượng thận
C. Sử dụng thuốc đông y có trộn trộm glucocorticoid ngoại sinh
D. Hội chứng tiết ACTH lạc chỗ
Đáp án: C
Giải thích: Hội chứng Cushing do thuốc là nguyên nhân phổ biến nhất của tình trạng thừa cortisol. Ở bệnh nhân có bệnh khớp mạn tính, việc tự ý sử dụng các loại thuốc không rõ nguồn gốc (thuốc gia truyền, thuốc tễ, viên hoàn) có nguy cơ rất cao chứa glucocorticoid (như dexamethasone, prednisone) được trộn trái phép. Các thuốc này giúp giảm đau, chống viêm nhanh chóng nhưng gây ra các tác dụng phụ nghiêm trọng khi dùng kéo dài.
Tại sao các lựa chọn khác là sai:
A, B, D: Đây là các nguyên nhân nội sinh của hội chứng Cushing, ít phổ biến hơn nhiều so với nguyên nhân do thuốc và không có yếu tố gợi ý trong bệnh sử.
Câu 2:
Nếu bệnh nhân ngừng đột ngột loại "thuốc nam" này, biến chứng cấp tính nào có nguy cơ xảy ra cao nhất?
A. Cơn bão giáp
B. Cơn tăng huyết áp
C. Suy thượng thận cấp 
D. Cơn hạ đường huyết
Đáp án: C
Giải thích: Việc sử dụng glucocorticoid ngoại sinh kéo dài sẽ ức chế trục hạ đồi - tuyến yên - thượng thận (HPA), làm cho tuyến thượng thận của bệnh nhân bị teo và không còn khả năng tự sản xuất cortisol. Nếu ngừng thuốc đột ngột, cơ thể sẽ rơi vào tình trạng thiếu hụt cortisol trầm trọng, dẫn đến suy thượng thận cấp, một tình trạng cấp cứu đe dọa tính mạng với các triệu chứng như tụt huyết áp, buồn nôn, nôn, đau bụng, và rối loạn ý thức.
Tại sao các lựa chọn khác là sai:
A: Cơn bão giáp liên quan đến cường giáp.
B: Ngừng corticoid thường gây hạ huyết áp.
D: Ngừng corticoid có thể gây hạ đường huyết, nhưng suy thượng thận cấp với trụy tim mạch là biến chứng đáng lo ngại nhất.
Câu 3:
Bệnh nhân cần được giảm đau cho đợt cấp VKDT hiện tại. Lựa chọn nào sau đây là phù hợp và an toàn nhất?
A. Cho một loại NSAID mạnh
B. Tiếp tục cho một liều glucocorticoid sinh lý và giảm dần có kiểm soát
C. Dùng Colchicine
D. Dùng thuốc giảm đau opioid
Đáp án: B
Giải thích: Do bệnh nhân đã bị phụ thuộc vào corticoid và trục HPA bị ức chế, không thể ngừng thuốc đột ngột. Hướng xử trí đúng là chuyển bệnh nhân sang một loại glucocorticoid chuẩn (như Prednisone hoặc Hydrocortisone) với liều tương đương hoặc liều sinh lý để tránh suy thượng thận cấp, sau đó giảm liều một cách cực kỳ từ từ dưới sự theo dõi của bác sĩ. Liều này cũng sẽ giúp kiểm soát triệu chứng viêm khớp.
Tại sao các lựa chọn khác là sai:
A: NSAIDs có thể gây hại cho dạ dày và thận, và không giải quyết được vấn đề suy thượng thận.
C: Colchicine dùng cho bệnh Gout.
D: Opioid chỉ giảm đau, không chống viêm và có nguy cơ lệ thuộc.
Câu 4:
Để đánh giá mức độ ức chế trục HPA, xét nghiệm nào sau đây có thể được chỉ định?
A. Nồng độ TSH huyết thanh
B. Nồng độ Cortisol máu buổi sáng
C. Nồng độ Aldosterone máu
D. Nồng độ Calcitonin
Đáp án: B
Giải thích: Nồng độ Cortisol máu lúc 8 giờ sáng phản ánh đỉnh sản xuất cortisol sinh lý trong ngày. Ở người bình thường, nồng độ này ở mức cao. Ở bệnh nhân bị ức chế trục HPA do dùng corticoid ngoại sinh, nồng độ cortisol buổi sáng sẽ rất thấp. Đây là một xét nghiệm sàng lọc đơn giản và hữu ích để đánh giá suy thượng thận. Nghiệm pháp kích thích bằng ACTH (Synacthen test) là tiêu chuẩn vàng để xác định.
Tại sao các lựa chọn khác là sai:
A: TSH dùng để đánh giá chức năng tuyến giáp.
C: Aldosterone chủ yếu được điều hòa bởi hệ Renin-Angiotensin, ít bị ảnh hưởng bởi corticoid ngoại sinh.
D: Calcitonin liên quan đến chuyển hóa canxi và là dấu ấn của ung thư tuyến giáp thể tủy.

TÌNH HUỐNG LÂM SÀNG 44
Một người đàn ông 62 tuổi, có tiền sử làm thợ mỏ than trong 30 năm, được chẩn đoán viêm khớp dạng thấp (VKDT) cách đây 10 năm. Ông đến khám vì ho và khó thở ngày càng tăng. Chụp X-quang ngực cho thấy nhiều nốt tròn, rõ ràng, có bờ rõ nét, đường kính từ 0.5 đến 5 cm, chủ yếu ở ngoại vi phổi, trên nền bệnh bụi phổi. Ông cũng có biểu hiện viêm khớp hoạt động.
Câu 1:
Sự kết hợp giữa VKDT, tiền sử phơi nhiễm bụi than và các nốt phổi đặc trưng này được gọi là hội chứng gì?
A. Hội chứng Caplan
B. Bệnh Sarcoidosis
C. Hội chứng Löffler
D. Bệnh phổi kẽ liên quan đến VKDT (RA-ILD)
Đáp án: A
Giải thích: Hội chứng Caplan, hay bệnh bụi phổi dạng thấp, là một tình trạng hiếm gặp được định nghĩa bởi sự hiện diện của các nốt phổi đặc trưng (nốt dạng thấp hoại tử sinh học) ở những bệnh nhân bị VKDT và có tiền sử phơi nhiễm với bụi khoáng, phổ biến nhất là bụi than, amiăng, hoặc silica.
Tại sao các lựa chọn khác là sai:
B: Bệnh Sarcoidosis cũng có thể gây ra các nốt phổi và viêm khớp, nhưng thường đi kèm với hạch rốn phổi to hai bên và không liên quan trực tiếp đến tiền sử phơi nhiễm bụi than.
C: Hội chứng Löffler là tình trạng thâm nhiễm phổi thoáng qua do tăng bạch cầu ái toan, thường liên quan đến nhiễm ký sinh trùng.
D: RA-ILD thường có biểu hiện là các tổn thương dạng lưới hoặc kính mờ trên hình ảnh học, không phải là các nốt tròn, четко очерченные.
Câu 2:
So với các nốt dạng thấp thông thường trong phổi của bệnh nhân VKDT, các nốt trong hội chứng Caplan có đặc điểm gì?
A. Chúng luôn nhỏ hơn 0.5 cm.
B. Chúng có xu hướng xuất hiện và phát triển nhanh hơn.
C. Chúng không bao giờ bị hoại tử trung tâm.
D. Chúng chỉ xuất hiện ở đỉnh phổi.
Đáp án: B
Giải thích: Các nốt trong hội chứng Caplan có xu hướng xuất hiện thành từng đợt và phát triển nhanh hơn so với các nốt dạng thấp đơn độc thường thấy ở bệnh nhân VKDT không có bệnh bụi phổi. Chúng có thể xuất hiện ngay cả khi tình trạng viêm khớp được kiểm soát tốt.
Tại sao các lựa chọn khác là sai:
A: Chúng có thể đạt kích thước lớn, lên đến 5 cm.
C: Giống như các nốt dạng thấp khác, chúng có cấu trúc mô học với hoại tử trung tâm.
D: Chúng thường nằm ở ngoại vi của cả hai phổi, không chỉ giới hạn ở đỉnh.
Câu 3:
Hướng xử trí các tổn thương phổi ở bệnh nhân này chủ yếu là gì?
A. Phẫu thuật cắt bỏ tất cả các nốt
B. Hóa trị liệu
C. Điều trị kháng sinh phổ rộng kéo dài
D. Điều trị bệnh viêm khớp dạng thấp nền và theo dõi hình ảnh học
Đáp án: D
Giải thích: Không có phương pháp điều trị đặc hiệu cho các nốt Caplan. Việc quản lý chủ yếu tập trung vào điều trị tích cực bệnh VKDT nền bằng các thuốc DMARDs. Cần theo dõi định kỳ các nốt phổi bằng hình ảnh học (X-quang hoặc CT ngực) để đánh giá sự thay đổi kích thước và loại trừ các chẩn đoán khác, đặc biệt là ung thư phổi, vốn cũng có nguy cơ cao ở nhóm bệnh nhân này (lớn tuổi, hút thuốc, phơi nhiễm bụi).
Tại sao các lựa chọn khác là sai:
A: Phẫu thuật chỉ được xem xét nếu một nốt phát triển nhanh, nghi ngờ ác tính, hoặc gây biến chứng.
B, C: Hóa trị và kháng sinh không có vai trò trong điều trị hội chứng Caplan.
Câu 4:
Bệnh nhân này có nguy cơ cao phát triển loại ung thư nào do tiền sử nghề nghiệp và bệnh nền của mình?
A. U trung biểu mô 
B. Ung thư phổi
C. U lympho
D. Ung thư gan
Đáp án: B
Giải thích: Bệnh nhân có nhiều yếu tố nguy cơ của ung thư phổi: tiền sử phơi nhiễm bụi than (bệnh bụi phổi), bệnh viêm phổi mạn tính (VKDT), và có khả năng là hút thuốc (thường đi kèm). Do đó, việc phân biệt giữa một nốt Caplan đang phát triển và một khối u ác tính mới là một thách thức chẩn đoán quan trọng.
Tại sao các lựa chọn khác là sai:
A: U trung biểu mô liên quan chặt chẽ đến phơi nhiễm amiăng.
C: Nguy cơ u lympho có tăng trong VKDT, nhưng nguy cơ ung thư phổi ở bệnh nhân này cao hơn do các yếu tố cộng hưởng.
D: Không có mối liên quan trực tiếp.

TÌNH HUỐNG LÂM SÀNG 45
Một giáo viên mầm non 30 tuổi đến khám vì đau và sưng các khớp nhỏ ở bàn tay, cổ tay và gối hai bên, khởi phát cấp tính cách đây 3 tuần. Cô có kèm theo sốt nhẹ và một ban đỏ dạng lưới mờ ở thân mình và tứ chi. Khám thấy viêm màng hoạt dịch đối xứng ở các khớp PIP, MCP và cổ tay. Xét nghiệm máu cho thấy RF dương tính ở hiệu giá thấp và anti-CCP âm tính.
Câu 1:
Với bệnh cảnh khởi phát cấp tính ở một người làm việc với trẻ em, chẩn đoán nào sau đây là một chẩn đoán phân biệt quan trọng cần loại trừ?
A. Bệnh gút
B. Viêm khớp do lậu cầu
C. Viêm khớp do Parvovirus B19
D. Thấp khớp cấp
Đáp án: C
Giải thích: Nhiễm Parvovirus B19 (gây bệnh ban đỏ nhiễm khuẩn hay "bệnh thứ năm" ở trẻ em) ở người lớn có thể gây ra một hội chứng viêm đa khớp cấp tính, đối xứng, ảnh hưởng đến các khớp nhỏ của bàn tay, rất giống với VKDT giai đoạn sớm. Bệnh nhân có thể có RF dương tính tạm thời. Nghề nghiệp tiếp xúc với trẻ em là một yếu tố nguy cơ.
Tại sao các lựa chọn khác là sai:
A: Gút thường là viêm một khớp, khởi phát rất đột ngột.
B: Viêm khớp do lậu cầu thường có biểu hiện viêm đa khớp di chuyển, viêm gân và tổn thương da dạng mụn mủ.
D: Thấp khớp cấp hiếm gặp ở độ tuổi này và có viêm khớp kiểu di chuyển.
Câu 2:
Đặc điểm nào của bệnh sử giúp phân biệt viêm khớp do virus với VKDT kinh điển?
A. Bệnh thường tự giới hạn trong vài tuần đến vài tháng.
B. Bệnh chỉ ảnh hưởng đến các khớp lớn.
C. Bệnh không bao giờ có cứng khớp buổi sáng.
D. Bệnh luôn có anti-CCP dương tính.
Đáp án: A
Giải thích: Một trong những đặc điểm quan trọng nhất của viêm khớp do virus là diễn tiến tự giới hạn. Hầu hết các trường hợp sẽ cải thiện và khỏi hoàn toàn trong vòng vài tuần đến vài tháng mà không để lại di chứng phá hủy khớp, khác với diễn tiến mạn tính và tiến triển của VKDT.
Tại sao các lựa chọn khác là sai:
B: Viêm khớp do Parvovirus B19 thường ảnh hưởng đến các khớp nhỏ giống VKDT.
C: Bệnh có thể có cứng khớp buổi sáng.
D: Bệnh thường có anti-CCP âm tính.
Câu 3:
Xét nghiệm huyết thanh học nào có giá trị nhất để xác định chẩn đoán nhiễm Parvovirus B19 cấp tính?
A. Parvovirus B19 IgG
B. Parvovirus B19 IgM
C. Parvovirus B19 DNA PCR
D. Yếu tố dạng thấp (RF)
Đáp án: B
Giải thích: Sự hiện diện của kháng thể Parvovirus B19 IgM cho thấy một tình trạng nhiễm trùng cấp tính hoặc gần đây. Đây là xét nghiệm chẩn đoán chính trong giai đoạn đầu của bệnh.
Tại sao các lựa chọn khác là sai:
A: IgG chỉ cho thấy đã từng nhiễm trong quá khứ và có miễn dịch.
C: PCR có thể được sử dụng nhưng IgM thường là đủ cho chẩn đoán trong hầu hết các trường hợp ở người có miễn dịch bình thường.
D: RF có thể dương tính giả trong nhiều bệnh nhiễm trùng và không đặc hiệu.
Câu 4:
Nếu chẩn đoán viêm khớp do Parvovirus B19 được xác định, hướng điều trị phù hợp nhất là gì?
A. Bắt đầu ngay Methotrexate
B. Điều trị bằng thuốc kháng virus Ganciclovir
C. Điều trị triệu chứng bằng thuốc chống viêm không steroid (NSAIDs)
D. Dùng một đợt Prednisone liều cao
Đáp án: C
Giải thích: Vì viêm khớp do Parvovirus B19 là một bệnh tự giới hạn, việc điều trị chủ yếu là hỗ trợ và giảm triệu chứng. NSAIDs thường đủ để kiểm soát đau và viêm khớp cho đến khi bệnh tự thuyên giảm. Các thuốc DMARDs mạnh như Methotrexate không cần thiết.
Tại sao các lựa chọn khác là sai:
A: Không cần thiết cho một bệnh tự giới hạn.
B: Không có thuốc kháng virus đặc hiệu hiệu quả cho Parvovirus B19.
D: Corticoid liều cao hiếm khi cần thiết trừ khi các triệu chứng rất nặng và không đáp ứng với NSAIDs.

TÌNH HUỐNG LÂM SÀNG 46
Một người đàn ông 50 tuổi bị VKDT, sau khi thất bại với Methotrexate, đã được điều trị bằng Infliximab (một thuốc kháng TNF-α) trong 2 năm và bệnh được kiểm soát tốt. Gần đây, ông đến khám vì mệt mỏi, đau cơ, sốt nhẹ và xuất hiện ban đỏ ở mặt. Xét nghiệm cho thấy ANA dương tính mạnh (1:1280, dạng đồng nhất), anti-CCP vẫn âm tính. Trước khi bắt đầu Infliximab, ANA của ông là âm tính.
Câu 1:
Tình trạng mới xuất hiện của bệnh nhân có khả năng nhất là gì?
A. Bùng phát bệnh viêm khớp dạng thấp
B. Hội chứng Sjögren thứ phát
C. Lupus do thuốc 
D. Nhiễm trùng da
Đáp án: C
Giải thích: Các thuốc kháng TNF-α là một trong những nhóm thuốc phổ biến nhất gây ra lupus do thuốc. Bệnh cảnh lâm sàng với các triệu chứng giống lupus (sốt, đau cơ, viêm khớp, ban da) và sự xuất hiện mới của ANA dương tính mạnh ở một bệnh nhân đang dùng thuốc nghi ngờ là rất gợi ý.
Tại sao các lựa chọn khác là sai:
A: Một đợt bùng phát VKDT thường không gây ra ban đỏ ở mặt và không giải thích được sự chuyển đổi huyết thanh ANA.
B: Hội chứng Sjögren đặc trưng bởi triệu chứng khô, không phải là ban đỏ và sốt.
D: Không có mô tả về tổn thương da gợi ý nhiễm trùng (mụn mủ, loét).
Câu 2:
Ngoài ANA, kháng thể nào sau đây có sự liên quan chặt chẽ nhất với lupus do thuốc?
A. Anti-dsDNA
B. Anti-Sm
C. Anti-histone
D. Anti-Ro/SSA
Đáp án: C
Giải thích: Kháng thể kháng histone là dấu ấn huyết thanh kinh điển của lupus do thuốc. Chúng dương tính ở hơn 95% các trường hợp lupus do thuốc gây ra bởi các tác nhân "kinh điển" (như procainamide, hydralazine). Mặc dù tỷ lệ này thấp hơn ở lupus do thuốc kháng TNF-α, đây vẫn là kháng thể đặc trưng nhất.
Tại sao các lựa chọn khác là sai:
A, B: Anti-dsDNA và Anti-Sm rất đặc hiệu cho lupus ban đỏ hệ thống (SLE) tự phát và thường âm tính trong lupus do thuốc. Sự hiện diện của chúng gợi ý bệnh có thể tiến triển thành SLE thực sự.
D: Anti-Ro/SSA không đặc hiệu cho lupus do thuốc.
Câu 3:
Bước xử trí đầu tiên và quan trọng nhất cho bệnh nhân này là gì?
A. Tăng liều Infliximab
B. Bắt đầu ngay Hydroxychloroquine
C. Ngừng sử dụng Infliximab
D. Sinh thiết da
Đáp án: C
Giải thích: Nền tảng của việc điều trị lupus do thuốc là xác định và ngừng ngay lập tức tác nhân gây bệnh. Trong trường hợp này, cần phải ngừng Infliximab. Hầu hết các triệu chứng sẽ thuyên giảm và biến mất trong vài tuần đến vài tháng sau khi ngừng thuốc.
Tại sao các lựa chọn khác là sai:
A: Tăng liều sẽ làm tình trạng tồi tệ hơn.
B: Hydroxychloroquine có thể được sử dụng để kiểm soát triệu chứng, nhưng chỉ sau khi đã ngừng thuốc gây bệnh.
D: Sinh thiết da có thể hữu ích nhưng bước quan trọng nhất là loại bỏ nguyên nhân.
Câu 4:
Sau khi ngừng Infliximab, tiên lượng của lupus do thuốc so với lupus ban đỏ hệ thống (SLE) tự phát như thế nào?
A. Tiên lượng xấu hơn nhiều, thường gây tổn thương thận nặng.
B. Tiên lượng tương tự, cần điều trị ức chế miễn dịch suốt đời.
C. Tiên lượng thường rất tốt, các triệu chứng và tự kháng thể sẽ biến mất.
D. Tiên lượng không thể đoán trước được.
Đáp án: C
Giải thích: Lupus do thuốc có tiên lượng rất tốt sau khi ngừng thuốc gây bệnh. Các triệu chứng lâm sàng thường thuyên giảm hoàn toàn, và các tự kháng thể (ANA, anti-histone) sẽ dần trở về âm tính. Bệnh hiếm khi gây tổn thương các cơ quan nội tạng nghiêm trọng (như thận hoặc hệ thần kinh trung ương), đây là một điểm khác biệt quan trọng so với SLE tự phát.
Tại sao các lựa chọn khác là sai:
A, B: Sai. Bệnh thường lành tính và tự giới hạn sau khi ngừng thuốc.
D: Tiên lượng nhìn chung là có thể đoán trước được và rất khả quan.

TÌNH HUỐNG LÂM SÀNG 47
Một phụ nữ 45 tuổi bị viêm khớp dạng thấp (VKDT) hoạt động ở mức độ trung bình, đến khám vì các triệu chứng mệt mỏi, khó ngủ và đau nhức lan tỏa khắp người, không chỉ ở các khớp bị sưng. Bà mô tả cơn đau "ở trong cơ" và cảm thấy vô vọng về tình trạng của mình. Bảng câu hỏi PHQ-9 cho kết quả 15 điểm.
Câu 1:
Ngoài VKDT, tình trạng nào sau đây là một bệnh đi kèm có khả năng nhất ở bệnh nhân này?
A. Suy giáp
B. Trầm cảm
C. Thiếu máu ác tính
D. Bệnh Addison
Đáp án: B
Giải thích: Bệnh nhân VKDT có nguy cơ mắc trầm cảm cao hơn đáng kể so với dân số chung. Các triệu chứng như mệt mỏi, rối loạn giấc ngủ, cảm giác vô vọng, và đau lan tỏa không tương xứng với mức độ viêm khớp là những dấu hiệu cảnh báo. Kết quả PHQ-9 là 15 điểm cho thấy một giai đoạn trầm cảm từ trung bình đến nặng.
Tại sao các lựa chọn khác là sai:
A: Suy giáp cũng gây mệt mỏi nhưng thường không gây đau lan tỏa và cảm giác vô vọng.
C, D: Thiếu máu ác tính và bệnh Addison là các bệnh lý ít phổ biến hơn và có các triệu chứng đặc trưng khác.
Câu 2:
Cơ chế sinh học nào giải thích mối liên hệ giữa tình trạng viêm trong VKDT và các triệu chứng trầm cảm?
A. Nồng độ cortisol trong máu thấp
B. Tác động trực tiếp của các cytokine gây viêm lên hệ thần kinh trung ương
C. Tác dụng phụ của Methotrexate
D. Tăng nồng độ serotonin trong não
Đáp án: B
Giải thích: Tình trạng viêm hệ thống mạn tính trong VKDT không chỉ ảnh hưởng đến khớp. Các cytokine gây viêm (như TNF-α, IL-1, IL-6) có thể vượt qua hàng rào máu não và tác động trực tiếp lên hệ thần kinh trung ương. Chúng ảnh hưởng đến quá trình chuyển hóa các chất dẫn truyền thần kinh (như serotonin, dopamine), hoạt động của trục HPA, và tính dẻo của synap, góp phần gây ra các triệu chứng như mệt mỏi, rối loạn giấc ngủ, và trầm cảm.
Tại sao các lựa chọn khác là sai:
A: Viêm mạn tính thường làm tăng nồng độ cortisol.
C: Mặc dù MTX có thể gây mệt mỏi, nhưng nó không phải là nguyên nhân chính gây ra toàn bộ phức hợp triệu chứng trầm cảm.
D: Trầm cảm thường liên quan đến giảm, không phải tăng, nồng độ serotonin.
Câu 3:
Cách tiếp cận quản lý tốt nhất cho bệnh nhân này là gì?
A. Chỉ tăng liều thuốc DMARD để kiểm soát VKDT tốt hơn
B. Kê đơn một thuốc giảm đau opioid mạnh
C. Một cách tiếp cận đa mô thức bao gồm tối ưu hóa điều trị VKDT và điều trị trầm cảm
D. Khuyên bệnh nhân nghỉ ngơi hoàn toàn tại giường
Đáp án: C
Giải thích: Cách tiếp cận tốt nhất là đa mô thức. Cần tối ưu hóa việc điều trị VKDT để giảm gánh nặng viêm toàn thân. Đồng thời, phải chẩn đoán và điều trị bệnh trầm cảm một cách trực tiếp thông qua tư vấn tâm lý, liệu pháp hành vi nhận thức, và/hoặc thuốc chống trầm cảm (ví dụ, SSRIs).
Tại sao các lựa chọn khác là sai:
A: Mặc dù quan trọng, nhưng chỉ kiểm soát VKDT có thể không giải quyết hoàn toàn được bệnh trầm cảm đã hình thành.
B: Opioid không được chỉ định và có thể gây hại.
D: Nghỉ ngơi hoàn toàn sẽ làm tình trạng thể chất và tinh thần của bệnh nhân xấu đi.
Câu 4:
Ngoài thuốc chống trầm cảm, biện pháp can thiệp nào sau đây đã được chứng minh là có hiệu quả trong việc cải thiện tâm trạng và giảm mệt mỏi ở bệnh nhân VKDT?
A. Chế độ ăn kiêng không gluten
B. Các chương trình tập thể dục phù hợp và đều đặn
C. Liệu pháp oxy cao áp
D. Tránh hoàn toàn ánh sáng mặt trời
Đáp án: B
Giải thích: Tập thể dục đều đặn, bao gồm các bài tập aerobic, tăng cường sức mạnh và linh hoạt, là một trong những biện pháp can thiệp không dùng thuốc hiệu quả nhất cho bệnh nhân VKDT. Nó không chỉ cải thiện chức năng khớp mà còn được chứng minh là giúp giảm đau, giảm mệt mỏi, cải thiện giấc ngủ và có tác dụng chống trầm cảm rõ rệt.
Tại sao các lựa chọn khác là sai:
A, C, D: Các biện pháp này không có bằng chứng khoa học ủng hộ hiệu quả của chúng đối với các triệu chứng này trong VKDT.

TÌNH HUỐNG LÂM SÀNG 48
Một phụ nữ 29 tuổi, mang thai ở tuần thứ 34, có tiền sử VKDT được kiểm soát tốt bằng Hydroxychloroquine. Cô nhập viện vì khởi phát cấp tính tình trạng tăng huyết áp (160/110 mmHg), protein niệu và phù toàn thân.
Câu 1:
Chẩn đoán có khả năng nhất cho tình trạng cấp tính của bệnh nhân là gì?
A. Đợt bùng phát của viêm thận lupus
B. Tiền sản giật
C. Hội chứng HELLP
D. Đợt bùng phát của viêm khớp dạng thấp
Đáp án: B
Giải thích: Sự khởi phát của tăng huyết áp và protein niệu sau tuần thứ 20 của thai kỳ là định nghĩa kinh điển của tiền sản giật. Mặc dù bệnh nhân VKDT có nguy cơ tiền sản giật cao hơn, nhưng đây là một biến chứng sản khoa cần được chẩn đoán và quản lý kịp thời, không nên nhầm lẫn với một đợt bùng phát của bệnh tự miễn.
Tại sao các lựa chọn khác là sai:
A: Bệnh nhân có tiền sử VKDT, không phải Lupus. Viêm thận hiếm gặp trong VKDT.
C: Hội chứng HELLP (Tan máu, tăng men gan, giảm tiểu cầu) là một biến thể nặng của tiền sản giật, cần có các kết quả xét nghiệm tương ứng để chẩn đoán.
D: Một đợt bùng phát VKDT thường biểu hiện bằng viêm khớp, không phải tăng huyết áp và protein niệu.
Câu 2:
Bệnh VKDT được biết là một yếu tố nguy cơ của tiền sản giật. Cơ chế nào được cho là có vai trò trong mối liên quan này?
A. Tác dụng phụ của Hydroxychloroquine
B. Tăng cân quá mức trong thai kỳ
C. Rối loạn chức năng nội mô do viêm hệ thống
D. Thiếu hụt Folic acid
Đáp án: C
Giải thích: Cả VKDT và tiền sản giật đều có chung một đặc điểm bệnh sinh quan trọng: rối loạn chức năng nội mô toàn thân. Tình trạng viêm mạn tính trong VKDT có thể làm tổn thương lớp nội mạc mạch máu, tạo tiền đề cho các rối loạn mạch máu của nhau thai và dẫn đến tiền sản giật.
Tại sao các lựa chọn khác là sai:
A: Ngược lại, một số nghiên cứu cho thấy Hydroxychloroquine có thể có tác dụng bảo vệ, làm giảm nguy cơ tiền sản giật.
B, D: Là các yếu tố nguy cơ chung, nhưng rối loạn chức năng nội mô là mối liên kết sinh học trực tiếp hơn.
Câu 3:
Cách xử trí dứt điểm duy nhất cho tiền sản giật nặng ở tuần thai này là gì?
A. Dùng thuốc hạ áp Labetalol
B. Dùng Magnesium sulfate
C. Chấm dứt thai kỳ
D. Dùng một đợt corticoid liều cao
Đáp án: C
Giải thích: Điều trị dứt điểm và duy nhất cho tiền sản giật là lấy thai nhi và nhau thai ra ngoài. Ở tuần thứ 34, thai nhi đã có khả năng sống tốt, và nguy cơ của việc tiếp tục thai kỳ đối với cả mẹ và con do tiền sản giật nặng (nguy cơ sản giật, đột quỵ, suy đa tạng) lớn hơn nguy cơ của việc sinh non.
Tại sao các lựa chọn khác là sai:
A, B: Labetalol dùng để kiểm soát huyết áp và Magnesium sulfate dùng để dự phòng co giật. Đây là các biện pháp quản lý tạm thời trong khi chuẩn bị cho việc sinh, không phải là điều trị dứt điểm.
D: Corticoid (Betamethasone) có thể được dùng để thúc đẩy trưởng thành phổi của thai nhi trước khi sinh non, không phải để điều trị tiền sản giật.
Câu 4:
Sau khi sinh, bệnh nhân có nguy cơ cao gặp phải tình trạng gì liên quan đến bệnh VKDT của mình?
A. Lui bệnh kéo dài
B. Bùng phát bệnh sau sinh 
C. Phát triển bệnh Lupus
D. Loãng xương nhanh chóng
Đáp án: B
Giải thích: Do sự thay đổi đột ngột của môi trường miễn dịch từ trạng thái dung nạp trong thai kỳ trở lại bình thường, có một nguy cơ rất cao (lên đến 90%) bệnh VKDT sẽ bùng phát trở lại trong vòng 3-6 tháng sau sinh. Bệnh nhân cần được theo dõi chặt chẽ trong giai đoạn này và có thể cần điều chỉnh lại phác đồ điều trị.
Tại sao các lựa chọn khác là sai:
A: Ngược lại, nguy cơ bùng phát rất cao.
C: Không có lý do để bệnh chuyển thành Lupus.
D: Mất xương có thể xảy ra nhưng bùng phát viêm khớp là nguy cơ cấp thiết và phổ biến hơn.

TÌNH HUỐNG LÂM SÀNG 49
Một phụ nữ 55 tuổi bị VKDT 12 năm, đến khám vì đau nhiều và hạn chế vận động khớp vai phải. Bà không thể chải tóc hay với tay lên cao. Tình trạng này đã kéo dài hơn 1 năm và không đáp ứng với vật lý trị liệu hay tiêm corticoid nội khớp. Chụp MRI cho thấy hình ảnh bào mòn xương và rách chóp xoay lớn.
Câu 1:
Tình trạng tổn thương nặng ở khớp vai của bệnh nhân là một ví dụ về điều gì?
A. Một đợt bùng phát cấp tính của VKDT
B. Bệnh lý khớp do tinh thể
C. Tổn thương khớp giai đoạn cuối do VKDT
D. Hội chứng vai đông cứng 
Đáp án: C
Giải thích: Tình trạng viêm mạn tính kéo dài trong VKDT có thể dẫn đến tổn thương cấu trúc không hồi phục của các khớp lớn như khớp vai. Điều này bao gồm phá hủy sụn và xương (bào mòn), cũng như tổn thương các cấu trúc phần mềm xung quanh như chóp xoay. Đây là biểu hiện của bệnh ở giai đoạn cuối, gây mất chức năng nghiêm trọng.
Tại sao các lựa chọn khác là sai:
A: Đây là một quá trình mạn tính, không phải cấp tính.
B: Không có bằng chứng về bệnh do tinh thể.
D: Mặc dù có hạn chế vận động, nhưng nguyên nhân ở đây là do phá hủy cấu trúc khớp và rách gân, không chỉ đơn thuần là co thắt bao khớp.
Câu 2:
Với tình trạng đau dai dẳng và mất chức năng không đáp ứng với điều trị bảo tồn, lựa chọn điều trị nào là phù hợp nhất cho bệnh nhân này?
A. Tăng liều Methotrexate
B. Bắt đầu một thuốc sinh học mới
C. Phẫu thuật thay khớp vai
D. Liệu pháp huyết tương giàu tiểu cầu (PRP)
Đáp án: C
Giải thích: Khi VKDT đã gây ra tổn thương cấu trúc khớp giai đoạn cuối với đau và mất chức năng nghiêm trọng, các biện pháp điều trị nội khoa (dùng thuốc) không còn hiệu quả trong việc phục hồi khớp. Phẫu thuật thay khớp (arthroplasty) là lựa chọn điều trị dứt điểm để giảm đau, cải thiện chức năng và nâng cao chất lượng cuộc sống cho bệnh nhân.
Tại sao các lựa chọn khác là sai:
A, B: Các thuốc DMARDs giúp kiểm soát viêm để ngăn ngừa tổn thương thêm, nhưng không thể sửa chữa được các tổn thương cấu trúc đã xảy ra.
D: PRP là một liệu pháp thực nghiệm và không có bằng chứng rõ ràng về hiệu quả trong trường hợp phá hủy khớp nặng do VKDT.
Câu 3:
Trước khi tiến hành phẫu thuật thay khớp, việc tối ưu hóa tình trạng nào của bệnh nhân là quan trọng nhất để giảm nguy cơ biến chứng?
A. Đảm bảo bệnh VKDT ở trạng thái lui bệnh hoặc hoạt động thấp
B. Giảm cân nhanh chóng
C. Tăng nồng độ yếu tố dạng thấp (RF)
D. Ngừng hoàn toàn tất cả các thuốc DMARDs trong 3 tháng
Đáp án: A
Giải thích: Phẫu thuật trên một bệnh nhân có bệnh VKDT đang hoạt động mạnh sẽ làm tăng nguy cơ biến chứng như nhiễm trùng, chậm lành vết thương và kết quả phục hồi chức năng kém. Do đó, một trong những mục tiêu quan trọng trước phẫu thuật là sử dụng các thuốc DMARDs để kiểm soát tốt nhất có thể tình trạng viêm hệ thống, đưa bệnh về trạng thái lui bệnh hoặc hoạt động thấp.
Tại sao các lựa chọn khác là sai:
B: Giảm cân là tốt nhưng không phải là ưu tiên cấp thiết nhất so với kiểm soát viêm.
C: Tăng RF là dấu hiệu bệnh hoạt động, là điều cần tránh.
D: Ngừng hoàn toàn DMARDs trong thời gian dài sẽ gây bùng phát bệnh nặng, là chống chỉ định cho phẫu thuật.
Câu 4:
Một trong những mục tiêu chính của chương trình phục hồi chức năng sau phẫu thuật thay khớp vai là gì?
A. Tránh vận động khớp vai trong 6 tháng
B. Lấy lại tầm vận động chức năng và tăng cường sức mạnh các cơ xung quanh
C. Tập trung hoàn toàn vào việc sử dụng thuốc giảm đau
D. Đảm bảo bệnh nhân có thể nâng vật nặng trên 10kg
Đáp án: B
Giải thích: Phục hồi chức năng là yếu tố quyết định sự thành công của phẫu thuật thay khớp. Mục tiêu chính là phục hồi tầm vận động của khớp vai một cách an toàn và tăng cường sức mạnh của các cơ chóp xoay và cơ delta để ổn định khớp nhân tạo và tối đa hóa chức năng của cánh tay trong các hoạt động hàng ngày.
Tại sao các lựa chọn khác là sai:
A: Bất động kéo dài sẽ gây cứng khớp và kết quả kém.
C: Thuốc giảm đau chỉ là hỗ trợ, không phải là mục tiêu chính.
D: Nâng vật nặng thường bị hạn chế sau phẫu thuật thay khớp vai để bảo vệ khớp nhân tạo.

TÌNH HUỐNG LÂM SÀNG 50
Một người đàn ông 50 tuổi bị VKDT huyết thanh âm tính 10 năm. Bệnh của ông được kiểm soát tốt bằng "liệu pháp bộ ba" (MTX, SSZ, HCQ). Gần đây, ông được chẩn đoán mắc bệnh đái tháo đường type 2 và tăng huyết áp.
Câu 1:
Bệnh nhân VKDT có nguy cơ cao hơn đối với các bệnh đi kèm nào sau đây?
A. Bệnh tim mạch, nhiễm trùng, và loãng xương
B. Bệnh hen phế quản và dị ứng
C. Sỏi mật và viêm túi thừa
D. Bệnh Parkinson và Alzheimer
Đáp án: A
Giải thích: Tình trạng viêm hệ thống mạn tính trong VKDT không chỉ ảnh hưởng đến khớp mà còn làm tăng nguy cơ của nhiều bệnh đi kèm nghiêm trọng. Các bệnh phổ biến nhất bao gồm bệnh tim mạch (do xơ vữa động mạch nhanh), nhiễm trùng (do bản chất bệnh và thuốc ức chế miễn dịch), và loãng xương (do viêm, bất động và sử dụng corticoid).
Tại sao các lựa chọn khác là sai:
B, C, D: Không có mối liên hệ mạnh mẽ và đã được chứng minh giữa VKDT và các nhóm bệnh này.
Câu 2:
Bệnh nhân được kê đơn Prednisone 5 mg/ngày cho một đợt viêm khớp nhẹ. Thuốc này có thể ảnh hưởng đến các bệnh đi kèm của ông như thế nào?
A. Cải thiện kiểm soát đường huyết và huyết áp
B. Không có ảnh hưởng gì
C. Có thể làm tăng đường huyết và huyết áp
D. Chỉ làm tăng đường huyết nhưng không ảnh hưởng huyết áp
Đáp án: C
Giải thích: Glucocorticoid (như Prednisone) có nhiều tác dụng phụ về chuyển hóa. Chúng có thể gây tăng đường huyết do tăng đề kháng insulin và tăng tân tạo glucose ở gan. Chúng cũng có thể gây tăng huyết áp do tác dụng giữ muối và nước giống mineralocorticoid. Cần phải theo dõi chặt chẽ và có thể cần điều chỉnh liều thuốc điều trị đái tháo đường và tăng huyết áp.
Tại sao các lựa chọn khác là sai:
A, B, D: Đều là các nhận định sai. Corticoid ảnh hưởng đến cả hai chỉ số này.
Câu 3:
Loại thuốc nào sau đây, vừa dùng để điều trị VKDT, lại vừa có thể có lợi ích trong việc giảm nguy cơ tim mạch?
A. NSAIDs
B. Methotrexate
C. Leflunomide
D. Paracetamol
Đáp án: B
Giải thích: Nhiều nghiên cứu quan sát đã cho thấy rằng việc sử dụng Methotrexate ở bệnh nhân VKDT có liên quan đến việc giảm nguy cơ mắc các biến cố tim mạch so với những người không được điều trị. Cơ chế được cho là do MTX làm giảm gánh nặng viêm hệ thống, từ đó làm chậm quá trình xơ vữa động mạch.
Tại sao các lựa chọn khác là sai:
A: NSAIDs, đặc biệt là các thuốc ức chế COX-2, có thể làm tăng nguy cơ tim mạch.
C: Leflunomide có thể gây tăng huyết áp và cần được theo dõi.
D: Paracetamol không có tác dụng chống viêm hệ thống.
Câu 4:
Cách tiếp cận quản lý tốt nhất cho bệnh nhân có nhiều bệnh đi kèm như thế này là gì?
A. Chỉ tập trung vào việc điều trị VKDT
B. Để bệnh nhân tự quản lý các bệnh khác với bác sĩ gia đình
C. Phối hợp chặt chẽ giữa bác sĩ thấp khớp học, bác sĩ nội tiết và bác sĩ tim mạch
D. Ngừng tất cả các thuốc VKDT để tránh tương tác thuốc
Đáp án: C
Giải thích: Việc quản lý bệnh nhân có nhiều bệnh mạn tính phức tạp đòi hỏi một cách tiếp cận phối hợp đa chuyên khoa. Bác sĩ thấp khớp học cần phối hợp với bác sĩ nội tiết để kiểm soát đường huyết (lưu ý tác dụng của corticoid) và bác sĩ tim mạch để quản lý huyết áp và các yếu tố nguy cơ khác, đảm bảo các phác đồ điều trị không xung đột và mang lại kết quả tốt nhất cho toàn trạng của bệnh nhân.
Tại sao các lựa chọn khác là sai:
A: Bỏ qua các bệnh đi kèm là rất nguy hiểm.
B: Thiếu sự phối hợp có thể dẫn đến các quyết định điều trị không tối ưu hoặc tương tác thuốc.
D: Ngừng thuốc VKDT sẽ gây bùng phát bệnh, làm tình trạng viêm và nguy cơ tim mạch tồi tệ hơn.


</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function parseQuizData(text) {
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const questions = [];
    let currentQ = null;
    let currentMode = 'context';
    let currentContext = "";
    let isBuildingContext = false;

    lines.forEach(line => {
        line = line.replace(/^[\u2022\u00b7\-\*]\s*/, '').trim();
        if (!line) return;

        const isSection = line.match(/^(?:PHẦN|Phần)\s+[I|V|X|\d]+/i);
        if (isSection) {
            currentContext = "";
            isBuildingContext = false;
        }

        const isCaseStart = line.match(/^(?:TÌNH HUỐNG LÂM SÀNG|Case lâm sàng|Tình huống|Case\s*\d+)/i);
        const isQ = line.match(/^(?:Câu|Question)\s*([\d\.]+)[^:\.\-]*[:\.\-]\s*(.*)/i);
        const isOpt = line.match(/^([A-E])[\.\)\:\-\/]\s*(.*)/i);
        const isAns = line.match(/^(?:Đáp án(?: đúng)?|Answer)\s*[:\.\-]?\s*([A-E])/i);

        if (isCaseStart && !isQ) {
            currentContext = line + '\n';
            isBuildingContext = true;
            currentMode = 'context';
            return;
        }

        if (isQ && !isAns) {
            isBuildingContext = false;
            if (currentQ) questions.push(currentQ);
            
            currentQ = { 
                id: questions.length + 1, 
                originalId: isQ[1], 
                context: currentContext.trim(), 
                question: isQ[2] || '', 
                options: {}, 
                answer: '' 
            };
            currentMode = 'question';
            return;
        }

        // Lọc bỏ 100% phần giải thích
        if (isAns && currentQ) {
            currentQ.answer = isAns[1].toUpperCase();
            currentMode = 'skip';
            return;
        }
        
        if (line.match(/^(Giải thích|Tại sao các lựa chọn khác|Tài liệu được biên soạn|Nghiêm cấm sao chép|Đúng:|Sai:)/i)) {
            currentMode = 'skip';
            return;
        }

        if (currentMode === 'skip') return;

        if (isBuildingContext) {
            if (!line.match(/^(TRẮC NGHIỆM|BASEDOW|BỆNH LÝ BASEDOW|HỘI CHỨNG|ĐỘT QUỴ|ĐỘNG KINH|COPD|ĐÁI MÁU|NỘI KHOA|TEAMDRCAT|==========|Tài liệu được|Nghiêm cấm|\[🛑)/i)) {
                currentContext += line + '\n';
            }
            return;
        }

        if (currentQ) {
            if (isOpt) {
                currentQ.options[isOpt[1].toUpperCase()] = isOpt[2].trim();
                currentMode = 'options';
            } else if (currentMode === 'question') {
                currentQ.question += '\n' + line;
            } else if (currentMode === 'options') {
                const keys = Object.keys(currentQ.options);
                if (keys.length > 0) {
                    const lastKey = keys[keys.length - 1];
                    currentQ.options[lastKey] += '\n' + line;
                }
            } 
        }
    });
    if (currentQ) questions.push(currentQ);
    return questions;
}

const playCorrectSound = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
    } catch (e) { console.error(e); }
};

const playIncorrectSound = () => {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.2);
    } catch (e) { console.error(e); }
};

function App() {
    const [appState, setAppState] = useState('intro');
    const [questions, setQuestions] = useState([]);
    const [currentIndex, setCurrentIndex] = useState(0);
    const [answers, setAnswers] = useState({});
    const [flagged, setFlagged] = useState(new Set());
    const [timeRemaining, setTimeRemaining] = useState(0); 
    const [showMatrix, setShowMatrix] = useState(false);
    const [isPaused, setIsPaused] = useState(false);
    const [isDarkMode, setIsDarkMode] = useState(false);
    const [isSoundEnabled, setIsSoundEnabled] = useState(true);
      const [zoomLevel, setZoomLevel] = useState(100);
    
    const scrollContainerRef = useRef(null);

    useEffect(() => {
        const rawData = document.getElementById('quizData').textContent || '';
        const parsedQs = parseQuizData(rawData);
        setQuestions(parsedQs);
        setTimeRemaining(parsedQs.length * 60);
    }, []);

    useEffect(() => {
        if (appState === 'result' && scrollContainerRef.current) {
            scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }, [appState]);

    useEffect(() => {
        let timer;
        if (appState === 'quiz' && !isPaused && timeRemaining > 0) {
            timer = setInterval(() => setTimeRemaining(p => p - 1), 1000);
        } else if (timeRemaining <= 0 && appState === 'quiz') {
            setAppState('result');
        }
        return () => clearInterval(timer);
    }, [appState, timeRemaining, isPaused]);

    useEffect(() => {
        if (isDarkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    }, [isDarkMode]);

      useEffect(() => {
          document.documentElement.style.fontSize = `${zoomLevel}%`;
      }, [zoomLevel]);

    const formatTime = (seconds) => {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    };

    const startQuiz = () => {
        if (questions.length === 0) {
            alert("Lỗi tải dữ liệu câu hỏi. Vui lòng kiểm tra lại file data.");
            return;
        }
        setAppState('quiz');
        setAnswers({});
        setFlagged(new Set());
        setTimeRemaining(questions.length * 60);
        setCurrentIndex(0);
        setIsPaused(false);
    };

    const restartQuiz = () => {
        setAppState('intro');
        setAnswers({});
        setFlagged(new Set());
        setTimeRemaining(questions.length * 60);
        setCurrentIndex(0);
        setShowMatrix(false);
        if (scrollContainerRef.current) scrollContainerRef.current.scrollTo({ top: 0 });
    };

    const togglePause = () => {
        if (appState === 'quiz') setIsPaused(!isPaused);
    };

    const handleSelectAnswer = (key) => {
        if (answers[currentIndex] || appState !== 'quiz' || isPaused) return;
        
        const isCorrect = questions[currentIndex].answer === key;
        if (isSoundEnabled) {
            if (isCorrect) {
                playCorrectSound();
            } else {
                playIncorrectSound();
            }
        }
        
        setAnswers(prev => ({ ...prev, [currentIndex]: key }));
    };

    const toggleFlag = () => {
        const newFlagged = new Set(flagged);
        if (newFlagged.has(currentIndex)) newFlagged.delete(currentIndex);
        else newFlagged.add(currentIndex);
        setFlagged(newFlagged);
    };

    const calculateScore = () => questions.reduce((acc, q, i) => (answers[i] === q.answer ? acc + 1 : acc), 0);

    const getEncouragement = () => {
        if (questions.length === 0) return null;
        const score = calculateScore();
        const percent = score / questions.length;
        if (percent >= 0.9) return { title: "Kiến Thức Tuyệt Vời!", text: "Bạn nắm rất vững chuyên đề Nội khoa. Chúc mừng bạn!", icon: "fa-vial-circle-check", color: "text-violet-700 dark:text-violet-300 bg-violet-100 dark:bg-violet-900/40 border-violet-300 dark:border-violet-700" };
        if (percent >= 0.7) return { title: "Kết Quả Khá Tốt!", text: "Kiến thức của bạn hoạt động rất ổn định. Hãy xem lại vài câu sai nhé.", icon: "fa-check-circle", color: "text-fuchsia-600 dark:text-fuchsia-300 bg-fuchsia-50 dark:bg-fuchsia-900/40 border-fuchsia-200 dark:border-fuchsia-700" };
        if (percent >= 0.5) return { title: "Cần Bổ Sung Thêm!", text: "Bạn cần nạp thêm kiến thức để xử lý các câu hỏi phức tạp hơn nhé!", icon: "fa-book-medical", color: "text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/40 border-orange-200 dark:border-orange-700" };
        return { title: "Cần Cố Gắng Hơn!", text: "Đừng nản chí! Hãy ôn tập lại kỹ lý thuyết nhé!", icon: "fa-triangle-exclamation", color: "text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-800/40 border-slate-300 dark:border-slate-700" };
    };

    const renderBackgroundBlobs = () => (
        <div className="absolute inset-0 overflow-hidden pointer-events-none z-0">
            <div className="absolute top-[-10%] left-[-10%] w-[30rem] h-[30rem] bg-violet-300/30 rounded-full mix-blend-multiply filter blur-[100px] animate-blob dark:bg-violet-900/30 dark:mix-blend-screen"></div>
            <div className="absolute top-[20%] right-[-10%] w-[30rem] h-[30rem] bg-fuchsia-300/30 rounded-full mix-blend-multiply filter blur-[100px] animate-blob animation-delay-2000 dark:bg-fuchsia-900/30 dark:mix-blend-screen"></div>
            <div className="absolute bottom-[-20%] left-[20%] w-[30rem] h-[30rem] bg-pink-300/30 rounded-full mix-blend-multiply filter blur-[100px] animate-blob animation-delay-4000 dark:bg-pink-900/30 dark:mix-blend-screen"></div>
        </div>
    );

    const renderQuizContent = () => {
        if (isPaused) {
            return (
                <div className="glass-panel rounded-3xl p-16 text-center shadow-2xl animate-in fade-in zoom-in duration-300 mt-10 relative z-10">
                    <div className="w-24 h-24 bg-violet-100 dark:bg-violet-900/50 text-violet-600 dark:text-violet-400 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                        <i className="fa-solid fa-pause text-5xl"></i>
                    </div>
                    <h2 className="text-3xl font-black text-slate-800 dark:text-slate-100 mb-4">Bài thi đang tạm dừng</h2>
                    <button onClick={togglePause} className="btn-gradient text-white px-12 py-4 rounded-2xl font-bold text-xl shadow-lg shadow-violet-300/50 dark:shadow-none hover:shadow-violet-400/50 transition-all">Tiếp tục ngay</button>
                </div>
            );
        }

        if (appState === 'result') {
            const msg = getEncouragement();
            return (
                <div className="space-y-8 animate-in slide-in-from-bottom-8 duration-500 mt-4 relative z-10">
                    <div className="glass-panel p-10 md:p-12 rounded-[2rem] text-center shadow-2xl relative overflow-hidden border-t-4 border-t-violet-500">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-violet-500 to-fuchsia-600"></div>
                        <div className="w-28 h-28 bg-gradient-to-br from-violet-500 to-fuchsia-600 text-white rounded-full flex items-center justify-center text-5xl mx-auto mb-6 shadow-[0_0_30px_rgba(139,92,246,0.4)] border-4 border-white dark:border-slate-800">
                            <i className="fa-solid fa-award text-5xl"></i>
                        </div>
                        <h2 className="text-3xl font-black text-slate-800 dark:text-slate-100 mb-6 tracking-tight">HOÀN THÀNH BÀI THI</h2>
                        
                        {msg && (
                            <div className={`p-6 rounded-2xl border mb-8 flex flex-col items-center gap-2 ${msg.color} backdrop-blur-md`}>
                                <i className={`fa-solid ${msg.icon} text-4xl mb-2 opacity-90 drop-shadow-sm`}></i>
                                <h3 className="text-2xl font-black uppercase tracking-wide">{msg.title}</h3>
                                <p className="text-base font-semibold opacity-90 max-w-lg">{msg.text}</p>
                            </div>
                        )}
                        
                        <div className="flex flex-col items-center gap-1 mb-10">
                            <div className="flex items-baseline gap-2">
                                <span className="text-8xl font-black bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600 dark:from-violet-400 dark:to-fuchsia-400 tracking-tighter drop-shadow-sm">{calculateScore()}</span>
                                <span className="text-3xl font-bold text-slate-400 dark:text-slate-500">/ {questions.length}</span>
                            </div>
                            <p className="text-slate-500 dark:text-slate-400 font-bold uppercase tracking-widest text-sm mt-2">Tổng điểm của bạn</p>
                        </div>
                        
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                            <div className="glass-panel p-5 rounded-2xl border-green-200 dark:border-green-800/50 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-green-600 dark:text-green-400 uppercase mb-1 tracking-wider">Đúng</p>
                                <p className="text-3xl font-black text-green-700 dark:text-green-300">{calculateScore()}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-2xl border-red-200 dark:border-red-800/50 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-red-600 dark:text-red-400 uppercase mb-1 tracking-wider">Sai</p>
                                <p className="text-3xl font-black text-red-700 dark:text-red-300">{Object.keys(answers).length - calculateScore()}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-2xl border-slate-200 dark:border-slate-600 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-slate-500 dark:text-slate-400 uppercase mb-1 tracking-wider">Bỏ qua</p>
                                <p className="text-3xl font-black text-slate-700 dark:text-slate-300">{questions.length - Object.keys(answers).length}</p>
                            </div>
                            <div className="glass-panel p-5 rounded-2xl border-orange-200 dark:border-orange-800/50 hover:-translate-y-1 transition-transform duration-300">
                                <p className="text-xs font-black text-orange-600 dark:text-orange-400 uppercase mb-1 tracking-wider">Có Cờ</p>
                                <p className="text-3xl font-black text-orange-700 dark:text-orange-300">{flagged.size}</p>
                            </div>
                        </div>

                        <div className="mt-8 mb-8 p-6 bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 flex items-center gap-3 text-left w-full shadow-sm">
                            <i className="fa-solid fa-file-pdf text-violet-500 text-2xl"></i>
                            <span className="text-sm font-medium text-slate-700 dark:text-slate-300 leading-snug">Bạn có thể tra cứu đáp án chi tiết ở file PDF do <strong>TEAMDRCAT</strong> biên soạn.</span>
                        </div>

                        <div className="flex flex-col sm:flex-row gap-4">
                            <button onClick={restartQuiz} className="flex-1 bg-slate-900 dark:bg-slate-700 hover:bg-slate-800 dark:hover:bg-slate-600 text-white text-lg font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 shadow-xl hover:shadow-slate-500/30 dark:shadow-none uppercase tracking-wide hover:-translate-y-1">
                                <i className="fa-solid fa-rotate-right text-xl"></i> Làm lại bài
                            </button>
                            <button onClick={() => { setAppState('review'); setCurrentIndex(0); }} className="flex-1 bg-violet-100 dark:bg-violet-900/40 hover:bg-violet-200 dark:hover:bg-violet-800/60 text-violet-700 dark:text-violet-300 text-lg font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all duration-300 uppercase tracking-wide hover:-translate-y-1">
                                <i className="fa-solid fa-eye text-xl"></i> Xem đáp án
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        if (appState === 'review') {
            return (
                <div className="space-y-6 animate-in fade-in duration-300 relative z-10">
                    <div className="glass-panel p-5 rounded-2xl border-l-4 border-l-orange-500 flex items-center justify-between shadow-lg sticky top-0 z-20">
                        <h2 className="text-lg font-black text-orange-600 dark:text-orange-400 uppercase tracking-tight flex items-center gap-2"><i className="fa-solid fa-list-check text-xl"></i> Review Đáp Án</h2>
                    </div>
                    
                    {questions.length > 0 && questions.map((q, index) => {
                        const isSelected = !!answers[index];
                        const isCorrect = answers[index] === q.answer;
                        const isFlagged = flagged.has(index);
                        const showContext = q.context && (index === 0 || q.context !== questions[index - 1].context);
                        
                        let qStatus = <span className="text-slate-500 dark:text-slate-400 font-bold text-sm bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-lg"><i className="fa-solid fa-minus mr-1"></i>Chưa làm</span>;
                        let qTagClass = "px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm bg-slate-400 dark:bg-slate-600";
                        let qBoxClass = "glass-panel rounded-[1.5rem] shadow-lg p-6 md:p-8 relative overflow-hidden";

                        if (isSelected) {
                            if (isCorrect) {
                                qStatus = <span className="text-green-700 dark:text-green-300 font-bold text-sm bg-green-100 dark:bg-green-900/50 px-3 py-1 rounded-lg border border-green-200 dark:border-green-800"><i className="fa-solid fa-check mr-1"></i>Chính xác</span>;
                                qTagClass = "px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm bg-green-500 dark:bg-green-600";
                                qBoxClass = "glass-panel rounded-[1.5rem] shadow-lg border-l-4 border-l-green-500 p-6 md:p-8 relative overflow-hidden";
                            } else {
                                qStatus = <span className="text-red-700 dark:text-red-300 font-bold text-sm bg-red-100 dark:bg-red-900/50 px-3 py-1 rounded-lg border border-red-200 dark:border-red-800"><i className="fa-solid fa-xmark mr-1"></i>Sai</span>;
                                qTagClass = "px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest text-white shadow-sm bg-red-500 dark:bg-red-600";
                                qBoxClass = "glass-panel rounded-[1.5rem] shadow-lg border-l-4 border-l-red-500 p-6 md:p-8 relative overflow-hidden";
                            }
                        }
                        
                        return (
                            <div key={index} id={`review-q-${index}`} className={qBoxClass}>
                                {showContext && (
                                    <div className="medical-record-box rounded-xl p-5 mb-8 shadow-sm text-left">
                                        <div className="flex items-center gap-2 mb-3 border-b border-violet-200 dark:border-violet-800 pb-2">
                                            <i className="fa-solid fa-notes-medical text-violet-600 dark:text-violet-400 text-lg"></i>
                                            <span className="font-black text-violet-800 dark:text-violet-300 uppercase text-sm tracking-wide">TÌNH HUỐNG LÂM SÀNG</span>
                                        </div>
                                        <p className="text-slate-800 dark:text-slate-200 text-lg md:text-xl font-bold leading-relaxed whitespace-pre-wrap">{q.context}</p>
                                    </div>
                                )}
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3">
                                        <span className={qTagClass}>Câu {q.id}</span>
                                        {isFlagged && <span className="text-orange-600 dark:text-orange-400 font-bold text-sm bg-orange-100 dark:bg-orange-900/50 px-3 py-1 rounded-lg border border-orange-200 dark:border-orange-800"><i className="fa-solid fa-flag mr-1"></i>Đã cờ</span>}
                                        {qStatus}
                                    </div>
                                </div>
                                <h3 className="text-lg md:text-xl font-bold text-slate-800 dark:text-slate-100 leading-relaxed mb-6 whitespace-pre-wrap">{q.question}</h3>
                                <div className="grid gap-3 mb-2">
                                    {['A', 'B', 'C', 'D', 'E'].map(key => {
                                        const label = q.options[key];
                                        if (!label) return null;
                                        
                                        const isUserChoice = answers[index] === key;
                                        const isCorrectOption = q.answer === key;
                                        
                                        let btnClass = "w-full p-4 rounded-xl border border-slate-200/60 dark:border-slate-600/60 text-left flex items-center gap-4 relative bg-white/40 dark:bg-slate-700/40 text-slate-600 dark:text-slate-400 opacity-60 grayscale";
                                        let spanClass = "w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200 dark:border-slate-600";
                                        
                                        if (isCorrectOption) {
                                            btnClass = "w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 relative bg-violet-50/80 dark:bg-violet-900/30 border-violet-500 dark:border-violet-600 text-violet-800 dark:text-violet-200 shadow-md ring-1 ring-violet-500 opacity-100 grayscale-0";
                                            spanClass = "w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 bg-violet-500 dark:bg-violet-600 text-white shadow-sm border-none";
                                        } else if (isUserChoice) {
                                            btnClass = "w-full p-4 rounded-xl border-2 text-left flex items-center gap-4 relative bg-red-50/80 dark:bg-red-900/30 border-red-400 dark:border-red-600 text-red-800 dark:text-red-200 shadow-md opacity-100 grayscale-0";
                                            spanClass = "w-8 h-8 rounded-lg flex items-center justify-center font-bold text-base shrink-0 bg-red-500 dark:bg-red-600 text-white shadow-sm border-none";
                                        }
                                        
                                        return (
                                            <div key={key} className={btnClass}>
                                                <span className={spanClass}>{key}</span>
                                                <span className="text-base font-medium leading-relaxed flex-1 pr-8 whitespace-pre-wrap">{label}</span>
                                                {isCorrectOption && <i className="fa-solid fa-circle-check text-2xl text-violet-500 dark:text-violet-400 absolute right-4 top-1/2 -translate-y-1/2 drop-shadow-sm"></i>}
                                                {isUserChoice && !isCorrectOption && <i className="fa-solid fa-circle-xmark text-2xl text-red-500 dark:text-red-400 absolute right-4 top-1/2 -translate-y-1/2 drop-shadow-sm"></i>}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        const currentQ = questions[currentIndex];
        const hasAnsweredCurrent = !!answers[currentIndex];
        
        return (
            <div className="space-y-4 relative z-10">
                {questions.length > 0 && currentQ && (
                    <div className="glass-panel rounded-[2rem] shadow-2xl p-6 md:p-8 md:px-10 relative overflow-hidden border-t-4 border-t-violet-500/80">
                        {currentQ.context && (
                            <div className="medical-record-box rounded-2xl p-5 md:p-6 mb-8 shadow-sm text-left animate-in fade-in slide-in-from-top-4 duration-500">
                                <div className="flex items-center gap-3 mb-3 border-b border-violet-200 dark:border-violet-800 pb-3">
                                    <div className="bg-violet-100 dark:bg-violet-900 p-2 rounded-lg">
                                        <i className="fa-solid fa-file-waveform text-violet-600 dark:text-violet-400 text-lg"></i>
                                    </div>
                                    <span className="font-black text-violet-800 dark:text-violet-300 uppercase text-sm tracking-wider">TÌNH HUỐNG LÂM SÀNG (Dùng cho câu {currentQ.id})</span>
                                </div>
                                <p className="text-slate-800 dark:text-slate-200 text-lg md:text-xl font-bold leading-relaxed whitespace-pre-wrap">{currentQ.context}</p>
                            </div>
                        )}
                        <div className="flex justify-between items-center mb-8">
                            <div className="flex items-center gap-2">
                                <span className="bg-gradient-to-r from-violet-500 to-fuchsia-600 text-white px-5 py-2 rounded-xl text-sm font-black uppercase tracking-widest shadow-md">Câu {currentQ.id}</span>
                                <span className="text-slate-500 dark:text-slate-400 font-bold text-xs tracking-widest uppercase ml-1">/ {questions.length}</span>
                            </div>
                            <button onClick={toggleFlag} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-bold border transition-all duration-300 shadow-sm hover:-translate-y-0.5 ${flagged.has(currentIndex) ? 'bg-orange-100 dark:bg-orange-900/60 border-orange-400 text-orange-600 dark:text-orange-400' : 'bg-white/80 dark:bg-slate-800/80 border-slate-200/80 dark:border-slate-600/80 text-slate-500 hover:text-slate-700 dark:hover:text-slate-200 hover:border-slate-300 dark:hover:border-slate-500'}`}>
                                <i className={`fa-solid fa-flag text-sm ${flagged.has(currentIndex) ? 'animate-pulse' : ''}`}></i>
                                <span>Đánh dấu cờ</span>
                            </button>
                        </div>
                        <h3 className="text-lg md:text-xl font-bold text-slate-800 dark:text-slate-100 leading-relaxed mb-8 whitespace-pre-wrap drop-shadow-sm">{currentQ.question}</h3>
                        <div className="grid gap-4">
                            {['A', 'B', 'C', 'D', 'E'].map(key => {
                                const label = currentQ.options[key];
                                if (!label) return null;
                                
                                const isSelected = answers[currentIndex] === key;
                                const isCorrect = currentQ.answer === key;
                                const showAnswerState = hasAnsweredCurrent;
                                
                                let btnClass = "group w-full p-4 md:p-5 rounded-2xl border border-white/60 dark:border-slate-600/50 text-left flex items-center gap-4 option-transition relative bg-white/70 dark:bg-slate-800/70 hover:border-violet-400 dark:hover:border-violet-500 hover:bg-white dark:hover:bg-slate-800 shadow-sm hover:shadow-lg transform hover:-translate-y-1 active:scale-[0.98]";
                                let spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all duration-300 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 shadow-sm group-hover:bg-violet-500 dark:group-hover:bg-violet-600 group-hover:text-white border border-slate-200 dark:border-slate-600 group-hover:border-transparent";
                                
                                if (showAnswerState) {
                                    if (isCorrect) {
                                        btnClass = "group w-full p-4 md:p-5 rounded-2xl border-2 text-left flex items-center gap-4 option-transition relative bg-green-50/95 dark:bg-green-900/40 border-green-500 dark:border-green-500 text-green-900 dark:text-green-100 shadow-md ring-4 ring-green-500/20 transform scale-[1.02] z-10";
                                        spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all bg-green-500 dark:bg-green-500 text-white shadow-sm border-none";
                                    } else if (isSelected) {
                                        btnClass = "group w-full p-4 md:p-5 rounded-2xl border-2 text-left flex items-center gap-4 option-transition relative bg-red-50/95 dark:bg-red-900/40 border-red-400 dark:border-red-500 text-red-900 dark:text-red-100 shadow-md ring-4 ring-red-500/20";
                                        spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all bg-red-500 dark:bg-red-500 text-white shadow-sm border-none";
                                    } else {
                                        btnClass = "group w-full p-4 md:p-5 rounded-2xl border text-left flex items-center gap-4 option-transition relative border-slate-200/50 dark:border-slate-700/50 bg-white/30 dark:bg-slate-800/30 text-slate-500 dark:text-slate-500 opacity-50 grayscale";
                                        spanClass = "w-10 h-10 rounded-xl flex items-center justify-center font-black text-base shrink-0 transition-all bg-slate-100/50 dark:bg-slate-700/50 text-slate-400 dark:text-slate-500 shadow-none border border-slate-200/50 dark:border-slate-700/50";
                                    }
                                }
                                
                                return (
                                    <button key={key} onClick={() => handleSelectAnswer(key)} disabled={showAnswerState} className={btnClass}>
                                        <span className={spanClass}>{key}</span>
                                        <span className="text-base font-semibold leading-relaxed flex-1 pr-8 whitespace-pre-wrap dark:text-slate-200">{label}</span>
                                        {showAnswerState && isCorrect && <i className="fa-solid fa-circle-check text-3xl text-violet-500 dark:text-violet-400 absolute right-5 top-1/2 -translate-y-1/2 drop-shadow-md animate-in zoom-in duration-300"></i>}
                                        {showAnswerState && isSelected && !isCorrect && <i className="fa-solid fa-circle-xmark text-3xl text-red-500 dark:text-red-400 absolute right-5 top-1/2 -translate-y-1/2 drop-shadow-md animate-in zoom-in duration-300"></i>}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                )}

                {questions.length > 0 && (
                    <div className="flex items-center justify-between gap-4 pt-6 pb-20 md:pb-4 relative z-10">
                        <button onClick={() => setCurrentIndex(p => Math.max(0, p - 1))} disabled={currentIndex === 0} className="flex-1 glass-panel px-6 py-4 rounded-2xl font-bold text-slate-600 dark:text-slate-300 hover:text-violet-600 dark:hover:text-violet-400 hover:border-violet-300 dark:hover:border-violet-600 disabled:opacity-0 transition-all duration-300 flex items-center justify-center gap-2 uppercase tracking-wide text-sm shadow-sm hover:shadow-md hover:-translate-y-1">
                            <i className="fa-solid fa-arrow-left text-base"></i> 
                            <span className="hidden sm:inline">Câu trước</span>
                        </button>
                        <button onClick={() => setCurrentIndex(p => Math.min(questions.length - 1, p + 1))} disabled={currentIndex === questions.length - 1} className="flex-1 btn-gradient text-white px-6 py-4 rounded-2xl font-bold transition-all duration-300 shadow-lg hover:shadow-violet-500/40 flex items-center justify-center gap-2 uppercase tracking-wide text-sm hover:-translate-y-1">
                            <span className="hidden sm:inline">Câu tiếp</span> 
                            <i className="fa-solid fa-arrow-right text-base"></i>
                        </button>
                    </div>
                )}
            </div>
        );
    };

    if (appState === 'intro') {
        return (
            <div className="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
                {renderBackgroundBlobs()}
                <div className="absolute top-4 right-4 z-50 flex gap-3">
                    <button onClick={() => setIsSoundEnabled(!isSoundEnabled)} className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                        {isSoundEnabled ? <i className="fa-solid fa-volume-high text-xl text-violet-500"></i> : <i className="fa-solid fa-volume-xmark text-xl text-slate-400"></i>}
                    </button>
                    <button onClick={() => setZoomLevel(prev => Math.min(prev + 10, 150))} title="Phóng to" className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                          <i className="fa-solid fa-magnifying-glass-plus text-xl text-emerald-500"></i>
                      </button>
                      <button onClick={() => setZoomLevel(prev => Math.max(prev - 10, 50))} title="Thu nhỏ" className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                          <i className="fa-solid fa-magnifying-glass-minus text-xl text-pink-500"></i>
                      </button>
                      <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-3 glass-panel shadow-lg rounded-full hover:bg-white/90 dark:hover:bg-slate-700/90 transition-all duration-300 text-slate-600 dark:text-slate-300 hover:scale-110">
                        {isDarkMode ? <i className="fa-solid fa-sun text-xl text-amber-500"></i> : <i className="fa-solid fa-moon text-xl text-violet-500"></i>}
                    </button>
                </div>
                <div className="max-w-2xl w-full glass-panel rounded-[2.5rem] shadow-2xl overflow-hidden relative z-10 border-t border-l border-white/80 dark:border-slate-700/50 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="p-12 pb-8 flex flex-col items-center text-center relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-violet-500/10 to-fuchsia-600/10 dark:from-violet-900/20 dark:to-fuchsia-900/20 pointer-events-none"></div>
                        <div className="w-24 h-24 bg-white dark:bg-slate-800 rounded-full mb-6 shadow-xl border border-violet-100 dark:border-slate-700 flex items-center justify-center relative group">
                            <div className="absolute inset-0 bg-violet-400 rounded-full opacity-20 group-hover:scale-150 transition-transform duration-700"></div>
                            <i className="fa-solid fa-staff-snake text-5xl bg-clip-text text-transparent bg-gradient-to-br from-violet-500 to-fuchsia-600 drop-shadow-sm text-violet-500"></i>
                        </div>
                        <h1 className="text-4xl md:text-5xl font-black uppercase tracking-tighter mb-3 z-10 bg-clip-text text-transparent bg-gradient-to-r from-violet-600 to-fuchsia-600 dark:from-violet-400 dark:to-fuchsia-400 drop-shadow-sm">NỘI KHOA LÂM SÀNG</h1>
                        <p className="text-violet-700 dark:text-violet-300 text-lg font-bold tracking-widest uppercase z-10 opacity-80">CHUYÊN ĐỀ: VIÊM KHỚP DẠNG THẤP</p>
                    </div>
                    <div className="p-10 pt-2 bg-white/40 dark:bg-slate-900/40 backdrop-blur-md">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                            <div className="flex items-center gap-4 bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-md">
                                <div className="bg-violet-100 dark:bg-violet-900/50 w-12 h-12 flex items-center justify-center rounded-xl text-violet-600 dark:text-violet-400 shadow-inner"><i className="fa-solid fa-layer-group text-xl"></i></div>
                                <div><p className="text-[10px] text-slate-500 dark:text-slate-400 font-black uppercase tracking-widest mb-1">Tổng câu hỏi</p><p className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-none">{questions.length}</p></div>
                            </div>
                            <div className="flex items-center gap-4 bg-white/70 dark:bg-slate-800/70 p-5 rounded-2xl border border-white/50 dark:border-slate-700/50 shadow-sm transition-transform duration-300 hover:-translate-y-1 hover:shadow-md">
                                <div className="bg-fuchsia-100 dark:bg-fuchsia-900/50 w-12 h-12 flex items-center justify-center rounded-xl text-fuchsia-600 dark:text-fuchsia-400 shadow-inner"><i className="fa-regular fa-hourglass-half text-xl"></i></div>
                                <div><p className="text-[10px] text-slate-500 dark:text-slate-400 font-black uppercase tracking-widest mb-1">Thời gian</p><p className="text-2xl font-black text-slate-800 dark:text-slate-100 leading-none">{questions.length} Phút</p></div>
                            </div>
                        </div>
                        <div className="bg-violet-50/80 dark:bg-violet-900/20 rounded-2xl p-6 mb-10 border border-violet-100 dark:border-violet-800/30 flex items-start gap-4 text-violet-900 dark:text-violet-100 shadow-inner">
                            <i className="fa-solid fa-circle-info shrink-0 mt-0.5 text-2xl text-fuchsia-600 dark:text-fuchsia-400"></i>
                            <div className="text-base leading-relaxed font-medium">
                                <p className="font-bold mb-3 text-fuchsia-800 dark:text-fuchsia-300 text-lg">Hướng dẫn làm bài:</p>
                                <ul className="list-disc pl-5 space-y-2 opacity-90 marker:text-fuchsia-600 dark:marker:text-fuchsia-400">
                                    <li>Kết quả đúng/sai sẽ hiển thị <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">ngay lập tức</strong> khi chọn.</li>
                                    <li>Khi đã chọn, bạn <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">không thể thay đổi</strong> đáp án của câu đó.</li>
                                    <li>Sử dụng nút <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">Đánh dấu cờ</strong> để lưu lại những câu khó.</li>
                                    <li>Được biên soạn bởi <strong className="text-fuchsia-900 dark:text-fuchsia-200 font-bold">TEAMDRCAT</strong>.</li>
                                </ul>
                            </div>
                        </div>
                        <button onClick={startQuiz} className="w-full btn-gradient text-white text-xl font-black py-5 rounded-2xl transition-all duration-300 shadow-[0_10px_20px_-10px_rgba(139,92,246,0.6)] hover:shadow-[0_15px_25px_-10px_rgba(139,92,246,0.8)] flex items-center justify-center gap-3 uppercase tracking-widest hover:-translate-y-1 active:scale-95 border border-white/20">
                            <i className="fa-solid fa-rocket text-xl"></i> Bắt đầu ngay
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    return (
        <div className="min-h-screen flex flex-col md:flex-row relative bg-animated">
            {renderBackgroundBlobs()}
            {showMatrix && <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 md:hidden transition-opacity" onClick={() => setShowMatrix(false)}></div>}
            
            <aside className={`fixed md:sticky top-0 right-0 h-screen w-[320px] md:w-[400px] glass-panel z-50 flex flex-col transition-transform duration-500 ease-in-out ${showMatrix ? 'translate-x-0' : 'translate-x-full md:translate-x-0'} md:order-2 shadow-[-10px_0_30px_rgba(0,0,0,0.05)] dark:shadow-none border-l border-white/40 dark:border-slate-700/50`}>
                <div className="p-6 border-b border-slate-200/50 dark:border-slate-700/50 flex justify-between items-center bg-white/40 dark:bg-slate-800/40 backdrop-blur-md sticky top-0 z-10">
                    <h2 className="font-black text-slate-800 dark:text-slate-100 flex items-center gap-3 uppercase tracking-tighter text-base"><div className="w-8 h-8 rounded-lg bg-violet-100 dark:bg-violet-900/50 flex items-center justify-center text-violet-600 dark:text-violet-400"><i className="fa-solid fa-grip"></i></div> Bảng câu hỏi</h2>
                    <button className="md:hidden text-slate-500 p-2 bg-white/50 dark:bg-slate-700/50 rounded-full hover:bg-white dark:hover:bg-slate-600 transition-colors shadow-sm" onClick={() => setShowMatrix(false)}><i className="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar grid grid-cols-5 gap-3 content-start">
                    {questions.map((q, i) => {
                        let navBtnClass = "h-12 w-full rounded-xl text-sm font-black border transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-white/60 dark:bg-slate-700/60 text-slate-500 border-white/50 dark:border-slate-600/50 dark:text-slate-300 shadow-sm hover:-translate-y-1 hover:shadow-md";
                        if (!!answers[i]) {
                            if (answers[i] === q.answer) {
                                navBtnClass = "h-12 w-full rounded-xl text-sm font-black border-2 transition-all duration-300 relative flex items-center justify-center hover:brightness-95 bg-green-100/90 dark:bg-green-900/60 text-green-700 dark:text-green-300 border-green-400/50 dark:border-green-600/50 shadow-sm hover:-translate-y-1";
                            } else {
