<script type="text/template" id="quizData">
TÌNH HUỐNG LÂM SÀNG VIÊM KHỚP DẠNG THẤP
TEAMDRCAT
Tài liệu được biên soạn dựa trên kiến thức chuẩn Y Hà Nội và các Hướng dẫn Y Khoa cập nhật
Nghiêm cấm sao chép dưới mọi hình thức !!

TÌNH HUỐNG LÂM SÀNG 1
Một phụ nữ 48 tuổi đến khám vì đau và sưng đối xứng ở các khớp bàn ngón tay (MCP) và khớp ngón gần (PIP) cả hai bên trong 3 tháng. Bà cho biết có tình trạng cứng khớp buổi sáng kéo dài khoảng 90 phút. Tiền sử không có gì đặc biệt. Khám lâm sàng thấy các khớp MCP và PIP sưng, ấm và đau khi sờ nắn. Xét nghiệm ban đầu cho thấy tốc độ máu lắng (ESR) tăng và yếu tố dạng thấp (RF) dương tính ở nồng độ thấp.
Câu 1:
Bước chẩn đoán tiếp theo có giá trị nhất để xác định chẩn đoán là gì?
A. Chụp X-quang bàn tay hai bên
B. Xét nghiệm kháng thể kháng nhân (ANA)
C. Xét nghiệm kháng thể kháng peptide citrullinated vòng (anti-CCP)
D. Chọc hút dịch khớp
Đáp án: C
Giải thích: Xét nghiệm anti-CCP có độ đặc hiệu rất cao (khoảng 95%) đối với viêm khớp dạng thấp, cao hơn so với yếu tố dạng thấp (RF).  Sự hiện diện của anti-CCP, đặc biệt ở bệnh nhân có biểu hiện lâm sàng gợi ý, giúp xác định chẩn đoán và cũng là một yếu tố tiên lượng bệnh tiến triển nặng hơn.
Tại sao các lựa chọn khác là sai:
A: X-quang ở giai đoạn sớm (dưới 3-6 tháng) thường không thấy tổn thương bào mòn xương điển hình, có thể chỉ thấy sưng phần mềm hoặc mất khoáng đầu xương. 
B: ANA không đặc hiệu cho VKDT và thường được chỉ định khi nghi ngờ các bệnh tự miễn khác như lupus ban đỏ hệ thống. 
D: Chọc hút dịch khớp hữu ích để loại trừ viêm khớp nhiễm khuẩn hoặc viêm khớp do vi tinh thể (gout), nhưng không phải là bước đầu tiên để xác định chẩn đoán VKDT khi lâm sàng đã rõ ràng. 
Câu 2:
Tổn thương cơ bản trong cơ chế bệnh sinh của tình trạng này là gì?
A. Thoái hóa sụn khớp do quá tải cơ học
B. Lắng đọng tinh thể urat trong màng hoạt dịch
C. Viêm mạn tính màng hoạt dịch do cơ chế tự miễn
D. Nhiễm khuẩn trực tiếp vào khoang khớp
Đáp án: C
Giải thích: Viêm khớp dạng thấp là một bệnh tự miễn hệ thống, đặc trưng bởi tình trạng viêm mạn tính không đặc hiệu của màng hoạt dịch. Quá trình viêm này dẫn đến sự tăng sinh của màng hoạt dịch (pannus), xâm lấn và phá hủy sụn khớp và xương dưới sụn. 
Tại sao các lựa chọn khác là sai:
A: Đây là cơ chế của bệnh thoái hóa khớp (osteoarthritis).
B: Đây là cơ chế của bệnh gout.
D: Đây là cơ chế của viêm khớp nhiễm khuẩn (septic arthritis).
Câu 3:
Nếu bệnh nhân này không được điều trị, biến dạng nào sau đây có khả năng xuất hiện muộn nhất ở bàn tay?
A. Ngón tay hình thoi 
B. Bàn tay gió thổi 
C. Ngón tay hình cổ cò 
D. Teo cơ gian cốt mu tay
Đáp án: B
Giải thích: Bàn tay gió thổi (lệch trục về phía xương trụ) là một biến dạng muộn, xảy ra do tình trạng viêm kéo dài gây lỏng lẻo dây chằng, tổn thương bao khớp và bán trật các khớp bàn ngón tay (MCP). 
Tại sao các lựa chọn khác là sai:
A: Ngón tay hình thoi do sưng khớp ngón gần là một trong những biểu hiện sớm nhất. 
C: Ngón tay hình cổ cò và ngón tay thùa khuyết là những biến dạng muộn nhưng thường xuất hiện trước khi có tình trạng lệch trục toàn bộ bàn tay. 
D: Teo cơ gian cốt mu tay xảy ra do giảm vận động vì đau và viêm, là một dấu hiệu sớm đến trung gian.
Câu 4:
Bác sĩ thảo luận về các lựa chọn điều trị và giải thích rằng mục tiêu chính của điều trị sớm là để "thay đổi diễn tiến của bệnh". Thuốc nào sau đây thuộc nhóm thuốc đó?
A. Celecoxib
B. Prednisone
C. Methotrexate
D. Tramadol
Đáp án: C
Giải thích: Methotrexate là một thuốc chống thấp khớp thay đổi bệnh (DMARD) kinh điển và là lựa chọn đầu tay trong điều trị VKDT. DMARDs có tác dụng làm chậm sự tiến triển của bệnh, ngăn ngừa hoặc làm chậm quá trình phá hủy khớp và duy trì chức năng vận động. 
Tại sao các lựa chọn khác là sai:
A: Celecoxib là một thuốc chống viêm không steroid (NSAID), chỉ có tác dụng giảm triệu chứng viêm và đau, không thay đổi được diễn tiến bệnh. 
B: Prednisone là một glucocorticoid, có tác dụng chống viêm mạnh nhưng chỉ được dùng ngắn hạn để kiểm soát đợt cấp và làm cầu nối trong khi chờ DMARDs phát huy tác dụng; sử dụng lâu dài gây nhiều tác dụng phụ và không ngăn chặn hoàn toàn tổn thương khớp. 
D: Tramadol là thuốc giảm đau trung ương, không có tác dụng chống viêm hay thay đổi bệnh.

TÌNH HUỐNG LÂM SÀNG 2
Một phụ nữ 55 tuổi, được chẩn đoán viêm khớp dạng thấp cách đây 6 năm, đang điều trị bằng Methotrexate 15 mg/tuần và Folic acid. Gần đây, bà cảm thấy bệnh không được kiểm soát tốt với sưng đau nhiều khớp và chỉ số DAS28 là 5.3. Bệnh nhân có tiền sử viêm gan B mạn tính đã ổn định và không điều trị. Bác sĩ quyết định thêm một thuốc sinh học vào phác đồ.
Câu 1:
Xét nghiệm nào là bắt buộc phải thực hiện trước khi bắt đầu điều trị bằng thuốc sinh học kháng TNF-α?
A. Đo mật độ xương
B. Sàng lọc lao tiềm ẩn
C. Siêu âm tim
D. Soi đáy mắt
Đáp án: B
Giải thích: Các thuốc sinh học, đặc biệt là nhóm kháng TNF-α, làm tăng nguy cơ tái hoạt động của lao tiềm ẩn. Do đó, tất cả các hướng dẫn đều yêu cầu phải sàng lọc lao tiềm ẩn (bằng xét nghiệm TST hoặc IGRA và X-quang ngực) trước khi khởi trị. Nếu dương tính, bệnh nhân cần được điều trị dự phòng lao.
Tại sao các lựa chọn khác là sai:
A: Đo mật độ xương quan trọng để theo dõi loãng xương (một biến chứng của VKDT và điều trị corticoid) nhưng không phải là xét nghiệm bắt buộc trước khi dùng thuốc sinh học.
C: Siêu âm tim cần thiết nếu nghi ngờ có biểu hiện tim mạch của VKDT, nhưng không phải là sàng lọc thường quy trước khi dùng thuốc kháng TNF-α.
D: Soi đáy mắt được chỉ định theo dõi khi dùng Hydroxychloroquine, không liên quan đến thuốc kháng TNF-α. 
Câu 2:
Ngoài sàng lọc lao, bệnh nhân này cần được đánh giá tình trạng nào khác do có tiền sử đặc biệt?
A. Chức năng tuyến giáp
B. Tái hoạt động virus viêm gan B (HBV)
C. Nồng độ Vitamin D
D. Chức năng thận
Đáp án: B
Giải thích: Bệnh nhân có tiền sử viêm gan B mạn tính. Các thuốc ức chế miễn dịch, bao gồm cả DMARDs sinh học (đặc biệt là Rituximab) và csDMARDs (như Methotrexate), có thể gây tái hoạt động virus viêm gan B, dẫn đến viêm gan bùng phát và suy gan cấp. Cần xét nghiệm HBsAg, anti-HBc, và HBV DNA để đánh giá nguy cơ và cân nhắc điều trị dự phòng bằng thuốc kháng virus. 
Tại sao các lựa chọn khác là sai:
A, C: Không phải là các xét nghiệm cần thiết đặc biệt liên quan đến nguy cơ của thuốc sinh học trong bối cảnh này.
D: Chức năng thận cần được theo dõi định kỳ khi dùng Methotrexate và NSAIDs, nhưng nguy cơ tái hoạt động HBV là mối quan tâm hàng đầu và đặc hiệu khi thêm thuốc sinh học ở bệnh nhân này. 
Câu 3:
Cơ chế tác dụng của Infliximab, một thuốc sinh học có thể được lựa chọn, là gì?
A. Ức chế Interleukin-1 (IL-1)
B. Ức chế Interleukin-6 (IL-6)
C. Gắn và trung hòa yếu tố hoại tử u alpha (TNF-α)
D. Gây ly giải tế bào lympho B mang dấu ấn CD20
Đáp án: C
Giải thích: Infliximab (Remicade) là một kháng thể đơn dòng chimeric, có tác dụng gắn kết và trung hòa cả dạng hòa tan và dạng xuyên màng của TNF-α. TNF-α là một cytokine tiền viêm đóng vai trò trung tâm trong cơ chế bệnh sinh của VKDT, gây viêm màng hoạt dịch và phá hủy khớp. 
Tại sao các lựa chọn khác là sai:
A: Anakinra là thuốc ức chế IL-1. 
B: Tocilizumab là thuốc ức chế thụ thể IL-6. 
D: Rituximab là thuốc kháng CD20 trên tế bào B. 
Câu 4:
Bệnh nhân được tư vấn rằng việc thêm thuốc sinh học có thể làm tăng nguy cơ nhiễm trùng. Tác nhân nhiễm trùng nào, ngoài lao, cần được đặc biệt quan tâm ở những bệnh nhân dùng thuốc ức chế TNF-α?
A. Nhiễm trùng đường tiểu do E. coli
B. Viêm họng do Streptococcus pyogenes
C. Nhiễm nấm xâm lấn 
D. Nhiễm virus Herpes Zoster
Đáp án: C
Giải thích: Bệnh nhân VKDT dùng thuốc sinh học, đặc biệt là thuốc kháng TNF-α, có nguy cơ cao hơn đối với các bệnh nhiễm trùng cơ hội, bao gồm cả nhiễm nấm xâm lấn (như Histoplasmosis, Aspergillosis) và các nhiễm khuẩn nội bào khác.  Nguy cơ này cao hơn so với dân số chung và cần được cảnh báo cho bệnh nhân.
Tại sao các lựa chọn khác là sai:
A, B: Đây là các nhiễm khuẩn cộng đồng phổ biến, nguy cơ có thể tăng nhưng không đặc hiệu và đáng lo ngại bằng nhiễm trùng cơ hội.
D: Nguy cơ Herpes Zoster (bệnh zona) tăng ở bệnh nhân VKDT, đặc biệt với nhóm thuốc ức chế JAK, nhưng nhiễm nấm xâm lấn là một mối quan tâm đặc biệt với nhóm kháng TNF-α.

TÌNH HUỐNG LÂM SÀNG 3
Một nam bệnh nhân 60 tuổi, tiền sử hút thuốc lá 30 bao-năm, đến khám vì đau và biến dạng các khớp bàn tay tiến triển trong 10 năm. Ông không tuân thủ điều trị thường xuyên. Khám lâm sàng ghi nhận biến dạng "bàn tay gió thổi" và "ngón tay thùa khuyết" ở cả hai tay. Trên da vùng khuỷu tay và dọc xương trụ có các nốt cứng, chắc, không đau, đường kính khoảng 1-2 cm.
Câu 1:
Các nốt trên da của bệnh nhân nhiều khả năng nhất là gì?
A. Hạt Tophi 
B. Hạt Heberden
C. U mỡ 
D. Hạt dạng thấp 
Đáp án: D
Giải thích: Hạt dạng thấp là biểu hiện ngoài khớp phổ biến nhất của viêm khớp dạng thấp. Chúng là các nốt cứng, không đau, thường xuất hiện ở các vị trí tỳ đè như khuỷu tay, xương trụ, hoặc gân Achilles. Mô tả của bệnh nhân hoàn toàn phù hợp với đặc điểm này.
Tại sao các lựa chọn khác là sai:
A: Hạt Tophi là biểu hiện của bệnh Gout mạn tính, là sự lắng đọng của các tinh thể urat.
B: Hạt Heberden là các chồi xương ở khớp ngón xa, là đặc trưng của thoái hóa khớp bàn tay.
C: U mỡ là các khối u lành tính của mô mỡ, thường mềm và di động hơn.
Câu 2:
Hình ảnh X-quang bàn tay của bệnh nhân này được dự đoán sẽ cho thấy tổn thương nào sau đây?
A. Gai xương ở rìa khớp
B. Dấu hiệu "bào mòn hình con chuột" 
C. Hẹp khe khớp không đối xứng
D. Bào mòn xương, dính và bán trật khớp 
Đáp án: D
Giải thích: Ở giai đoạn muộn và tiến triển của VKDT, X-quang sẽ cho thấy các tổn thương phá hủy khớp nặng, bao gồm hình ảnh bào mòn xương ở rìa khớp, hẹp khe khớp lan tỏa, và cuối cùng là dính khớp (ankylosis) và bán trật khớp (subluxation), tương ứng với giai đoạn IV theo Steinbrocker. 
Tại sao các lựa chọn khác là sai:
A, C: Gai xương và hẹp khe khớp không đối xứng là đặc điểm của thoái hóa khớp.
B: Dấu hiệu "bào mòn hình con chuột" (hình khuyết xương có bờ xơ xương) là hình ảnh điển hình của Gout mạn tính có hạt tophi.
Câu 3:
Bệnh nhân này có nguy cơ cao bị biến chứng nào sau đây ở cột sống?
A. Thoát vị đĩa đệm thắt lưng
B. Hẹp ống sống thắt lưng
C. Viêm khớp cùng chậu 
D. Bán trật khớp đội-trục 
Đáp án: D
Giải thích: Viêm khớp dạng thấp có thể ảnh hưởng đến cột sống cổ, đặc biệt là khớp giữa đốt đội (C1) và đốt trục (C2). Tình trạng viêm mạn tính có thể gây lỏng lẻo dây chằng ngang, dẫn đến bán trật khớp đội-trục. Đây là một biến chứng nguy hiểm, có thể gây chèn ép tủy sống và các triệu chứng thần kinh. 
Tại sao các lựa chọn khác là sai:
A, B: VKDT hiếm khi ảnh hưởng đến cột sống thắt lưng; các vấn đề này thường liên quan đến thoái hóa cột sống.
C: Viêm khớp cùng chậu là đặc trưng của nhóm bệnh lý cột sống huyết thanh âm tính (ví dụ: viêm cột sống dính khớp).
Câu 4:
Ngoài các vấn đề về khớp, tiền sử hút thuốc lá nặng làm tăng đáng kể nguy cơ phát triển biểu hiện ngoài khớp nào ở bệnh nhân này?
A. Hội chứng Felty 
B. Bệnh phổi kẽ 
C. Viêm mống mắt 
D. Nhiễm bột thận 
Đáp án: B
Giải thích: Hút thuốc lá là một yếu tố nguy cơ môi trường mạnh mẽ đối với sự phát triển và mức độ nặng của VKDT. Nó đặc biệt liên quan đến sự hình thành anti-CCP và làm tăng đáng kể nguy cơ phát triển bệnh phổi kẽ, một biến chứng ngoài khớp nghiêm trọng có thể gây suy hô hấp.
Tại sao các lựa chọn khác là sai:
A, D: Hội chứng Felty (VKDT, giảm bạch cầu trung tính, lách to) và nhiễm bột thận là các biến chứng hiếm gặp và không có mối liên hệ mạnh mẽ với hút thuốc như bệnh phổi kẽ. 
C: Viêm mống mắt thường liên quan đến các bệnh lý cột sống huyết thanh âm tính hơn là VKDT. 

TÌNH HUỐNG LÂM SÀNG 4
Một phụ nữ 34 tuổi đến khám vì đau nhiều khớp nhỏ ở tay và chân kéo dài 8 tuần. Bà bị cứng khớp buổi sáng khoảng 2 giờ. Khám thấy sưng đau 5 khớp bàn ngón (MCP), 4 khớp ngón gần (PIP), và cả hai khớp cổ tay. Xét nghiệm máu cho thấy CRP tăng, RF dương tính mạnh (>3 lần giới hạn trên của mức bình thường) và anti-CCP cũng dương tính mạnh.
Câu 1:
Dựa trên tiêu chuẩn phân loại VKDT của ACR/EULAR 2010, bệnh nhân này có bao nhiêu điểm?
A. 5 điểm
B. 7 điểm
C. 8 điểm
D. 10 điểm
Đáp án: D
Giải thích: Tính điểm theo ACR/EULAR 2010:
A. Tổn thương khớp: >10 khớp (trong đó có ít nhất 1 khớp nhỏ) = 5 điểm.  (Bệnh nhân có 5 MCP + 4 PIP + 2 cổ tay = 11 khớp nhỏ).
B. Huyết thanh: RF (+) mạnh và anti-CCP (+) mạnh = 3 điểm. 
C. Phản ứng pha cấp: CRP tăng = 1 điểm. 
D. Thời gian có triệu chứng: ≥ 6 tuần = 1 điểm. 
Tổng cộng: 5 + 3 + 1 + 1 = 10 điểm. Chẩn đoán xác định VKDT khi có ≥ 6 điểm. 
Tại sao các lựa chọn khác là sai:
A, B, C: Tính toán sai số điểm dựa trên các tiêu chí đã cho.
Câu 2:
Bệnh nhân được bắt đầu điều trị bằng Methotrexate (MTX). Bác sĩ cần tư vấn cho bệnh nhân về tác dụng phụ tiềm tàng nào sau đây của MTX?
A. Tăng đường huyết
B. Loét miệng và buồn nôn
C. Tăng cân
D. Tổn thương võng mạc
Đáp án: B
Giải thích: Các tác dụng phụ thường gặp của Methotrexate liều thấp bao gồm các vấn đề về đường tiêu hóa như buồn nôn, nôn, và viêm loét niêm mạc miệng (stomatitis).  Các tác dụng phụ nghiêm trọng hơn bao gồm ức chế tủy xương và nhiễm độc gan.
Tại sao các lựa chọn khác là sai:
A, C: Tăng đường huyết và tăng cân là tác dụng phụ điển hình của glucocorticoid.
D: Tổn thương võng mạc là một tác dụng phụ hiếm gặp nhưng nghiêm trọng của Hydroxychloroquine, đòi hỏi phải theo dõi nhãn khoa định kỳ. 
Câu 3:
Để giảm thiểu nguy cơ mắc một số tác dụng phụ của Methotrexate, bác sĩ nên kê đơn bổ sung thuốc nào sau đây?
A. Vitamin B12
B. Canxi và Vitamin D
C. Acid Folic
D. Sắt
Đáp án: C
Giải thích: Methotrexate là một chất đối kháng acid folic. Bổ sung acid folic hàng ngày (trừ ngày uống MTX) đã được chứng minh là làm giảm đáng kể tần suất và mức độ nghiêm trọng của các tác dụng phụ liên quan đến MTX như loét miệng, buồn nôn và tăng men gan mà không làm giảm hiệu quả của thuốc. 
Tại sao các lựa chọn khác là sai:
A: Bổ sung vitamin B12 không có vai trò trong việc giảm độc tính của MTX.
B: Bổ sung canxi và vitamin D rất quan trọng để phòng ngừa loãng xương, đặc biệt nếu bệnh nhân dùng corticoid, nhưng không làm giảm tác dụng phụ của MTX.
D: Bổ sung sắt được chỉ định nếu có thiếu máu do thiếu sắt, nhưng không dự phòng được các tác dụng phụ khác của MTX.
Câu 4:
Bệnh nhân hỏi về việc mang thai trong tương lai. Lời khuyên nào sau đây là phù hợp nhất liên quan đến việc sử dụng Methotrexate?
A. Methotrexate an toàn để sử dụng trong ba tháng đầu của thai kỳ.
B. Cần phải ngừng Methotrexate ít nhất 3 tháng trước khi cố gắng thụ thai.
C. Chỉ cần giảm liều Methotrexate khi mang thai.
D. Có thể tiếp tục dùng Methotrexate nhưng cần theo dõi thai kỳ chặt chẽ.
Đáp án: B
Giải thích: Methotrexate là một chất gây quái thai mạnh và chống chỉ định tuyệt đối trong thai kỳ. Do thuốc có thể tồn tại trong cơ thể, các hướng dẫn khuyến cáo cả nam và nữ nên ngừng sử dụng MTX ít nhất 3 tháng (hoặc một chu kỳ sinh tinh/noãn) trước khi cố gắng thụ thai để đảm bảo thuốc được thải trừ hoàn toàn và giảm nguy cơ dị tật bẩm sinh. 
Tại sao các lựa chọn khác là sai:
A, C, D: Các lựa chọn này đều sai và gây nguy hiểm cho thai nhi. MTX phải được ngừng hoàn toàn trước khi thụ thai.

TÌNH HUỐNG LÂM SÀNG 5
Một phụ nữ 62 tuổi bị viêm khớp dạng thấp huyết thanh dương tính lâu năm, đã thất bại với điều trị Methotrexate và Sulfasalazine. Bà có các biến dạng khớp đáng kể và chỉ số hoạt động bệnh DAS28 là 4.8 (mức độ trung bình). Bác sĩ đang xem xét việc bắt đầu điều trị bằng một thuốc sinh học ức chế Interleukin-6 (IL-6).
Câu 1:
Thuốc nào sau đây hoạt động bằng cách ức chế thụ thể Interleukin-6?
A. Adalimumab
B. Rituximab
C. Tocilizumab
D. Abatacept
Đáp án: C
Giải thích: Tocilizumab (Actemra) là một kháng thể đơn dòng tái tổ hợp nhân hóa, hoạt động bằng cách gắn vào cả thụ thể IL-6 hòa tan và gắn trên màng tế bào, từ đó ức chế tín hiệu của IL-6.  IL-6 là một cytokine quan trọng trong việc thúc đẩy phản ứng viêm hệ thống và tại khớp trong VKDT.
Tại sao các lựa chọn khác là sai:
A: Adalimumab (Humira) là một thuốc kháng TNF-α. 
B: Rituximab (Rituxan) là một thuốc kháng CD20, gây ly giải tế bào B. 
D: Abatacept (Orencia) là một chất điều hòa đồng kích thích tế bào T. 
Câu 2:
Ngoài việc làm giảm các triệu chứng ở khớp, việc ức chế IL-6 được kỳ vọng sẽ cải thiện đáng kể chỉ số xét nghiệm nào sau đây, vốn thường tăng cao trong VKDT?
A. Nồng độ Creatinine huyết thanh
B. Nồng độ Hemoglobin
C. Nồng độ anti-CCP
D. Nồng độ Globulin miễn dịch M (IgM)
Đáp án: B
Giải thích: IL-6 đóng vai trò chính trong tình trạng thiếu máu do viêm mạn tính (anemia of chronic disease), một biểu hiện phổ biến trong VKDT. IL-6 kích thích gan sản xuất hepcidin, một protein làm giảm hấp thu sắt và giữ sắt trong đại thực bào, dẫn đến thiếu sắt chức năng. Bằng cách ức chế IL-6, nồng độ hepcidin giảm, cho phép sắt được sử dụng để tạo hồng cầu, từ đó cải thiện nồng độ hemoglobin. 
Tại sao các lựa chọn khác là sai:
A: Creatinine phản ánh chức năng thận và không bị ảnh hưởng trực tiếp bởi IL-6.
C, D: Nồng độ anti-CCP và RF (thường là IgM) là các tự kháng thể, việc sản xuất chúng bị ảnh hưởng bởi nhiều yếu tố miễn dịch khác và không giảm nhanh chóng hay trực tiếp khi ức chế IL-6.
Câu 3:
Một tác dụng phụ cần theo dõi đặc trưng khi sử dụng Tocilizumab là gì?
A. Giảm bạch cầu trung tính và tăng men gan
B. Rụng tóc
C. Tăng acid uric máu
D. Rối loạn sắc tố da
Đáp án: A
Giải thích: Việc ức chế IL-6 có thể dẫn đến giảm số lượng bạch cầu trung tính (neutropenia) và tăng men gan (transaminitis). Do đó, công thức máu và chức năng gan phải được theo dõi định kỳ trước khi bắt đầu và trong suốt quá trình điều trị bằng Tocilizumab. Ngoài ra, rối loạn lipid máu cũng là một tác dụng phụ cần lưu ý.
Tại sao các lựa chọn khác là sai:
B: Rụng tóc có thể liên quan đến bệnh (ví dụ lupus) hoặc một số thuốc khác nhưng không phải là tác dụng phụ điển hình của Tocilizumab.
C: Tăng acid uric máu liên quan đến Gout.
D: Rối loạn sắc tố da có thể là tác dụng phụ của Hydroxychloroquine. 
Câu 4:
Bệnh nhân bày tỏ sự lo lắng về việc phải đến bệnh viện thường xuyên để truyền thuốc tĩnh mạch (IV). Bác sĩ thông báo rằng nhiều thuốc sinh học hiện nay có dạng tiêm dưới da (SC). Trong các thuốc sau, thuốc nào chỉ có đường dùng là truyền tĩnh mạch (IV) để điều trị VKDT?
A. Etanercept 
B. Adalimumab 
C. Infliximab 
D. Certolizumab pegol 
Đáp án: C
Giải thích: Infliximab là một trong những thuốc kháng TNF-α đầu tiên và chỉ được chấp thuận sử dụng qua đường truyền tĩnh mạch.  Phác đồ thường là các liều tấn công ở tuần 0, 2, 6 và sau đó duy trì mỗi 8 tuần.
Tại sao các lựa chọn khác là sai:
A, B, D: Etanercept, Adalimumab, và Certolizumab đều có dạng tiêm dưới da, cho phép bệnh nhân tự tiêm tại nhà. 

TÌNH HUỐNG LÂM SÀNG 6
Một phụ nữ 40 tuổi được chẩn đoán VKDT giai đoạn sớm, hoạt động bệnh mức độ trung bình (DAS28 = 4.2). Bệnh nhân có loét dạ dày tá tràng cách đây 5 năm do H. pylori, đã điều trị khỏi. Bác sĩ kê đơn Methotrexate và một liệu trình ngắn hạn thuốc chống viêm để giảm nhanh triệu chứng trong khi chờ MTX phát huy tác dụng.
Câu 1:
Loại thuốc chống viêm nào là lựa chọn phù hợp nhất cho bệnh nhân này để làm "cầu nối" (bridging therapy)?
A. Diclofenac liều cao
B. Celecoxib kết hợp với một thuốc ức chế bơm proton (PPI)
C. Prednisone liều thấp đường uống
D. Ketorolac tiêm bắp
Đáp án: C
Giải thích: Glucocorticoid đường uống liều thấp (ví dụ, Prednisone ≤10 mg/ngày) là một lựa chọn "cầu nối" hiệu quả để nhanh chóng kiểm soát tình trạng viêm trong khi chờ DMARDs (như Methotrexate) bắt đầu có tác dụng (thường sau 4-8 tuần).  Việc sử dụng liều thấp và ngắn ngày giúp hạn chế tác dụng phụ.
Tại sao các lựa chọn khác là sai:
A: Diclofenac là một NSAID không chọn lọc, có nguy cơ cao gây tái phát loét dạ dày, đặc biệt ở bệnh nhân có tiền sử. 
B: Celecoxib là một NSAID ức chế chọn lọc COX-2, an toàn hơn trên đường tiêu hóa so với Diclofenac, nhưng vẫn có nguy cơ.  Dùng corticoid liều thấp ngắn ngày thường được ưu tiên hơn để kiểm soát viêm mạnh mẽ trong giai đoạn đầu.
D: Ketorolac là một NSAID mạnh dùng đường tiêm, chỉ nên dùng rất ngắn ngày (≤ 5 ngày) cho đau cấp và có độc tính cao trên thận và đường tiêu hóa, không phù hợp để điều trị cầu nối trong vài tuần.
Câu 2:
Bệnh nhân bắt đầu dùng Prednisone 10 mg/ngày. Sau 4 tuần, triệu chứng của bà cải thiện đáng kể. Kế hoạch giảm liều corticoid phù hợp nhất là gì?
A. Ngừng thuốc đột ngột vì đã đủ thời gian.
B. Giảm liều từ từ trong vài tuần đến vài tháng.
C. Chuyển sang dùng liều cách ngày ngay lập tức.
D. Tăng liều NSAID và ngừng ngay corticoid.
Đáp án: B
Giải thích: Việc ngừng glucocorticoid đột ngột sau khi dùng kéo dài hơn 2-3 tuần có thể gây ra hội chứng cai steroid do ức chế trục hạ đồi-tuyến yên-thượng thận (HPA axis).  Do đó, cần phải giảm liều một cách từ từ (tapering), ví dụ giảm 1-2.5 mg mỗi 1-2 tuần, để cho phép trục HPA phục hồi chức năng.
Tại sao các lựa chọn khác là sai:
A: Ngừng đột ngột rất nguy hiểm, có thể gây suy thượng thận cấp. 
C: Dùng cách ngày là một bước trong quá trình giảm liều, nhưng không nên chuyển ngay lập tức từ liều hàng ngày.
D: Việc này có thể không đủ kiểm soát viêm và vẫn có nguy cơ suy thượng thận cấp.
Câu 3:
Sau 3 tháng, men gan của bệnh nhân (ALT) tăng gấp 3 lần giới hạn trên của mức bình thường. Tình trạng này có nhiều khả năng nhất là do tác dụng phụ của thuốc nào?
A. Prednisone
B. Methotrexate
C. Folic acid
D. Celecoxib
Đáp án: B
Giải thích: Methotrexate có thể gây độc cho gan (hepatotoxicity), biểu hiện bằng việc tăng men gan.  Đây là một tác dụng phụ cần được theo dõi chặt chẽ bằng xét nghiệm chức năng gan định kỳ (thường mỗi 1-3 tháng) trong suốt quá trình điều trị.
Tại sao các lựa chọn khác là sai:
A: Prednisone ít khi gây tăng men gan đáng kể ở liều thấp.
C: Folic acid có tác dụng bảo vệ, làm giảm độc tính của Methotrexate.
D: NSAIDs có thể gây tổn thương gan nhưng ít phổ biến hơn so với Methotrexate trong bối cảnh điều trị VKDT.
Câu 4:
Do men gan tăng, bác sĩ quyết định chuyển từ Methotrexate sang Leflunomide. Leflunomide có chung chống chỉ định quan trọng nào với Methotrexate?
A. Bệnh vảy nến
B. Suy tim sung huyết
C. Phụ nữ có thai
D. Tăng huyết áp
Đáp án: C
Giải thích: Giống như Methotrexate, Leflunomide (Arava) là một chất gây quái thai mạnh (teratogenic) và bị chống chỉ định tuyệt đối trong thai kỳ.  Cả hai thuốc đều yêu cầu biện pháp tránh thai hiệu quả và cần một khoảng thời gian thải trừ (washout period) trước khi có kế hoạch mang thai.
Tại sao các lựa chọn khác là sai:
A: Methotrexate thực sự được dùng để điều trị bệnh vảy nến và viêm khớp vảy nến.
B: Suy tim là một thận trọng đối với thuốc kháng TNF-α, không phải là chống chỉ định chính của MTX hay Leflunomide.
D: Tăng huyết áp là một tình trạng phổ biến cần kiểm soát nhưng không phải là chống chỉ định của các thuốc này.

TÌNH HUỐNG LÂM SÀNG 7
Một nam bệnh nhân 52 tuổi đến khám vì đau và sưng các khớp gối, cổ chân và cổ tay hai bên trong 4 tháng. Ông cũng có tiền sử các mảng da đỏ, bong vảy ở da đầu và khuỷu tay. Khám lâm sàng thấy viêm màng hoạt dịch ở các khớp lớn nói trên, không đối xứng rõ rệt. Các khớp bàn ngón và ngón gần không bị ảnh hưởng. Xét nghiệm RF và anti-CCP đều âm tính, nhưng CRP tăng cao.
Câu 1:
Chẩn đoán có khả năng nhất ở bệnh nhân này là gì?
A. Viêm khớp dạng thấp huyết thanh âm tính
B. Viêm khớp vảy nến
C. Gout mạn tính
D. Lupus ban đỏ hệ thống
Đáp án: B
Giải thích: Bệnh nhân có biểu hiện viêm khớp (viêm một vài khớp, không đối xứng) kết hợp với tổn thương da đặc trưng của bệnh vảy nến. Viêm khớp vảy nến thường có huyết thanh âm tính (RF và anti-CCP âm tính), điều này làm cho nó trở thành chẩn đoán phù hợp nhất.
Tại sao các lựa chọn khác là sai:
A: Mặc dù VKDT huyết thanh âm tính có thể xảy ra, nhưng kiểu tổn thương khớp không đối xứng và sự hiện diện của bệnh vảy nến làm cho viêm khớp vảy nến có khả năng cao hơn nhiều.
C: Gout mạn tính có thể gây viêm nhiều khớp nhưng thường có tiền sử các cơn gút cấp điển hình và thường đi kèm với hạt tophi.
D: Lupus thường gặp ở phụ nữ trẻ, có thể có viêm khớp tương tự VKDT nhưng thường đi kèm các triệu chứng hệ thống khác (sốt, rụng tóc, loét miệng) và xét nghiệm ANA dương tính.
Câu 2:
Ngoài các triệu chứng đã mô tả, dấu hiệu lâm sàng nào sau đây nếu có sẽ củng cố thêm chẩn đoán viêm khớp vảy nến?
A. Hạt dạng thấp ở khuỷu tay
B. Viêm ngón 
C. Ban cánh bướm ở mặt
D. Hiện tượng Raynaud
Đáp án: B
Giải thích: Viêm ngón, hay "ngón tay/ngón chân hình khúc dồi," là tình trạng viêm toàn bộ một ngón, bao gồm cả khớp và bao gân. Đây là một dấu hiệu rất đặc trưng của viêm khớp vảy nến và các bệnh lý cột sống huyết thanh âm tính khác.
Tại sao các lựa chọn khác là sai:
A: Hạt dạng thấp là đặc trưng của VKDT.
C: Ban cánh bướm là dấu hiệu kinh điển của Lupus ban đỏ hệ thống.
D: Hiện tượng Raynaud có thể gặp trong nhiều bệnh mô liên kết, đặc biệt là xơ cứng bì.
Câu 3:
Bệnh nhân được chỉ định chụp X-quang khớp bàn tay. Tổn thương X-quang nào sau đây là điển hình cho viêm khớp vảy nến thể nặng, giúp phân biệt với VKDT?
A. Mất khoáng đầu xương quanh khớp
B. Bào mòn xương ở rìa khớp 
C. Hình ảnh "pencil-in-cup" 
D. Hẹp khe khớp đối xứng
Đáp án: C
Giải thích: Hình ảnh "pencil-in-cup" là một tổn thương X-quang kinh điển của viêm khớp vảy nến thể phá hủy, trong đó đầu xương trung tâm của một xương bị bào mòn thành hình nhọn (giống bút chì) và khớp vào nền xương đối diện bị lõm xuống (giống cái cốc). Tổn thương này rất hiếm gặp trong VKDT.
Tại sao các lựa chọn khác là sai:
A, B, D: Mất khoáng đầu xương, bào mòn rìa khớp và hẹp khe khớp đều có thể gặp trong cả VKDT và viêm khớp vảy nến, mặc dù trong VKDT các tổn thương này thường đối xứng hơn.
Câu 4:
Lựa chọn điều trị đầu tay cho bệnh nhân này, có tác dụng lên cả triệu chứng khớp và da, là gì?
A. Hydroxychloroquine
B. Methotrexate
C. Allopurinol
D. Colchicine
Đáp án: B
Giải thích: Methotrexate là một thuốc DMARD hiệu quả trong việc kiểm soát cả triệu chứng viêm khớp và các mảng vảy nến trên da. Do đó, nó thường là lựa chọn đầu tay cho bệnh nhân viêm khớp vảy nến có cả biểu hiện ở khớp và da ở mức độ trung bình-nặng.
Tại sao các lựa chọn khác là sai:
A: Hydroxychloroquine thường ít hiệu quả cho viêm khớp vảy nến và có thể làm bùng phát các tổn thương da.
C: Allopurinol dùng để điều trị Gout.
D: Colchicine dùng để điều trị cơn Gout cấp hoặc các bệnh viêm tự miễn khác như Sốt Địa Trung Hải có tính gia đình.

TÌNH HUỐNG LÂM SÀNG 8
Một cụ bà 78 tuổi bị VKDT từ 15 năm nay, đang được kiểm soát tương đối ổn định bằng Methotrexate 10 mg/tuần. Bệnh nhân có tiền sử bệnh thận mạn giai đoạn 3 (eGFR ~ 45 mL/phút/1.73m²), tăng huyết áp và loãng xương. Gần đây, bà bị một đợt bùng phát bệnh với sưng đau khớp gối và cổ tay hai bên. Chỉ số DAS28 là 5.2.
Câu 1:
Bác sĩ muốn kê một thuốc chống viêm để kiểm soát đợt bùng phát cấp tính. Lựa chọn nào sau đây là ít phù hợp nhất cho bệnh nhân này?
A. Prednisone liều thấp (7.5 mg/ngày) trong thời gian ngắn
B. Tiêm glucocorticoid nội khớp gối
C. Ibuprofen 600 mg ba lần mỗi ngày
D. Paracetamol kết hợp với tramadol
Đáp án: C
Giải thích: Bệnh nhân lớn tuổi và có bệnh thận mạn giai đoạn 3. Việc sử dụng thuốc chống viêm không steroid (NSAIDs) như Ibuprofen có nguy cơ cao gây tổn thương thận cấp, giữ nước làm nặng thêm tăng huyết áp và gây xuất huyết tiêu hóa. Do đó, đây là lựa chọn rủi ro nhất.
Tại sao các lựa chọn khác là sai:
A: Prednisone liều thấp ngắn ngày có thể được sử dụng thận trọng để kiểm soát viêm, dù cần theo dõi đường huyết và huyết áp.
B: Tiêm nội khớp là một lựa chọn tốt để kiểm soát viêm tại một vài khớp lớn, giảm thiểu tác dụng toàn thân của corticoid.
D: Thuốc giảm đau như Paracetamol và Tramadol có thể giúp kiểm soát triệu chứng đau mà không ảnh hưởng đến chức năng thận hay gây viêm loét dạ dày.
Câu 2:
Do bệnh hoạt động dai dẳng, bác sĩ xem xét tăng liều Methotrexate. Điều chỉnh nào sau đây là phù hợp nhất với tình trạng chức năng thận của bệnh nhân?
A. Tăng liều MTX lên 20 mg/tuần qua đường uống
B. Chuyển sang MTX 15 mg/tuần đường tiêm dưới da
C. Giữ nguyên liều MTX và thêm Sulfasalazine
D. Tăng liều MTX lên tối đa 12.5 mg/tuần và theo dõi chặt chẽ
Đáp án: D
Giải thích: Methotrexate được thải trừ chủ yếu qua thận. Ở bệnh nhân suy thận (eGFR < 60), nguy cơ tích lũy thuốc và ngộ độc (ức chế tủy, viêm gan) tăng lên đáng kể. Cần phải giảm liều MTX. Việc tăng liều ở bệnh nhân này là không an toàn. Nếu cần tăng, chỉ nên tăng một cách rất thận trọng lên một liều tối đa đã điều chỉnh (ví dụ 12.5-15 mg/tuần) và theo dõi sát sao công thức máu và chức năng thận. Lựa chọn C (thêm một thuốc khác) thường an toàn hơn. Tuy nhiên, trong các lựa chọn về việc "tăng liều", D là phương án thận trọng nhất.
Tại sao các lựa chọn khác là sai:
A: Tăng liều lên 20 mg/tuần là nguy hiểm ở bệnh nhân suy thận.
B: Chuyển sang đường tiêm làm tăng sinh khả dụng nhưng liều 15 mg/tuần vẫn có thể là cao đối với bệnh nhân này.
C: Đây là một chiến lược hợp lý, nhưng câu hỏi tập trung vào việc "điều chỉnh liều MTX". Trong thực tế, đây có thể là câu trả lời đúng nhất về mặt chiến lược tổng thể. Tuy nhiên, câu D trả lời trực tiếp về giới hạn liều.
Câu 3:
Bệnh nhân này có nguy cơ cao bị gãy xương do loãng xương. Yếu tố nào sau đây liên quan trực tiếp đến bệnh viêm khớp dạng thấp góp phần vào nguy cơ này?
A. Giảm hoạt động thể chất do đau khớp
B. Tác dụng phụ của Methotrexate
C. Sự lưu hành của các cytokine gây viêm như TNF-α và IL-6
D. Nồng độ yếu tố dạng thấp (RF) cao
Đáp án: C
Giải thích: Bản thân tình trạng viêm mạn tính trong VKDT góp phần gây mất xương toàn thân. Các cytokine tiền viêm như TNF-α, IL-1 và IL-6 kích thích hoạt động của các tế bào hủy xương (osteoclasts) thông qua con đường RANKL, dẫn đến tăng hủy xương và gây loãng xương, độc lập với các yếu tố khác như bất động hay sử dụng corticoid.
Tại sao các lựa chọn khác là sai:
A: Giảm hoạt động thể chất là một yếu tố nguy cơ quan trọng, nhưng viêm do cytokine là cơ chế bệnh sinh trực tiếp của bệnh.
B: Methotrexate không phải là nguyên nhân chính gây loãng xương. Ngược lại, việc kiểm soát tốt tình trạng viêm bằng MTX có thể giúp làm chậm quá trình mất xương. Glucocorticoid mới là thuốc chính gây loãng xương.
D: Nồng độ RF cao là một dấu hiệu của bệnh hoạt động và tiên lượng nặng, nhưng các cytokine mới là tác nhân trực tiếp gây mất xương.
Câu 4:
Bác sĩ tư vấn cho bệnh nhân về việc tiêm phòng cúm hàng năm. Lời khuyên nào là đúng nhất?
A. Nên tránh tiêm phòng cúm vì có thể gây bùng phát bệnh.
B. Chỉ nên tiêm phòng nếu bệnh đang hoàn toàn ổn định.
C. Nên tiêm phòng cúm bằng vắc-xin bất hoạt hàng năm.
D. Nên sử dụng vắc-xin cúm dạng xịt mũi sống giảm độc lực.
Đáp án: C
Giải thích: Bệnh nhân VKDT, đặc biệt là người lớn tuổi và đang dùng thuốc ức chế miễn dịch, có nguy cơ cao mắc các biến chứng nặng của bệnh cúm. Họ được khuyến cáo mạnh mẽ nên tiêm phòng cúm hàng năm. Tuy nhiên, chỉ nên sử dụng các loại vắc-xin bất hoạt (dạng tiêm).
Tại sao các lựa chọn khác là sai:
A: Lợi ích của việc tiêm phòng vượt xa nguy cơ bùng phát bệnh (rất hiếm).
B: Việc tiêm phòng được khuyến cáo ngay cả khi bệnh hoạt động ở mức độ nhẹ-trung bình.
D: Vắc-xin sống giảm độc lực (như dạng xịt mũi) bị chống chỉ định ở những bệnh nhân đang dùng thuốc ức chế miễn dịch như Methotrexate vì có nguy cơ gây bệnh nhiễm trùng do chính vắc-xin.

TÌNH HUỐNG LÂM SÀNG 9
Một phụ nữ 45 tuổi đến khám vì sưng đau đối xứng các khớp bàn ngón tay (MCP) và khớp ngón gần (PIP) trong 4 tháng. Bà mô tả tình trạng cứng khớp buổi sáng kéo dài hơn 2 giờ, ảnh hưởng đến khả năng làm việc của mình (nhân viên văn phòng). Khám lâm sàng cho thấy có 8 khớp sưng và 10 khớp đau. Các xét nghiệm ban đầu cho thấy tốc độ máu lắng (ESR) là 65 mm/giờ, CRP là 3.2 mg/dL. Tuy nhiên, cả yếu tố dạng thấp (RF) và anti-CCP đều âm tính.
Câu 1:
Chẩn đoán phù hợp nhất cho bệnh nhân này là gì?
A. Thoái hóa khớp bàn tay dạng viêm 
B. Viêm khớp dạng thấp huyết thanh âm tính 
C. Đau cơ xơ hóa 
D. Hội chứng ống cổ tay hai bên 
Đáp án: B
Giải thích: Mặc dù các dấu ấn huyết thanh (RF, anti-CCP) âm tính, bệnh nhân có đầy đủ các đặc điểm lâm sàng kinh điển của VKDT: viêm đa khớp nhỏ đối xứng, kéo dài > 6 tuần, và cứng khớp buổi sáng kéo dài > 1 giờ. Các chỉ số viêm (ESR, CRP) tăng cao cũng ủng hộ một quá trình viêm hệ thống. Khoảng 20-30% bệnh nhân VKDT có huyết thanh âm tính.
Tại sao các lựa chọn khác là sai:
A: Thoái hóa khớp thường ảnh hưởng đến các khớp ngón xa (DIP) và khớp ngón gần (PIP), cứng khớp buổi sáng thường ngắn (< 30 phút) và các chỉ số viêm toàn thân thường không tăng.
C: Đau cơ xơ hóa gây đau lan tỏa nhưng không gây sưng khớp thực thể và không có bằng chứng viêm trên xét nghiệm.
D: Hội chứng ống cổ tay gây đau, tê bì ở vùng chi phối của dây thần kinh giữa nhưng không gây sưng các khớp MCP và PIP.
Câu 2:
So với bệnh nhân VKDT huyết thanh dương tính, tiên lượng của bệnh nhân này thường như thế nào?
A. Tiến triển bệnh phá hủy khớp nhanh hơn
B. Ít có khả năng đáp ứng với Methotrexate
C. Có nguy cơ cao hơn về các biểu hiện ngoài khớp
D. Thường có diễn tiến bệnh ít nặng nề hơn
Đáp án: D
Giải thích: Nhìn chung, bệnh nhân VKDT huyết thanh âm tính có xu hướng có diễn tiến bệnh ít nghiêm trọng hơn so với bệnh nhân huyết thanh dương tính. Họ thường có ít tổn thương bào mòn xương trên X-quang hơn, ít bị biến dạng khớp và ít có các biểu hiện ngoài khớp hơn. Tuy nhiên, một số trường hợp vẫn có thể tiến triển nặng.
Tại sao các lựa chọn khác là sai:
A, C: Bệnh nhân huyết thanh dương tính (đặc biệt là anti-CCP dương tính) mới là nhóm có nguy cơ cao bị phá hủy khớp nhanh và có các biểu hiện ngoài khớp.
B: Cả hai nhóm huyết thanh dương tính và âm tính đều có thể đáp ứng tốt với Methotrexate và các DMARDs khác.
Câu 3:
Trong trường hợp chẩn đoán không chắc chắn do huyết thanh âm tính, phương pháp chẩn đoán hình ảnh nào có thể phát hiện viêm màng hoạt dịch và bào mòn xương ở giai đoạn sớm nhất?
A. X-quang quy ước
B. Chụp cắt lớp vi tính 
C. Siêu âm khớp có Doppler năng lượng
D. Xạ hình xương 
Đáp án: C
Giải thích: Siêu âm khớp là một công cụ nhạy và đặc hiệu để đánh giá VKDT giai đoạn sớm. Nó có thể phát hiện tình trạng viêm và tăng sinh màng hoạt dịch (với tín hiệu Doppler năng lượng tăng) và các tổn thương bào mòn xương nhỏ mà X-quang quy ước chưa thể phát hiện được.
Tại sao các lựa chọn khác là sai:
A: X-quang quy ước thường chỉ phát hiện tổn thương xương ở giai đoạn muộn hơn.
B: CT scan rất tốt để xem xương nhưng ít dùng để đánh giá màng hoạt dịch và bệnh nhân bị phơi nhiễm tia X.
D: Xạ hình xương nhạy trong việc phát hiện viêm nhưng không đặc hiệu, không phân biệt được các loại viêm khớp khác nhau.
Câu 4:
Bác sĩ quyết định bắt đầu điều trị bằng DMARDs. Dựa trên các hướng dẫn hiện hành, lựa chọn đầu tay cho bệnh nhân này là gì?
A. Hydroxychloroquine đơn trị
B. Sulfasalazine đơn trị
C. Methotrexate đơn trị
D. Chờ đợi và theo dõi thêm 3 tháng
Đáp án: C
Giải thích: Theo khuyến cáo của ACR và EULAR, Methotrexate là thuốc DMARD đầu tay cho tất cả các bệnh nhân VKDT có chẩn đoán xác định, bất kể tình trạng huyết thanh, trừ khi có chống chỉ định. Việc điều trị sớm và tích cực giúp cải thiện kết cục lâu dài.
Tại sao các lựa chọn khác là sai:
A, B: Hydroxychloroquine và Sulfasalazine thường được coi là các lựa chọn cho thể bệnh nhẹ hoặc dùng phối hợp với Methotrexate, nhưng không phải là đơn trị liệu đầu tay cho bệnh hoạt động trung bình-nặng.
D: Chờ đợi sẽ làm mất đi "cửa sổ cơ hội" điều trị, có thể dẫn đến tổn thương khớp không hồi phục.

TÌNH HUỐNG LÂM SÀNG 10
Một phụ nữ 68 tuổi có tiền sử viêm khớp dạng thấp phá hủy, huyết thanh dương tính mạnh trong 20 năm. Bà đến viện vì sốt và loét ở cẳng chân không lành trong 3 tuần. Bà cũng cho biết đã bị 2 đợt viêm phổi trong 6 tháng qua. Khám thấy lách to độ II, và các biến dạng khớp bàn tay nặng. Xét nghiệm công thức máu cho thấy: Hemoglobin 9.8 g/dL, Bạch cầu (WBC) 1,800/mm³ với chỉ 15% là bạch cầu trung tính (Neutrophil), và Tiểu cầu 120,000/mm³.
Câu 1:
Sự kết hợp của các dấu hiệu ở bệnh nhân này gợi ý đến hội chứng nào nhất?
A. Hội chứng Sjögren thứ phát
B. Bệnh bạch cầu dòng tủy mạn tính (CML)
C. Hội chứng Felty
D. Nhiễm bột thứ phát 
Đáp án: C
Giải thích: Hội chứng Felty là một biến chứng hiếm gặp và nghiêm trọng của VKDT lâu năm, đặc trưng bởi bộ ba kinh điển: viêm khớp dạng thấp, lách to, và giảm bạch cầu trung tính. Bệnh nhân có đầy đủ các đặc điểm này.
Tại sao các lựa chọn khác là sai:
A: Hội chứng Sjögren thứ phát gây khô mắt, khô miệng nhưng không gây lách to hay giảm bạch cầu trung tính.
B: CML thường gây tăng số lượng bạch cầu một cách đáng kể, không phải giảm.
D: Nhiễm bột thứ phát có thể gây lách to và protein niệu, nhưng không giải thích được tình trạng giảm bạch cầu trung tính nặng.
Câu 2:
Tình trạng giảm bạch cầu trung tính nặng (Absolute Neutrophil Count < 500/mm³) ở bệnh nhân này làm tăng đáng kể nguy cơ của biến chứng cấp tính nào?
A. Chảy máu tự nhiên
B. Huyết khối tĩnh mạch sâu
C. Nhiễm trùng huyết do vi khuẩn 
D. Gãy xương bệnh lý
Đáp án: C
Giải thích: Bạch cầu trung tính là hàng rào phòng thủ chính của cơ thể chống lại vi khuẩn. Giảm bạch cầu trung tính nặng làm bệnh nhân cực kỳ nhạy cảm với các nhiễm trùng do vi khuẩn, thường là từ da, đường hô hấp hoặc đường ruột. Nhiễm trùng có thể nhanh chóng tiến triển thành nhiễm trùng huyết và sốc nhiễm khuẩn, đe dọa tính mạng.
Tại sao các lựa chọn khác là sai:
A: Chảy máu tự nhiên liên quan đến giảm tiểu cầu nặng.
B: Huyết khối tĩnh mạch sâu liên quan đến tình trạng tăng đông.
D: Gãy xương bệnh lý liên quan đến loãng xương hoặc tổn thương xương do u.
Câu 3:
Phương pháp điều trị nào sau đây được xem là hiệu quả nhất để cải thiện tình trạng giảm bạch cầu trung tính trong Hội chứng Felty?
A. Cắt lách
B. Truyền khối bạch cầu hạt
C. Điều trị hiệu quả bệnh viêm khớp dạng thấp nền
D. Kháng sinh phổ rộng dự phòng kéo dài
Đáp án: C
Giải thích: Cơ chế bệnh sinh của Hội chứng Felty liên quan đến hoạt động rất mạnh của bệnh VKDT. Do đó, mục tiêu điều trị chính là kiểm soát tốt bệnh nền. Các thuốc DMARDs mạnh, đặc biệt là Methotrexate, được xem là lựa chọn đầu tay. Khi bệnh VKDT được kiểm soát, tình trạng lách to và giảm bạch cầu trung tính thường sẽ cải thiện.
Tại sao các lựa chọn khác là sai:
A: Cắt lách chỉ được xem xét ở những trường hợp không đáp ứng với điều trị nội khoa và bị nhiễm trùng nặng tái phát, vì nó có nhiều nguy cơ.
B: Truyền khối bạch cầu hạt có đời sống rất ngắn và chỉ được dùng trong những trường hợp nhiễm trùng nặng không kiểm soát được, không phải là giải pháp lâu dài.
D: Kháng sinh chỉ dùng để điều trị nhiễm trùng cấp tính, việc dự phòng kéo dài có thể dẫn đến kháng thuốc.
Câu 4:
Bác sĩ cần chỉ định thêm xét nghiệm nào để loại trừ một bệnh lý ác tính có thể có biểu hiện lâm sàng tương tự như Hội chứng Felty?
A. Điện di protein huyết thanh
B. Xét nghiệm kháng thể kháng TPO
C. Tủy đồ và sinh thiết tủy xương
D. Xét nghiệm gen HLA-B27
Đáp án: C
Giải thích: Bệnh nhân lớn tuổi có lách to và giảm các dòng tế bào máu cần được loại trừ các bệnh lý ác tính về huyết học, đặc biệt là u lympho hoặc một rối loạn tăng sinh tủy khác có tên là Large Granular Lymphocytic (LGL) Leukemia. Bệnh này có thể cùng tồn tại hoặc có biểu hiện giống hệt Hội chứng Felty. Tủy đồ và sinh thiết tủy xương là xét nghiệm cần thiết để phân biệt.
Tại sao các lựa chọn khác là sai:
A: Điện di protein giúp sàng lọc bệnh đa u tủy nhưng ít có khả năng là chẩn đoán phân biệt chính ở đây.
B: Anti-TPO dùng để chẩn đoán viêm tuyến giáp tự miễn Hashimoto.
D: HLA-B27 liên quan đến nhóm bệnh lý cột sống huyết thanh âm tính.

TÌNH HUỐNG LÂM SÀNG 11
Một phụ nữ 28 tuổi, vừa được chẩn đoán viêm khớp dạng thấp huyết thanh dương tính. Bệnh ở giai đoạn sớm nhưng hoạt động (DAS28=4.5). Bác sĩ đề nghị bắt đầu điều trị bằng Methotrexate. Bệnh nhân tỏ ra rất lo lắng và nói: "Thưa bác sĩ, tôi đã tìm hiểu trên mạng và thấy Methotrexate là thuốc hóa trị ung thư. Tôi rất sợ các tác dụng phụ của nó và không muốn dùng."
Câu 1:
Phản hồi nào sau đây của bác sĩ là phù hợp nhất để giải quyết mối lo ngại của bệnh nhân?
A. "Thông tin trên mạng thường không chính xác. Cô nên tin tưởng vào chỉ định của bác sĩ."
B. "Đúng là Methotrexate được dùng cho ung thư, nhưng ở liều điều trị viêm khớp, nó thấp hơn rất nhiều và hoạt động như một thuốc điều hòa miễn dịch, ít tác dụng phụ hơn."
C. "Nếu cô không dùng Methotrexate, khớp của cô sẽ bị phá hủy và tàn phế. Đây là lựa chọn tốt nhất."
D. "Chúng ta có thể thử các loại thảo dược trước nếu cô muốn. Chúng an toàn hơn nhiều."
Đáp án: B
Giải thích: Phản hồi này thể hiện sự đồng cảm, xác nhận thông tin của bệnh nhân là đúng (MTX dùng cho ung thư) nhưng đồng thời cung cấp bối cảnh chính xác và trấn an. Việc giải thích sự khác biệt về liều lượng và cơ chế tác dụng (hóa trị vs. điều hòa miễn dịch) giúp bệnh nhân hiểu rõ vấn đề, giảm bớt lo sợ và xây dựng lòng tin.
Tại sao các lựa chọn khác là sai:
A: Bác bỏ mối lo ngại của bệnh nhân một cách thẳng thừng có thể làm tổn hại mối quan hệ thầy thuốc-bệnh nhân.
C: Sử dụng chiến thuật gây sợ hãi có thể khiến bệnh nhân tuân thủ nhưng không dựa trên sự hiểu biết và đồng thuận, có thể gây ra sự lo âu và không phải là giao tiếp hiệu quả.
D: Đề nghị các phương pháp điều trị không có bằng chứng khoa học làm suy yếu vai trò của bác sĩ và không phải là thực hành y khoa tốt.
Câu 2:
Để tăng cường sự tin tưởng và tuân thủ điều trị của bệnh nhân, bác sĩ nên nhấn mạnh bước tiếp theo nào trong kế hoạch quản lý?
A. Cam kết rằng bệnh nhân sẽ không gặp bất kỳ tác dụng phụ nào.
B. Giải thích rằng sẽ có một kế hoạch theo dõi chặt chẽ các tác dụng phụ tiềm tàng.
C. Đề nghị bệnh nhân tự tìm hiểu thêm về các lựa chọn điều trị khác.
D. Yêu cầu bệnh nhân ký một văn bản miễn trừ trách nhiệm cho các tác dụng phụ.
Đáp án: B
Giải thích: Một phần quan trọng của việc tư vấn là trấn an bệnh nhân rằng sự an toàn của họ được ưu tiên. Việc giải thích kế hoạch theo dõi cụ thể (ví dụ: "Chúng ta sẽ kiểm tra công thức máu và men gan của cô định kỳ mỗi 1-2 tháng để phát hiện sớm bất kỳ vấn đề nào") cho thấy sự chủ động trong việc quản lý rủi ro và giúp bệnh nhân cảm thấy an tâm hơn khi bắt đầu điều trị.
Tại sao các lựa chọn khác là sai:
A: Không thể cam kết điều này vì tác dụng phụ luôn có thể xảy ra. Lời hứa suông sẽ làm mất lòng tin nếu tác dụng phụ xuất hiện.
C: Mặc dù khuyến khích bệnh nhân tham gia là tốt, nhưng việc "tự tìm hiểu" có thể dẫn đến nhiều thông tin sai lệch hơn. Bác sĩ nên là người cung cấp hoặc hướng dẫn đến các nguồn thông tin đáng tin cậy.
D: Đây là một cách tiếp cận mang tính pháp lý và phòng thủ, làm tổn hại nghiêm trọng đến mối quan hệ trị liệu.
Câu 3:
Bệnh nhân hỏi: "Nếu tôi không dùng Methotrexate, còn lựa chọn nào khác không?" Lựa chọn DMARD kinh điển đường uống nào có thể được xem xét như một phương án thay thế ban đầu, mặc dù có thể ít hiệu quả hơn một chút so với MTX?
A. Infliximab
B. Leflunomide
C. Tofacitinib
D. Etanercept
Đáp án: B
Giải thích: Leflunomide là một thuốc DMARD kinh điển đường uống khác có hiệu quả đã được chứng minh trong điều trị VKDT và được coi là một lựa chọn thay thế cho Methotrexate ở những bệnh nhân không dung nạp hoặc có chống chỉ định. Sulfasalazine và Hydroxychloroquine cũng là các lựa chọn khác.
Tại sao các lựa chọn khác là sai:
A, D: Infliximab và Etanercept là các thuốc sinh học (bDMARDs), không phải là lựa chọn thay thế ban đầu cho MTX theo hầu hết các hướng dẫn. Chúng thường được dùng sau khi điều trị bằng MTX thất bại.
C: Tofacitinib là một thuốc DMARDs tổng hợp nhắm đích (tsDMARD) (chất ức chế JAK), cũng thường được dành cho các bước điều trị sau.
Câu 4:
Cuối buổi tư vấn, hành động nào thể hiện tốt nhất nguyên tắc ra quyết định chung (shared decision-making)?
A. "Tôi đã kê đơn Methotrexate cho cô. Đây là hướng dẫn sử dụng."
B. "Vậy cô quyết định thế nào? Dùng Methotrexate hay không?"
C. "Chúng ta đã thảo luận về lợi ích và nguy cơ của Methotrexate, cũng như các lựa chọn khác. Dựa trên tình trạng bệnh của cô, tôi khuyến nghị bắt đầu với MTX và theo dõi chặt chẽ. Cô cảm thấy thế nào về kế hoạch này?"
D. "Tôi sẽ cho cô 1 tuần để suy nghĩ. Hãy tự quyết định và báo lại cho tôi."
Đáp án: C
Giải thích: Ra quyết định chung bao gồm việc bác sĩ cung cấp thông tin y khoa và các khuyến nghị chuyên môn, trong khi bệnh nhân chia sẻ các giá trị, mối quan tâm và ưu tiên của họ. Câu trả lời C tóm tắt cuộc thảo luận, đưa ra một khuyến nghị rõ ràng dựa trên bằng chứng, và cuối cùng mời bệnh nhân tham gia vào quyết định cuối cùng ("Cô cảm thấy thế nào về kế hoạch này?").
Tại sao các lựa chọn khác là sai:
A: Đây là cách tiếp cận gia trưởng, không có sự tham gia của bệnh nhân.
B: Đặt toàn bộ gánh nặng quyết định lên bệnh nhân mà không có một khuyến nghị rõ ràng từ bác sĩ là không hữu ích.
D: Mặc dù cho thời gian suy nghĩ là hợp lý, nhưng việc để bệnh nhân "tự quyết định" mà không có sự định hướng và hỗ trợ của bác sĩ không phải là ra quyết định chung hiệu quả.

TÌNH HUỐNG LÂM SÀNG 12
Một người đàn ông 58 tuổi có tiền sử viêm khớp dạng thấp 8 năm, đang được kiểm soát bằng Methotrexate và Etanercept. Ông đột ngột đến phòng cấp cứu vì sưng, nóng, đỏ và đau dữ dội ở khớp gối phải trong 24 giờ qua, khiến ông không thể đi lại. Bệnh nhân có sốt 38.5°C. Khám lâm sàng thấy khớp gối phải sưng to, tràn dịch nhiều, da ấm và đỏ, đau dữ dội khi cử động nhẹ.
Câu 1:
Bước xử trí quan trọng và cấp bách nhất cần thực hiện ngay là gì?
A. Tăng liều Methotrexate
B. Chọc hút dịch khớp gối 
C. Chụp X-quang khớp gối
D. Bắt đầu ngay một đợt corticoid liều cao
Đáp án: B
Giải thích: Tình trạng viêm một khớp cấp tính, có sốt ở bệnh nhân đang dùng thuốc ức chế miễn dịch (như Etanercept) phải luôn được coi là viêm khớp nhiễm khuẩn (septic arthritis) cho đến khi có bằng chứng ngược lại. Đây là một cấp cứu nội khoa. Chọc hút dịch khớp là thủ thuật chẩn đoán vàng, cần được thực hiện ngay lập tức để phân tích tế bào, nhuộm Gram, và nuôi cấy vi khuẩn.
Tại sao các lựa chọn khác là sai:
A, D: Tăng liều MTX hoặc bắt đầu corticoid trước khi loại trừ nhiễm trùng là một sai lầm nghiêm trọng, có thể làm tình trạng nhiễm trùng nặng hơn và che lấp các dấu hiệu lâm sàng.
C: X-quang ít có giá trị trong chẩn đoán cấp tính, chỉ có thể thấy hình ảnh tràn dịch hoặc các thay đổi mạn tính của VKDT. Nó không giúp phân biệt giữa đợt bùng phát và nhiễm trùng.
Câu 2:
Kết quả phân tích dịch khớp cho thấy: 90,000 bạch cầu/mm³, 95% là bạch cầu đa nhân trung tính, không thấy tinh thể, nhuộm Gram âm tính. Diễn giải nào sau đây là phù hợp nhất?
A. Kết quả này loại trừ viêm khớp nhiễm khuẩn.
B. Kết quả này phù hợp với một đợt bùng phát nặng của VKDT.
C. Kết quả này rất gợi ý viêm khớp nhiễm khuẩn, cần bắt đầu kháng sinh theo kinh nghiệm.
D. Kết quả này gợi ý bệnh Gout.
Đáp án: C
Giải thích: Dịch khớp có số lượng bạch cầu rất cao (> 50,000/mm³) với ưu thế tuyệt đối của bạch cầu đa nhân trung tính là dấu hiệu rất mạnh mẽ của viêm khớp nhiễm khuẩn, ngay cả khi nhuộm Gram âm tính (chỉ dương tính trong khoảng 30-50% trường hợp). Việc điều trị kháng sinh theo kinh nghiệm đường tĩnh mạch không nên bị trì hoãn trong khi chờ kết quả nuôi cấy.
Tại sao các lựa chọn khác là sai:
A: Nhuộm Gram âm tính không loại trừ được nhiễm khuẩn. Kết quả nuôi cấy mới có giá trị hơn.
B: Mặc dù một đợt bùng phát VKDT có thể gây tăng bạch cầu trong dịch khớp, nhưng con số thường không cao đến mức này (< 50,000/mm³).
D: Bệnh Gout được chẩn đoán bằng cách tìm thấy tinh thể urat hình kim, lưỡng chiết quang âm tính trong dịch khớp.
Câu 3:
Trong khi chờ kết quả cấy, bác sĩ bắt đầu điều trị kháng sinh tĩnh mạch theo kinh nghiệm. Lựa chọn kháng sinh nào bao phủ được tác nhân gây bệnh phổ biến nhất (Staphylococcus aureus)?
A. Amoxicillin
B. Vancomycin
C. Doxycycline
D. Metronidazole
Đáp án: B
Giải thích: Staphylococcus aureus (tụ cầu vàng), bao gồm cả chủng kháng Methicillin (MRSA), là tác nhân gây bệnh phổ biến nhất trong viêm khớp nhiễm khuẩn ở người lớn. Vancomycin là lựa chọn theo kinh nghiệm phù hợp nhất vì nó bao phủ cả S. aureus nhạy cảm với Methicillin (MSSA) và MRSA. Thường sẽ được phối hợp với một Cephalosporin thế hệ 3 để bao phủ cả vi khuẩn Gram âm.
Tại sao các lựa chọn khác là sai:
A: Amoxicillin có phổ hẹp và không có tác dụng trên MRSA.
C: Doxycycline không phải là lựa chọn đầu tay cho nhiễm trùng tụ cầu nghi ngờ ở khớp.
D: Metronidazole chủ yếu có tác dụng trên vi khuẩn kỵ khí.
Câu 4:
Sau 48 giờ, kết quả cấy dịch khớp âm tính, bệnh nhân cải thiện đáng kể với kháng sinh. Kế hoạch tiếp theo về việc sử dụng thuốc Etanercept của bệnh nhân là gì?
A. Tiếp tục dùng Etanercept như bình thường.
B. Tạm thời ngừng Etanercept trong suốt đợt nhiễm trùng cấp.
C. Giảm 50% liều Etanercept.
D. Ngừng vĩnh viễn Etanercept và không bao giờ dùng lại thuốc sinh học.
Đáp án: B
Giải thích: Khi một bệnh nhân đang dùng thuốc sinh học bị nhiễm trùng nặng (như viêm khớp nhiễm khuẩn), cần phải tạm thời ngừng thuốc sinh học đó để cho phép hệ miễn dịch của cơ thể phục hồi và chống lại nhiễm trùng. Thuốc sinh học có thể được bắt đầu lại sau khi tình trạng nhiễm trùng đã được giải quyết hoàn toàn.
Tại sao các lựa chọn khác là sai:
A: Tiếp tục dùng thuốc ức chế miễn dịch mạnh trong khi đang bị nhiễm trùng cấp là rất nguy hiểm.
C: Giảm liều không đủ để giảm nguy cơ, cần phải ngừng tạm thời.
D: Ngừng vĩnh viễn là không cần thiết. Sau khi khỏi nhiễm trùng, lợi ích của việc kiểm soát VKDT bằng thuốc sinh học thường vượt trội so với nguy cơ.

TÌNH HUỐNG LÂM SÀNG 13
Một nam bệnh nhân 44 tuổi được chẩn đoán VKDT cách đây 1 năm. Sau 6 tháng điều trị bằng Methotrexate đơn trị liệu với liều tối ưu (20 mg/tuần, tiêm dưới da), bệnh nhân vẫn còn hoạt động bệnh ở mức độ trung bình (DAS28 = 4.7). Bệnh nhân có các yếu tố tiên lượng xấu, bao gồm RF và anti-CCP dương tính mạnh, và X-quang ban đầu đã có hình ảnh bào mòn xương nhỏ ở khối xương cổ tay.
Câu 1:
Theo chiến lược "Treat-to-Target" (Điều trị đến mục tiêu), bước tiếp theo phù hợp nhất cho bệnh nhân này là gì?
A. Tiếp tục Methotrexate đơn trị thêm 3 tháng nữa.
B. Ngừng Methotrexate và chuyển sang Sulfasalazine.
C. Thêm một thuốc DMARD sinh học (ví dụ, một chất kháng TNF-α) vào phác đồ Methotrexate.
D. Thêm Paracetamol và tiếp tục theo dõi.
Đáp án: C
Giải thích: Bệnh nhân đã không đạt được mục tiêu điều trị (lui bệnh hoặc hoạt động bệnh mức độ thấp) sau 6 tháng điều trị bằng csDMARD đầu tay ở liều tối ưu. Do có các yếu tố tiên lượng xấu (huyết thanh dương tính mạnh, bào mòn xương sớm), các hướng dẫn của ACR và EULAR đều khuyến nghị nên chuyển sang bước tiếp theo là kết hợp Methotrexate với một thuốc DMARD sinh học (bDMARD) hoặc một thuốc DMARD tổng hợp nhắm đích (tsDMARD).
Tại sao các lựa chọn khác là sai:
A: Tiếp tục một phác đồ không hiệu quả sẽ làm tăng nguy cơ tổn thương khớp không hồi phục.
B: Chuyển sang một csDMARD khác ít hiệu quả hơn Methotrexate không phải là một bước tiến trong điều trị.
D: Paracetamol chỉ giảm đau, không giải quyết được tình trạng viêm và không thay đổi diễn tiến bệnh.
Câu 2:
Sự hiện diện của các yếu tố tiên lượng xấu ở bệnh nhân này có ý nghĩa gì trong việc lựa chọn chiến lược điều trị?
A. Cho thấy bệnh nhân có khả năng lui bệnh tự nhiên.
B. Gợi ý rằng nên ưu tiên chiến lược điều trị mạnh mẽ hơn (ví dụ: thêm thuốc sinh học) thay vì chỉ thêm một csDMARD khác.
C. Cho thấy bệnh nhân sẽ không đáp ứng với bất kỳ loại thuốc nào.
D. Gợi ý rằng nên tập trung vào vật lý trị liệu thay vì dùng thuốc.
Đáp án: B
Giải thích: Các yếu tố tiên lượng xấu như RF/anti-CCP dương tính nồng độ cao và bào mòn xương sớm cho thấy bệnh có khả năng tiến triển nhanh, phá hủy khớp nặng. Ở những bệnh nhân này, khi thất bại với MTX, việc chuyển thẳng sang kết hợp MTX + thuốc sinh học thường được ưu tiên hơn so với việc thử kết hợp các csDMARDs với nhau ("triple therapy"), vì nó mang lại khả năng kiểm soát bệnh nhanh và mạnh mẽ hơn.
Tại sao các lựa chọn khác là sai:
A: Các yếu tố này cho thấy tiên lượng xấu, không phải khả năng lui bệnh tự nhiên.
C: Đây là một nhận định bi quan và không chính xác; nhiều bệnh nhân đáp ứng tốt với các liệu pháp mạnh hơn.
D: Vật lý trị liệu rất quan trọng nhưng chỉ là điều trị hỗ trợ, không thể thay thế được thuốc DMARDs để kiểm soát viêm.
Câu 3:
Trước khi bắt đầu Adalimumab (một thuốc kháng TNF-α), bệnh nhân hỏi về cách dùng thuốc. Bác sĩ nên giải thích như thế nào?
A. "Đây là thuốc viên uống mỗi ngày một lần."
B. "Đây là thuốc tiêm dưới da, thường là mỗi hai tuần một lần, và ông có thể tự tiêm tại nhà sau khi được hướng dẫn."
C. "Đây là thuốc truyền tĩnh mạch tại bệnh viện mỗi hai tháng một lần."
D. "Đây là miếng dán trên da, thay mỗi ba ngày một lần."
Đáp án: B
Giải thích: Adalimumab (Humira) là một kháng thể đơn dòng tái tổ hợp người hoàn toàn, được bào chế dưới dạng bút tiêm hoặc ống tiêm đóng sẵn để tiêm dưới da. Liều thông thường cho VKDT là 40 mg mỗi hai tuần. Bệnh nhân có thể được đào tạo để tự tiêm tại nhà.
Tại sao các lựa chọn khác là sai:
A: Đây là cách dùng của csDMARDs (MTX, Leflunomide) hoặc tsDMARDs (Tofacitinib).
C: Đây là cách dùng của các thuốc sinh học khác như Infliximab (truyền IV mỗi 8 tuần) hoặc Rituximab.
D: Hiện chưa có DMARDs sinh học dạng miếng dán cho VKDT.
Câu 4:
Bệnh nhân bắt đầu dùng Adalimumab kết hợp với Methotrexate. Thời gian tối thiểu cần thiết để đánh giá đáp ứng ban đầu với phác đồ mới này là bao lâu?
A. 1 tuần
B. 4 tuần
C. 3 tháng
D. 12 tháng
Đáp án: C
Giải thích: Hiệu quả của các thuốc DMARDs sinh học thường bắt đầu xuất hiện sau vài tuần, nhưng cần một khoảng thời gian dài hơn để đạt được tác dụng tối đa và đánh giá một cách đáng tin cậy. Các hướng dẫn khuyến nghị nên đánh giá lại đáp ứng điều trị (ví dụ: bằng chỉ số DAS28) sau 3 tháng. Nếu không có cải thiện đáng kể, cần xem xét điều chỉnh phác đồ.
Tại sao các lựa chọn khác là sai:
A, B: Đây là khoảng thời gian quá ngắn để đánh giá đầy đủ hiệu quả của một thuốc sinh học.
D: 12 tháng là quá dài; nếu phác đồ không hiệu quả, việc chờ đợi lâu như vậy có thể dẫn đến tổn thương khớp thêm. Việc đánh giá thường được thực hiện ở mốc 3 tháng và 6 tháng.

TÌNH HUỐNG LÂM SÀNG 14
Một bệnh nhân nữ 65 tuổi có tiền sử VKDT huyết thanh dương tính 15 năm, bệnh hoạt động mạnh và khó kiểm soát. Bà nhập viện vì các nốt loét đau đớn ở hai cẳng chân và bàn chân phải bị "rủ" xuống (foot drop) đột ngột. Khám thấy các vết loét hoại tử có bờ tím, và giảm sức cơ gập mu bàn chân phải. Xét nghiệm máu cho thấy yếu tố dạng thấp (RF) ở hiệu giá rất cao (1:1280) và nồng độ bổ thể C3, C4 giảm.
Câu 1:
Biểu hiện lâm sàng của bệnh nhân gợi ý nhiều nhất đến biến chứng ngoài khớp nào của VKDT?
A. Nhiễm trùng da do tụ cầu
B. Bệnh lý thần kinh ngoại biên do đái tháo đường
C. Huyết khối tĩnh mạch sâu có loét do ứ trệ
D. Viêm mạch dạng thấp 
Đáp án: D
Giải thích: Viêm mạch dạng thấp là một biến chứng ngoài khớp nghiêm trọng của VKDT lâu năm và hoạt động mạnh. Nó được đặc trưng bởi tình trạng viêm các mạch máu nhỏ và trung bình, dẫn đến các biểu hiện như loét da hoại tử, viêm đa dây thần kinh một ổ như liệt dây thần kinh mác chung gây bàn chân rủ (foot drop), và các triệu chứng toàn thân. Nồng độ RF rất cao và bổ thể giảm là các dấu hiệu hỗ trợ mạnh mẽ.
Tại sao các lựa chọn khác là sai:
A: Loét do nhiễm trùng thường có dấu hiệu viêm cấp (mủ, sưng nóng đỏ) và không giải thích được tổn thương thần kinh.
B: Bệnh lý thần kinh do đái tháo đường thường có kiểu "găng và tất" đối xứng, không gây liệt đột ngột một dây thần kinh riêng lẻ.
C: Loét do ứ trệ tĩnh mạch thường ở vùng mắt cá trong và đi kèm phù mạn tính, không gây bàn chân rủ.
Câu 2:
Để xác định chẩn đoán viêm mạch dạng thấp, xét nghiệm nào sau đây có giá trị nhất?
A. Siêu âm Doppler mạch máu chi dưới
B. Sinh thiết da từ rìa của một vết loét
C. Chọc dò tủy sống
D. Chụp cộng hưởng từ (MRI) cột sống thắt lưng
Đáp án: B
Giải thích: Tiêu chuẩn vàng để chẩn đoán viêm mạch ở da là sinh thiết. Sinh thiết từ rìa một tổn thương da đang hoạt động sẽ cho thấy hình ảnh mô bệnh học của viêm mạch hủy bạch cầu (leukocytoclastic vasculitis) ở các tiểu động mạch và mao mạch ở lớp bì, xác định chẩn đoán.
Tại sao các lựa chọn khác là sai:
A: Siêu âm Doppler có thể loại trừ huyết khối tĩnh mạch hoặc bệnh động mạch ngoại biên, nhưng không thể chẩn đoán viêm mạch ở các mạch máu nhỏ.
C: Chọc dò tủy sống không có chỉ định trong trường hợp này.
D: MRI cột sống thắt lưng dùng để tìm nguyên nhân chèn ép rễ thần kinh, nhưng tổn thương ở đây là ở dây thần kinh ngoại biên.
Câu 3:
Cơ chế bệnh sinh chính gây ra viêm mạch dạng thấp được cho là liên quan đến yếu tố nào sau đây?
A. Sự lắng đọng của các phức hợp miễn dịch lưu hành
B. Nhiễm độc trực tiếp từ Methotrexate
C. Tắc nghẽn mạch máu do tăng tiểu cầu
D. Co thắt mạch máu do rối loạn thần kinh thực vật
Đáp án: A
Giải thích: Viêm mạch dạng thấp được cho là một bệnh qua trung gian phức hợp miễn dịch. Ở những bệnh nhân có nồng độ RF cao, các phức hợp miễn dịch (ví dụ, RF-IgG) được hình thành, lưu hành trong máu và lắng đọng trên thành các mạch máu nhỏ. Sự lắng đọng này kích hoạt hệ thống bổ thể và thu hút các tế bào viêm, gây tổn thương thành mạch và các biểu hiện lâm sàng của viêm mạch.
Tại sao các lựa chọn khác là sai:
B: Viêm mạch là một biến chứng của bệnh VKDT nặng, không phải do thuốc.
C: Tăng tiểu cầu có thể xảy ra trong VKDT như một phần của phản ứng viêm, nhưng không phải là cơ chế chính gây viêm mạch.
D: Rối loạn thần kinh thực vật có thể gây ra hiện tượng Raynaud nhưng không gây viêm mạch hoại tử.
Câu 4:
Viêm mạch dạng thấp là một tình trạng nghiêm trọng. Phác đồ điều trị nào sau đây thường được chỉ định?
A. Tăng liều NSAIDs và vật lý trị liệu
B. Hydroxychloroquine và Prednisone liều thấp
C. Glucocorticoid liều cao kết hợp với Cyclophosphamide hoặc Rituximab
D. Chỉ điều trị chăm sóc vết loét tại chỗ
Đáp án: C
Giải thích: Viêm mạch dạng thấp có tổn thương hệ thống và các cơ quan quan trọng (da, thần kinh) là một tình trạng đe dọa tính mạng và cơ quan, đòi hỏi phải điều trị ức chế miễn dịch mạnh mẽ. Phác đồ điều trị thường bao gồm glucocorticoid liều cao (ví dụ, pulse methylprednisolone sau đó là prednisone uống liều cao) kết hợp với một thuốc ức chế miễn dịch mạnh khác như Cyclophosphamide (truyền tĩnh mạch) hoặc Rituximab.
Tại sao các lựa chọn khác là sai:
A, B, D: Các phương pháp điều trị này hoàn toàn không đủ mạnh để kiểm soát một biến chứng toàn thân nghiêm trọng như viêm mạch dạng thấp.

TÌNH HUỐNG LÂM SÀNG 15
Một bệnh nhân nam 64 tuổi bị viêm khớp dạng thấp hoạt động mạnh trong 10 năm. Ông đang được điều trị ổn định với Methotrexate 20 mg/tuần và Adalimumab (một thuốc kháng TNF-α) 40 mg mỗi 2 tuần. Do đau và hạn chế vận động khớp gối phải nghiêm trọng, ông được lên kế hoạch phẫu thuật thay toàn bộ khớp gối trong 4 tuần tới.
Câu 1:
Chiến lược quản lý thuốc DMARDs nào sau đây là phù hợp nhất để giảm nguy cơ nhiễm trùng sau phẫu thuật?
A. Ngừng cả Methotrexate và Adalimumab ngay lập tức.
B. Tiếp tục cả hai loại thuốc không thay đổi vì nguy cơ bùng phát bệnh cao hơn nguy cơ nhiễm trùng.
C. Tiếp tục Methotrexate nhưng tạm ngừng Adalimumab trước phẫu thuật.
D. Ngừng Methotrexate nhưng tiếp tục Adalimumab.
Đáp án: C
Giải thích: Các hướng dẫn hiện hành (ACR/AHA) khuyến nghị nên tiếp tục sử dụng Methotrexate trong giai đoạn chu phẫu vì nó không làm tăng đáng kể nguy cơ nhiễm trùng sau phẫu thuật và việc ngừng thuốc có thể gây bùng phát bệnh. Ngược lại, các thuốc sinh học (biologic DMARDs) như Adalimumab cần được tạm ngừng trước phẫu thuật để giảm nguy cơ nhiễm trùng vết mổ.
Tại sao các lựa chọn khác là sai:
A: Ngừng Methotrexate không cần thiết và làm tăng nguy cơ bùng phát bệnh sau phẫu thuật.
B: Tiếp tục Adalimumab làm tăng đáng kể nguy cơ nhiễm trùng hậu phẫu.
D: Đây là chiến lược ngược lại với khuyến cáo; Methotrexate nên được tiếp tục và Adalimumab nên được tạm ngừng.
Câu 2:
Bệnh nhân tiêm Adalimumab mỗi 2 tuần. Thời điểm ngừng Adalimumab trước phẫu thuật nên được tính toán như thế nào?
A. Ngừng thuốc 1 tuần trước phẫu thuật.
B. Ngừng thuốc vào ngày phẫu thuật.
C. Lên kế hoạch phẫu thuật ngay sau khi đến liều tiêm tiếp theo, và bỏ qua liều đó.
D. Ngừng thuốc ít nhất 4 tuần trước phẫu thuật.
Đáp án: C
Giải thích: Thời gian bán thải của thuốc sinh học quyết định thời điểm cần ngừng thuốc. Hướng dẫn chung là tạm ngừng thuốc sinh học trong một khoảng thời gian bằng một chu kỳ liều trước cuộc phẫu thuật. Đối với Adalimumab (tiêm mỗi 2 tuần), điều này có nghĩa là bỏ qua liều ngay trước ngày phẫu thuật, tức là phẫu thuật sẽ diễn ra vào khoảng thời gian liều tiếp theo đáng lẽ phải được tiêm.
Tại sao các lựa chọn khác là sai:
A: 1 tuần là quá ngắn, nồng độ thuốc trong máu vẫn còn cao.
B: Ngừng thuốc vào ngày phẫu thuật không có tác dụng giảm nguy cơ nhiễm trùng.
D: 4 tuần là khoảng thời gian ngừng thuốc cần thiết cho một số thuốc khác có chu kỳ liều dài hơn, nhưng không cần thiết cho Adalimumab.
Câu 3:
Sau phẫu thuật 5 ngày, bệnh nhân có dấu hiệu sưng đau ở các khớp tay, gợi ý một đợt bùng phát VKDT. Tình trạng vết mổ khô, không có dấu hiệu nhiễm trùng. Xử trí nào sau đây là phù hợp nhất?
A. Bắt đầu lại Adalimumab ngay lập tức.
B. Sử dụng một đợt glucocorticoid liều thấp, ngắn ngày.
C. Bắt đầu một loại NSAID liều cao.
D. Chỉ dùng thuốc giảm đau Paracetamol.
Đáp án: B
Giải thích: Trong giai đoạn hậu phẫu sớm, nếu có đợt bùng phát VKDT, glucocorticoid liều thấp và ngắn ngày là lựa chọn ưu tiên để kiểm soát viêm. Liệu pháp này có hiệu quả nhanh và ít ảnh hưởng đến quá trình lành vết thương hơn so với việc bắt đầu lại thuốc sinh học quá sớm.
Tại sao các lựa chọn khác là sai:
A: Bắt đầu lại Adalimumab quá sớm (trước 10-14 ngày và khi vết thương chưa lành tốt) làm tăng nguy cơ nhiễm trùng vết mổ.
C: NSAIDs nên được sử dụng thận trọng trong giai đoạn hậu phẫu do nguy cơ chảy máu và tổn thương thận, đặc biệt ở bệnh nhân lớn tuổi.
D: Paracetamol có thể không đủ để kiểm soát một đợt bùng phát viêm trung bình-nặng.
Câu 4:
Khi nào bệnh nhân có thể bắt đầu lại điều trị bằng Adalimumab một cách an toàn?
A. Ngay khi ra viện.
B. Sau khi có bằng chứng vết thương đã lành tốt và không có dấu hiệu nhiễm trùng.
C. Sau khi hoàn thành liệu trình vật lý trị liệu.
D. Sau 3 tháng kể từ ngày phẫu thuật.
Đáp án: B
Giải thích: Hướng dẫn chung là có thể bắt đầu lại thuốc sinh học sau phẫu thuật khi vết mổ đã lành tốt, không có dấu hiệu nhiễm trùng, và các chỉ khâu/kẹp đã được gỡ bỏ (thường là khoảng 10-14 ngày sau phẫu thuật). Quyết định này cần được đưa ra dựa trên đánh giá lâm sàng của bác sĩ phẫu thuật và bác sĩ thấp khớp.
Tại sao các lựa chọn khác là sai:
A: Ra viện có thể quá sớm, vết thương có thể chưa lành hoàn toàn.
C: Thời gian vật lý trị liệu kéo dài và không phải là mốc để bắt đầu lại thuốc.
D: 3 tháng là một khoảng thời gian quá dài và không cần thiết, có thể khiến bệnh nhân bị bùng phát bệnh nặng.

TÌNH HUỐNG LÂM SÀNG 16
Một phụ nữ 30 tuổi, được chẩn đoán VKDT huyết thanh dương tính cách đây 2 năm, bệnh đang lui bệnh ổn định (DAS28 < 2.6) với phác đồ Hydroxychloroquine 200 mg/ngày. Cô đang có kế hoạch mang thai trong vài tháng tới và đến gặp bác sĩ để tư vấn.
Câu 1:
Về các thuốc điều trị VKDT của cô, lời khuyên nào sau đây là chính xác nhất liên quan đến việc mang thai?
A. "Cô phải ngừng tất cả các loại thuốc trước khi cố gắng thụ thai."
B. "Hydroxychloroquine được coi là an toàn và cô có thể tiếp tục sử dụng trong suốt thai kỳ."
C. "Cô nên chuyển sang Methotrexate liều thấp vì nó hiệu quả hơn."
D. "Cô nên chuyển sang Leflunomide vì nó an toàn hơn Hydroxychloroquine."
Đáp án: B
Giải thích: Hydroxychloroquine (HCQ) được xem là an toàn để sử dụng trước, trong và sau khi mang thai. Việc duy trì HCQ giúp kiểm soát bệnh, giảm nguy cơ bùng phát trong thai kỳ và không cho thấy bằng chứng làm tăng nguy cơ dị tật bẩm sinh. Việc ngừng thuốc có thể dẫn đến bùng phát bệnh, gây nguy hiểm cho cả mẹ và thai nhi.
Tại sao các lựa chọn khác là sai:
A: Ngừng HCQ có thể gây bùng phát bệnh.
C, D: Methotrexate và Leflunomide đều là những chất gây quái thai mạnh và bị chống chỉ định tuyệt đối trước và trong khi mang thai.
Câu 2:
Bệnh nhân hỏi về diễn tiến của bệnh VKDT trong và sau khi mang thai. Bác sĩ nên tư vấn như thế nào?
A. "Bệnh sẽ chắc chắn trở nên nặng hơn trong suốt thai kỳ."
B. "Nhiều phụ nữ thấy bệnh cải thiện hoặc lui bệnh trong thai kỳ, nhưng có nguy cơ bùng phát cao sau khi sinh."
C. "Bệnh sẽ không thay đổi trong và sau khi mang thai."
D. "Bệnh sẽ lui hoàn toàn và không tái phát sau khi sinh."
Đáp án: B
Giải thích: Do những thay đổi miễn dịch trong thai kỳ, có tới 60% phụ nữ bị VKDT có sự cải thiện đáng kể về triệu chứng, thậm chí là lui bệnh, đặc biệt là trong tam cá nguyệt thứ hai và thứ ba. Tuy nhiên, có một nguy cơ rất cao (lên đến 90%) bệnh sẽ bùng phát trở lại trong vòng 3-6 tháng sau khi sinh.
Tại sao các lựa chọn khác là sai:
A: Điều này ngược lại với xu hướng phổ biến.
C, D: Đây là những nhận định không chính xác. Bệnh có xu hướng thay đổi và thường tái phát sau sinh.
Câu 3:
Giả sử bệnh nhân bị bùng phát bệnh ở tuần thứ 20 của thai kỳ, với sưng đau nhiều khớp. Lựa chọn điều trị nào sau đây được xem là an toàn và phù hợp nhất ở giai đoạn này?
A. Bắt đầu Methotrexate ngay lập tức.
B. Bắt đầu một liệu trình NSAID (ví dụ, Ibuprofen) kéo dài.
C. Sử dụng liều thấp nhất có hiệu quả của Prednisone.
D. Bắt đầu Leflunomide.
Đáp án: C
Giải thích: Đối với một đợt bùng phát VKDT trong thai kỳ, glucocorticoid (như Prednisone) ở liều thấp nhất có hiệu quả và trong thời gian ngắn nhất có thể được xem là liệu pháp an toàn nhất để kiểm soát viêm. Prednisone ít đi qua nhau thai.
Tại sao các lựa chọn khác là sai:
A, D: Methotrexate và Leflunomide chống chỉ định tuyệt đối.
B: NSAIDs nên được tránh trong tam cá nguyệt thứ ba (sau tuần 32) do nguy cơ gây đóng sớm ống động mạch của thai nhi. Mặc dù có thể được sử dụng thận trọng trong tam cá nguyệt thứ hai, corticoid thường được ưu tiên hơn cho một đợt bùng phát cần kiểm soát hệ thống.
Câu 4:
Sau khi sinh, bệnh nhân muốn cho con bú. Lời khuyên nào về thuốc men là phù hợp?
A. "Cô phải ngừng tất cả các loại thuốc nếu muốn cho con bú."
B. "Hydroxychloroquine và Prednisone liều thấp thường được coi là tương thích với việc cho con bú."
C. "Cô nên chuyển sang Methotrexate vì nó không đi vào sữa mẹ."
D. "Cho con bú không được khuyến cáo ở bệnh nhân VKDT."
Đáp án: B
Giải thích: Một lượng rất nhỏ Hydroxychloroquine và Prednisone (liều ≤ 20 mg/ngày) đi vào sữa mẹ và được coi là an toàn cho trẻ bú mẹ. Việc tiếp tục các loại thuốc này giúp người mẹ kiểm soát bệnh và ngăn ngừa đợt bùng phát sau sinh, cho phép họ chăm sóc con tốt hơn.
Tại sao các lựa chọn khác là sai:
A: Ngừng thuốc có thể gây bùng phát bệnh nặng, ảnh hưởng đến khả năng chăm sóc con của người mẹ.
C: Methotrexate chống chỉ định trong thời gian cho con bú.
D: Cho con bú hoàn toàn có thể thực hiện được và được khuyến khích nếu bệnh của người mẹ được kiểm soát bằng các loại thuốc an toàn.

TÌNH HUỐNG LÂM SÀNG 17
Một người đàn ông 67 tuổi, có tiền sử VKDT huyết thanh dương tính 20 năm và hút thuốc lá nặng, đến khám vì khó thở khi gắng sức và ho khan ngày càng tăng trong năm qua. Khám phổi nghe có tiếng ran nổ ở hai đáy phổi. Chức năng hô hấp ký (PFTs) cho thấy một rối loạn thông khí hạn chế (giảm FVC, FEV1 giảm tương ứng, tỷ lệ FEV1/FVC bình thường) và giảm khả năng khuếch tán khí (DLCO).
Câu 1:
Biến chứng phổi nào là nguyên nhân có khả năng nhất gây ra các triệu chứng của bệnh nhân?
A. Tràn dịch màng phổi do VKDT
B. Bệnh phổi kẽ (ILD)
C. Tăng áp động mạch phổi
D. Các nốt dạng thấp trong phổi
Đáp án: B
Giải thích: Bệnh phổi kẽ là biến chứng phổi phổ biến và nghiêm trọng nhất của VKDT. Các triệu chứng như khó thở khi gắng sức tiến triển và ho khan, cùng với ran nổ ở đáy phổi và rối loạn thông khí hạn chế trên PFTs, là những biểu hiện kinh điển của ILD. Tiền sử hút thuốc và là nam giới cũng là các yếu tố nguy cơ.
Tại sao các lựa chọn khác là sai:
A: Tràn dịch màng phổi thường gây khó thở cấp tính hơn và có các dấu hiệu lâm sàng khác (hội chứng 3 giảm).
C: Tăng áp động mạch phổi có thể xảy ra nhưng thường là hậu quả của ILD nặng hoặc bệnh tim, nó không giải thích được tiếng ran nổ và rối loạn thông khí hạn chế.
D: Các nốt dạng thấp trong phổi thường không có triệu chứng trừ khi chúng bị vỡ hoặc nhiễm trùng.
Câu 2:
Kỹ thuật chẩn đoán hình ảnh nào là tốt nhất để xác định và phân loại bệnh phổi kẽ ở bệnh nhân này?
A. X-quang ngực thẳng và nghiêng
B. Siêu âm màng phổi
C. Chụp cắt lớp vi tính lồng ngực độ phân giải cao (HRCT)
D. Chụp xạ hình thông khí-tưới máu (V/Q scan)
Đáp án: C
Giải thích: HRCT là tiêu chuẩn vàng để chẩn đoán và đánh giá bệnh phổi kẽ. Nó cung cấp hình ảnh chi tiết về nhu mô phổi, cho phép xác định các dạng tổn thương khác nhau (ví dụ: hình ảnh tổ ong, kính mờ, giãn phế quản do co kéo) và phân loại các kiểu hình ILD (ví dụ: viêm phổi kẽ thông thường - UIP, viêm phổi kẽ không đặc hiệu - NSIP).
Tại sao các lựa chọn khác là sai:
A: X-quang ngực có thể gợi ý ILD (hình ảnh lưới hoặc nốt ở đáy phổi) nhưng không đủ nhạy và đặc hiệu để chẩn đoán xác định và phân loại.
B: Siêu âm màng phổi dùng để đánh giá tràn dịch, không phải bệnh nhu mô kẽ.
D: V/Q scan dùng để chẩn đoán thuyên tắc phổi.
Câu 3:
Loại mô bệnh học nào của bệnh phổi kẽ thường gặp nhất và có tiên lượng xấu nhất ở bệnh nhân VKDT?
A. Viêm phổi kẽ không đặc hiệu (NSIP)
B. Viêm phổi tổ chức hóa (OP)
C. Viêm phổi kẽ thông thường (UIP)
D. Viêm phổi kẽ tế bào lympho (LIP)
Đáp án: C
Giải thích: Kiểu hình UIP, có đặc điểm mô bệnh học và hình ảnh HRCT tương tự như xơ phổi vô căn (IPF), là dạng phổ biến nhất và có tiên lượng xấu nhất của bệnh phổi kẽ liên quan đến VKDT (RA-ILD). Nó đặc trưng bởi sự xơ hóa tiến triển và không hồi phục.
Tại sao các lựa chọn khác là sai:
A: NSIP là kiểu hình phổ biến thứ hai và thường có tiên lượng tốt hơn UIP, đáp ứng tốt hơn với điều trị ức chế miễn dịch.
B, D: OP và LIP là các dạng ít phổ biến hơn của RA-ILD.
Câu 4:
Ngoài việc kiểm soát chặt chẽ hoạt động của bệnh VKDT, loại thuốc nào sau đây đang được nghiên cứu và sử dụng cho các trường hợp RA-ILD tiến triển, đặc biệt là với kiểu hình UIP?
A. Thuốc kháng sinh Macrolide
B. Thuốc chống xơ hóa như Nintedanib
C. Thuốc đối kháng thụ thể Leukotriene
D. Thuốc kháng histamin H1
Đáp án: B
Giải thích: Đối với bệnh phổi kẽ tiến triển có kiểu hình xơ hóa, đặc biệt là dạng UIP, các thuốc chống xơ hóa như Nintedanib và Pirfenidone (đã được phê duyệt cho xơ phổi vô căn) đã cho thấy hiệu quả trong việc làm chậm sự suy giảm chức năng phổi. Các thử nghiệm lâm sàng đã chứng minh lợi ích của Nintedanib ở bệnh nhân xơ phổi tiến triển liên quan đến các bệnh hệ thống, bao gồm cả VKDT.
Tại sao các lựa chọn khác là sai:
A, C, D: Các loại thuốc này không có vai trò trong việc điều trị xơ hóa phổi.

TÌNH HUỐNG LÂM SÀNG 18
Một phụ nữ 50 tuổi bị viêm khớp dạng thấp (VKDT) 10 năm, đang được kiểm soát tốt bằng Methotrexate và Hydroxychloroquine. Bà không có các yếu tố nguy cơ tim mạch truyền thống như tăng huyết áp, đái tháo đường hay rối loạn lipid máu, và không hút thuốc. Bà đến khám định kỳ và hỏi bác sĩ liệu bệnh VKDT có ảnh hưởng gì đến tim của bà không.
Câu 1:
So với dân số chung, bệnh nhân VKDT có nguy cơ cao hơn đối với biến cố nào sau đây, ngay cả khi không có các yếu tố nguy cơ truyền thống?
A. Hở van hai lá
B. Rung nhĩ
C. Bệnh mạch vành 
D. Bệnh cơ tim phì đại
Đáp án: C
Giải thích: Tình trạng viêm hệ thống mạn tính trong VKDT đóng vai trò như một yếu-tố-nguy-cơ-độc-lập, thúc đẩy quá trình xơ vữa động mạch diễn ra nhanh hơn. Điều này làm tăng đáng kể nguy cơ mắc bệnh mạch vành, nhồi máu cơ tim và đột quỵ ở bệnh nhân VKDT, cao hơn từ 1.5 đến 2 lần so với dân số chung.
Tại sao các lựa chọn khác là sai:
A: Hở van hai lá không phải là biến chứng tim mạch đặc trưng của VKDT.
B: Rung nhĩ có thể xảy ra nhưng không phải là nguy cơ chính và nổi bật như bệnh mạch vành.
D: Bệnh cơ tim phì đại là một bệnh lý riêng biệt, không liên quan đến VKDT.
Câu 2:
Cơ chế chính giải thích cho việc tăng nguy cơ bệnh mạch vành ở bệnh nhân VKDT là gì?
A. Tăng đông máu do tăng tiểu cầu phản ứng
B. Viêm nội mạc mạch máu do lắng đọng phức hợp miễn dịch
C. Tác dụng phụ trực tiếp của Methotrexate lên mạch vành
D. Rối loạn chức năng nội mô và stress oxy hóa do viêm mạn tính
Đáp án: D
Giải thích: Các cytokine gây viêm mạn tính (như TNF-α, IL-6) gây ra rối loạn chức năng nội mô, làm mất cân bằng giữa các yếu tố giãn mạch và co mạch. Tình trạng này, kết hợp với stress oxy hóa và sự biến đổi của lipid, tạo ra một môi trường thuận lợi cho việc hình thành và phát triển các mảng xơ vữa, dẫn đến bệnh mạch vành.
Tại sao các lựa chọn khác là sai:
A: Tăng tiểu cầu có thể xảy ra nhưng không phải là cơ chế chính gây xơ vữa.
B: Viêm mạch (vasculitis) là một biến chứng của VKDT nhưng cơ chế gây bệnh mạch vành lan tỏa chủ yếu là xơ vữa động mạch, không phải viêm mạch cục bộ.
C: Ngược lại, việc kiểm soát tốt tình trạng viêm bằng Methotrexate đã được chứng minh là làm giảm nguy cơ tim mạch ở bệnh nhân VKDT.
Câu 3:
Biện pháp quan trọng nhất để giảm thiểu nguy cơ tim mạch lâu dài cho bệnh nhân này là gì?
A. Thêm aspirin liều thấp vào phác đồ hàng ngày
B. Kiểm soát chặt chẽ hoạt động của bệnh viêm khớp dạng thấp
C. Thực hiện nghiệm pháp gắng sức tim mạch hàng năm
D. Bổ sung dầu cá (omega-3)
Đáp án: B
Giải thích: Vì viêm là động lực chính thúc đẩy xơ vữa động mạch ở bệnh nhân VKDT, biện pháp hiệu quả nhất để giảm nguy cơ tim mạch là kiểm soát tốt tình trạng viêm hệ thống thông qua việc sử dụng hiệu quả các thuốc DMARDs. Việc đạt được trạng thái lui bệnh hoặc hoạt động bệnh mức độ thấp sẽ làm giảm gánh nặng viêm lên hệ tim mạch.
Tại sao các lựa chọn khác là sai:
A: Aspirin dự phòng tiên phát không được khuyến cáo thường quy cho bệnh nhân VKDT nếu không có chỉ định rõ ràng khác, vì nguy cơ chảy máu có thể lớn hơn lợi ích.
C: Nghiệm pháp gắng sức dùng để chẩn đoán bệnh mạch vành, không phải là biện pháp phòng ngừa.
D: Dầu cá có thể có lợi ích nhưng không phải là biện pháp chính và hiệu quả nhất so với việc kiểm soát bệnh nền.
Câu 4:
Bác sĩ cần tư vấn cho bệnh nhân về việc theo dõi các yếu tố nguy cơ tim mạch truyền thống. Lời khuyên nào sau đây là phù hợp nhất?
A. "Vì bà không có triệu chứng gì, chúng ta không cần lo lắng về mỡ máu hay huyết áp."
B. "Bệnh VKDT không ảnh hưởng đến các chỉ số này, nên chỉ cần kiểm tra như người bình thường."
C. "Chúng ta cần sàng lọc và kiểm soát tích cực huyết áp, đường máu và lipid máu của bà, vì VKDT có thể làm trầm trọng thêm ảnh hưởng của chúng."
D. "Chỉ cần bà dùng thuốc VKDT đều đặn, các yếu tố nguy cơ tim mạch khác sẽ tự động được kiểm soát."
Đáp án: C
Giải thích: Các hướng dẫn quốc tế (ví dụ EULAR) khuyến cáo nên coi VKDT là một yếu tố làm tăng tổng nguy cơ tim mạch. Do đó, cần phải sàng lọc và quản lý tích cực các yếu-tố-nguy-cơ-truyền-thống (tăng huyết áp, rối loạn lipid, đái tháo đường) ở bệnh nhân VKDT, thường với mục tiêu điều trị chặt chẽ hơn so với dân số chung.
Tại sao các lựa chọn khác là sai:
A: Sai. Nguy cơ tim mạch trong VKDT là "thầm lặng" và cần được sàng lọc chủ động.
B: Sai. VKDT làm tăng nguy cơ tim mạch một cách độc lập và cộng hưởng.
D: Sai. Mặc dù kiểm soát VKDT là quan trọng, nó không thay thế được việc phải quản lý riêng biệt các yếu tố nguy cơ tim mạch khác.

TÌNH HUỐNG LÂM SÀNG 19
Một phụ nữ 68 tuổi đến khám vì đau và cứng khớp hai bàn tay trong nhiều năm. Bà cho biết buổi sáng khớp cứng khoảng 45 phút. Khám lâm sàng thấy sưng, ấn đau các khớp ngón gần (PIP) thứ 2, 3 và khớp bàn ngón (MCP) thứ 2 hai bên. Ngoài ra, có các khối xương cứng, không đau ở các khớp ngón xa (DIP). Xét nghiệm máu cho thấy ESR và CRP bình thường, RF và anti-CCP âm tính.
Câu 1:
Dấu hiệu lâm sàng nào ở bệnh nhân này là đặc trưng của thoái hóa khớp mà không phải của viêm khớp dạng thấp?
A. Sưng khớp ngón gần (PIP)
B. Cứng khớp buổi sáng kéo dài 45 phút
C. Các khối xương cứng ở khớp ngón xa (DIP)
D. Viêm khớp đối xứng
Đáp án: C
Giải thích: Tổn thương các khớp ngón xa (DIP joints) là một đặc điểm rất điển hình của thoái hóa khớp bàn tay (gọi là hạt Heberden). Ngược lại, VKDT rất hiếm khi ảnh hưởng đến các khớp ngón xa. 
Tại sao các lựa chọn khác là sai:
A, D: Viêm sưng và đối xứng ở các khớp PIP và MCP là những dấu hiệu rất gợi ý VKDT. 
B: Cứng khớp buổi sáng kéo dài (thường > 60 phút) là đặc trưng của VKDT. 45 phút là khoảng thời gian ranh giới, có thể gặp trong cả hai bệnh nhưng nghiêng về viêm khớp hơn. 
Câu 2:
Bệnh nhân có cả các dấu hiệu của thoái hóa khớp và viêm khớp. Tình trạng này có thể được mô tả là gì?
A. Viêm khớp dạng thấp chồng lấp thoái hóa khớp
B. Lupus ban đỏ hệ thống
C. Viêm khớp vảy nến
D. Bệnh gút mạn tính
Đáp án: A
Giải thích: Rất phổ biến ở người lớn tuổi, một bệnh nhân có thể mắc đồng thời cả thoái hóa khớp (do tuổi tác, hao mòn) và viêm khớp dạng thấp. Bệnh nhân này có các dấu hiệu đặc trưng của cả hai: tổn thương DIP (hạt Heberden) của thoái hóa khớp và viêm các khớp MCP, PIP đối xứng kèm cứng khớp buổi sáng kéo dài của VKDT.
Tại sao các lựa chọn khác là sai:
B, C, D: Các bệnh này có các đặc điểm lâm sàng và xét nghiệm khác biệt không hoàn toàn phù hợp với bệnh cảnh của bệnh nhân.
Câu 3:
Hình ảnh X-quang bàn tay của bệnh nhân này được kỳ vọng sẽ cho thấy sự kết hợp của những tổn thương nào?
A. Bào mòn xương ở khớp MCP và gai xương ở khớp DIP
B. Chỉ có hẹp khe khớp lan tỏa ở tất cả các khớp
C. Chỉ có mất khoáng đầu xương quanh khớp
D. Dính khớp cổ tay và hình ảnh "bút chì trong cốc"
Đáp án: A
Giải thích: Do có sự chồng lấp của hai bệnh, X-quang có khả năng sẽ cho thấy các tổn thương đặc trưng của từng bệnh ở các vị trí khác nhau. Bào mòn xương (erosions) ở các khớp MCP là dấu hiệu của VKDT, trong khi gai xương ở các khớp DIP là dấu hiệu kinh điển của thoái hóa khớp.
Tại sao các lựa chọn khác là sai:
B, C: Đây là những mô tả không đầy đủ, không phản ánh được sự hiện diện của cả hai bệnh lý.
D: Dính khớp cổ tay là dấu hiệu VKDT giai đoạn muộn, còn hình ảnh "bút chì trong cốc" là của viêm khớp vảy nến. 
Câu 4:
Với chẩn đoán VKDT huyết thanh âm tính chồng lấp thoái hóa khớp, hướng điều trị nên tập trung vào vấn đề nào là chính?
A. Chỉ dùng thuốc giảm đau và vật lý trị liệu cho thoái hóa khớp.
B. Bắt đầu ngay một thuốc sinh học do bệnh phức tạp.
C. Điều trị tình trạng viêm của VKDT bằng một thuốc DMARD như Methotrexate.
D. Kê đơn Allopurinol để phòng ngừa các đợt viêm cấp.
Đáp án: C
Giải thích: Mặc dù bệnh nhân có cả hai tình trạng, nhưng viêm khớp dạng thấp là một bệnh tiến triển, phá hủy khớp và cần được điều trị bằng thuốc thay đổi bệnh (DMARDs) để ngăn ngừa tàn phế. Tình trạng viêm ở các khớp MCP và PIP là mục tiêu điều trị chính. Thoái hóa khớp sẽ được quản lý bằng các biện pháp điều trị triệu chứng và không dùng thuốc song song.
Tại sao các lựa chọn khác là sai:
A: Bỏ qua việc điều trị VKDT sẽ dẫn đến tổn thương khớp không hồi phục.
B: Thuốc sinh học không phải là lựa chọn đầu tay. Cần bắt đầu với csDMARD như Methotrexate.
D: Allopurinol dùng để điều trị bệnh gút.

TÌNH HUỐNG LÂM SÀNG 20
Một phụ nữ 35 tuổi đến khám vì mệt mỏi, khô mắt và khô miệng dữ dội trong 6 tháng. Bà phải thường xuyên dùng nước bọt nhân tạo và thuốc nhỏ mắt. Bà cũng có biểu hiện sưng đau các khớp nhỏ ở bàn tay, đối xứng hai bên, kèm cứng khớp buổi sáng. Xét nghiệm cho thấy RF và ANA dương tính, anti-CCP âm tính.
Câu 1:
Sự kết hợp của viêm khớp và triệu chứng khô mắt, khô miệng gợi ý nhiều nhất đến chẩn đoán nào?
A. Viêm khớp dạng thấp đơn thuần
B. Hội chứng Sjögren
C. Xơ cứng bì hệ thống
D. Viêm đa cơ
Đáp án: B
Giải thích: Hội chứng Sjögren là một bệnh tự miễn hệ thống đặc trưng bởi tình trạng thâm nhiễm lympho bào vào các tuyến ngoại tiết, chủ yếu là tuyến nước bọt và tuyến lệ, gây ra triệu chứng khô (sicca syndrome). Bệnh cũng thường gây ra các biểu hiện toàn thân, trong đó viêm đa khớp giống VKDT là rất phổ biến.
Tại sao các lựa chọn khác là sai:
A: VKDT đơn thuần không giải thích được triệu chứng khô nổi bật. Tuy nhiên, bệnh nhân có thể có VKDT kèm theo hội chứng Sjögren thứ phát.
