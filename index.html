C: Xơ cứng bì đặc trưng bởi xơ hóa da và nội tạng.
D: Viêm đa cơ đặc trưng bởi yếu cơ gốc chi.
Câu 2:
Bệnh nhân này có RF dương tính nhưng anti-CCP âm tính. Xét nghiệm tự kháng thể nào sau đây có độ đặc hiệu cao cho Hội chứng Sjögren?
A. Anti-dsDNA
B. Anti-centromere
C. Anti-Ro (SSA) và Anti-La (SSB)
D. Anti-Scl-70
Đáp án: C
Giải thích: Các kháng thể Anti-Ro/SSA và Anti-La/SSB là những dấu ấn huyết thanh đặc trưng cho Hội chứng Sjögren. Sự hiện diện của chúng, đặc biệt ở bệnh nhân có triệu chứng khô và ANA dương tính, rất hữu ích để xác định chẩn đoán.
Tại sao các lựa chọn khác là sai:
A: Anti-dsDNA đặc hiệu cho Lupus ban đỏ hệ thống. 
B: Anti-centromere liên quan đến thể giới hạn của xơ cứng bì.
D: Anti-Scl-70 liên quan đến thể lan tỏa của xơ cứng bì.
Câu 3:
Để xác định khách quan tình trạng khô mắt, nghiệm pháp nào sau đây thường được thực hiện?
A. Đo áp lực nội nhãn
B. Soi đáy mắt
C. Nghiệm pháp Schirmer
D. Kiểm tra thị trường
Đáp án: C
Giải thích: Nghiệm pháp Schirmer là một bài kiểm tra đơn giản để đánh giá lượng nước mắt được sản xuất. Một dải giấy lọc nhỏ được đặt vào mí mắt dưới trong 5 phút. Chiều dài của phần giấy bị ướt sẽ được đo. Kết quả ≤ 5 mm trong 5 phút được coi là dương tính, cho thấy tình trạng giảm tiết nước mắt.
Tại sao các lựa chọn khác là sai:
A, B, D: Đây là các xét nghiệm nhãn khoa dùng để đánh giá các bệnh lý khác như glaucoma, bệnh võng mạc, hoặc tổn thương thần kinh thị giác.
Câu 4:
Bệnh nhân mắc Hội chứng Sjögren có nguy cơ cao hơn đáng kể trong việc phát triển bệnh lý ác tính nào sau đây trong tương lai?
A. Ung thư phổi tế bào nhỏ
B. Ung thư đại trực tràng
C. U lympho không Hodgkin 
D. Ung thư vú
Đáp án: C
Giải thích: Bệnh nhân mắc Hội chứng Sjögren có nguy cơ phát triển u lympho không Hodgkin cao hơn dân số chung khoảng 40 lần. Nguy cơ này đặc biệt cao ở những bệnh nhân có các dấu hiệu hoạt động bệnh hệ thống nặng (ví dụ: viêm mạch, giảm bổ thể, cryoglobulin máu). Đây là biến chứng nghiêm trọng nhất cần được theo dõi lâu dài.
Tại sao các lựa chọn khác là sai:
A, B, D: Nguy cơ mắc các loại ung thư này không tăng một cách đặc hiệu ở bệnh nhân Hội chứng Sjögren.

TÌNH HUỐNG LÂM SÀNG 21
Một phụ nữ 42 tuổi, bị viêm khớp dạng thấp (VKDT) 5 năm, đến khám vì đau và sưng khớp gối phải. Tình trạng này đã kéo dài 3 tháng và ít đáp ứng với thuốc NSAID uống. Bà đang được điều trị nền ổn định với Methotrexate. Khám lâm sàng cho thấy tràn dịch khớp gối phải mức độ trung bình, không có dấu hiệu nhiễm trùng toàn thân. Bác sĩ quyết định thực hiện tiêm glucocorticoid nội khớp.
Câu 1:
Thủ thuật nào cần được thực hiện ngay trước khi tiêm glucocorticoid vào khớp gối?
A. Chụp X-quang khớp gối để xác định vị trí tiêm
B. Chọc hút dịch khớp để xét nghiệm
C. Băng chun cố định khớp gối
D. Gây tê ngoài màng cứng
Đáp án: B
Giải thích: Trước khi tiêm corticoid vào một khớp bị viêm, việc chọc hút dịch khớp là một bước quan trọng. Thủ thuật này có hai mục đích chính: 1) Chẩn đoán: Gửi dịch đi xét nghiệm để loại trừ các nguyên nhân khác, đặc biệt là viêm khớp nhiễm khuẩn hoặc viêm khớp vi tinh thể, là những tình trạng chống chỉ định tiêm corticoid. 2) Điều trị: Giảm áp lực trong khớp, giúp giảm đau và tăng hiệu quả của thuốc tiêm.
Tại sao các lựa chọn khác là sai:
A: X-quang không cần thiết để xác định vị trí tiêm ở một khớp lớn và dễ tiếp cận như khớp gối.
C: Băng chun có thể được sử dụng sau thủ thuật, không phải trước đó.
D: Gây tê ngoài màng cứng là một thủ thuật phức tạp, không cần thiết cho việc tiêm nội khớp. Chỉ cần gây tê tại chỗ.
Câu 2:
Loại thuốc glucocorticoid nào sau đây có tác dụng kéo dài và thường được ưu tiên sử dụng cho tiêm nội khớp ở các khớp lớn như khớp gối?
A. Hydrocortisone acetate
B. Dexamethasone
C. Methylprednisolone acetate (Depo-Medrol®)
D. Prednisone
Đáp án: C
Giải thích: Các chế phẩm glucocorticoid dạng tinh thể có tác dụng kéo dài như Methylprednisolone acetate hoặc Triamcinolone acetonide thường được ưu tiên cho tiêm nội khớp. Các tinh thể này tan chậm, cho phép thuốc duy trì tác dụng chống viêm tại chỗ trong vài tuần đến vài tháng, giúp giảm triệu chứng kéo dài và giảm số lần phải tiêm.
Tại sao các lựa chọn khác là sai:
A: Hydrocortisone acetate có tác dụng ngắn hơn và thường yêu cầu tiêm nhắc lại nhiều lần.
B: Dexamethasone là dạng tan, tác dụng nhanh và ngắn, ít được dùng cho tiêm nội khớp.
D: Prednisone là dạng uống, không dùng để tiêm nội khớp.
Câu 3:
Bệnh nhân hỏi về các rủi ro có thể xảy ra sau khi tiêm. Biến chứng nghiêm trọng nhất, mặc dù hiếm gặp, của tiêm nội khớp là gì?
A. Teo da tại chỗ tiêm
B. Tăng đường huyết tạm thời
C. Đau sau tiêm 
D. Viêm khớp nhiễm khuẩn do thủ thuật
Đáp án: D
Giải thích: Mặc dù rất hiếm (tỷ lệ khoảng 1/10,000 đến 1/50,000), viêm khớp nhiễm khuẩn do đưa vi khuẩn vào khớp trong quá trình tiêm là biến chứng đáng sợ nhất. Nó có thể dẫn đến phá hủy khớp nhanh chóng và nhiễm trùng huyết nếu không được chẩn đoán và điều trị kịp thời.
Tại sao các lựa chọn khác là sai:
A: Teo da hoặc mất sắc tố da tại chỗ tiêm là biến chứng tại chỗ, có thể xảy ra nhưng ít nghiêm trọng.
B: Tăng đường huyết tạm thời thường gặp ở bệnh nhân đái tháo đường nhưng có thể kiểm soát được.
C: Đau sau tiêm do phản ứng viêm với các tinh thể corticoid là biến chứng phổ biến nhất (khoảng 2-5%), thường tự khỏi sau 1-2 ngày và không nguy hiểm.
Câu 4:
Sau khi tiêm, bác sĩ nên đưa ra lời khuyên nào cho bệnh nhân trong 24-48 giờ tới?
A. Vận động khớp gối càng nhiều càng tốt để thuốc khuếch tán.
B. Chườm nóng lên khớp gối để giảm đau.
C. Hạn chế vận động và chịu tải nặng lên khớp gối.
D. Tháo băng ngay lập tức để theo dõi sưng.
Đáp án: C
Giải thích: Bệnh nhân nên được khuyên nghỉ ngơi và hạn chế chịu tải nặng lên khớp được tiêm trong khoảng 24-48 giờ. Điều này giúp thuốc duy trì nồng độ cao tại chỗ, tối đa hóa hiệu quả chống viêm và giảm nguy cơ thuốc bị hấp thu nhanh vào tuần hoàn chung.
Tại sao các lựa chọn khác là sai:
A: Vận động mạnh có thể gây kích ứng khớp và làm thuốc bị phân tán nhanh hơn.
B: Chườm lạnh thường được khuyến nghị để giảm đau và sưng sau tiêm, không phải chườm nóng.
D: Nên giữ băng sạch và khô trong khoảng 24 giờ.

TÌNH HUỐNG LÂM SÀNG 22
Một người đàn ông 55 tuổi, thợ xây, đến khám vì đau khớp gối và các khớp nhỏ ở bàn tay. Cơn đau tăng lên khi làm việc và vào cuối ngày, giảm khi nghỉ ngơi. Ông có cứng khớp buổi sáng nhưng chỉ kéo dài khoảng 15-20 phút. Khám lâm sàng thấy có các chồi xương (gai xương) ở các khớp ngón xa (DIP) và khớp gối kêu lạo xạo khi vận động. Xét nghiệm máu cho thấy RF, anti-CCP, ESR, và CRP đều trong giới hạn bình thường.
Câu 1:
Chẩn đoán có khả năng nhất ở bệnh nhân này là gì?
A. Viêm khớp dạng thấp
B. Thoái hóa khớp
C. Viêm khớp vảy nến
D. Bệnh gút
Đáp án: B
Giải thích: Bệnh cảnh của bệnh nhân rất điển hình cho thoái hóa khớp: đau kiểu cơ học (tăng khi vận động, giảm khi nghỉ), cứng khớp buổi sáng ngắn (< 30 phút), có chồi xương (hạt Heberden ở khớp DIP) và dấu hiệu lạo xạo khớp. Các xét nghiệm dấu ấn viêm và tự kháng thể đều âm tính, càng củng cố chẩn đoán này3.
Tại sao các lựa chọn khác là sai:
A: VKDT gây đau kiểu viêm, cứng khớp kéo dài > 1 giờ, hiếm khi ảnh hưởng khớp DIP và có các chỉ số viêm tăng.
C: Viêm khớp vảy nến là một bệnh viêm, thường có chỉ số viêm tăng và các biểu hiện khác như viêm ngón hoặc tổn thương da.
D: Gút thường biểu hiện bằng các cơn viêm khớp cấp tính, dữ dội, không phải đau mạn tính kiểu cơ học.
Câu 2:
Hình ảnh X-quang khớp gối của bệnh nhân này được dự đoán sẽ cho thấy tổn thương nào sau đây?
A. Bào mòn xương ở trung tâm khớp 
B. Hẹp khe khớp, đặc xương dưới sụn và gai xương 
C. Mất khoáng đầu xương lan tỏa
D. Dính khớp hoàn toàn
Đáp án: B
Giải thích: Ba dấu hiệu X-quang kinh điển của thoái hóa khớp là: 1) Hẹp khe khớp (thường không đối xứng, ở vị trí chịu tải nhiều nhất), 2) Đặc xương dưới sụn (sclerosis), và 3) Gai xương hay chồi xương (osteophytes) ở rìa khớp.
Tại sao các lựa chọn khác là sai:
A, C, D: Bào mòn xương, mất khoáng đầu xương và dính khớp là những đặc điểm của các bệnh khớp viêm như VKDT, không phải thoái hóa khớp.
Câu 3:
Lựa chọn điều trị không dùng thuốc nào là quan trọng nhất cho bệnh nhân này, đặc biệt đối với khớp gối?
A. Tránh hoàn toàn mọi hoạt động thể chất
B. Giảm cân và tập các bài tập tăng cường cơ tứ đầu đùi
C. Sử dụng nẹp cố định khớp gối cả ngày
D. Chế độ ăn kiêng nghiêm ngặt không có purine
Đáp án: B
Giải thích: Đối với thoái hóa khớp gối, các biện pháp không dùng thuốc là nền tảng của điều trị. Giảm cân (nếu thừa cân) làm giảm đáng kể tải trọng lên khớp. Tập thể dục, đặc biệt là các bài tập tăng cường sức mạnh cho cơ tứ đầu đùi và các bài tập aerobic ít tác động (như bơi lội, đạp xe), giúp ổn định khớp, cải thiện chức năng và giảm đau.
Tại sao các lựa chọn khác là sai:
A: Tránh vận động sẽ dẫn đến teo cơ, cứng khớp và làm chức năng khớp xấu đi.
C: Nẹp có thể hữu ích khi vận động nhưng không nên đeo cả ngày vì có thể gây yếu cơ.
D: Chế độ ăn không purine dành cho bệnh nhân gút.
Câu 4:
Nếu bệnh nhân cần dùng thuốc giảm đau, lựa chọn đầu tay theo hầu hết các hướng dẫn hiện nay là gì?
A. Paracetamol 
B. Oxycodone
C. Prednisone đường uống
D. Ibuprofen
Đáp án: A
Giải thích: Paracetamol (Acetaminophen) được khuyến cáo là thuốc giảm đau đầu tay cho thoái hóa khớp do có hồ sơ an toàn tốt, đặc biệt ở bệnh nhân lớn tuổi có thể có nhiều bệnh đi kèm. Nó hiệu quả cho đau mức độ nhẹ đến trung bình.
Tại sao các lựa chọn khác là sai:
B: Oxycodone là một opioid mạnh, chỉ dành cho trường hợp đau nặng không đáp ứng với các liệu pháp khác và có nguy cơ gây nghiện cao.
C: Corticoid đường uống không được chỉ định trong điều trị thoái hóa khớp.
D: NSAIDs (như Ibuprofen) có hiệu quả nhưng nên được dành cho những trường-hợp-không-đáp-ứng với Paracetamol hoặc có biểu hiện viêm, do nguy cơ tác dụng phụ trên tiêu hóa, thận và tim mạch.

TÌNH HUỐNG LÂM SÀNG 23
Một phụ nữ 25 tuổi, tiền sử khỏe mạnh, đến khám vì mệt mỏi, sốt nhẹ, rụng tóc và đau các khớp nhỏ ở bàn tay trong 2 tháng. Gần đây, cô nhận thấy có ban đỏ ở hai gò má sau khi đi ra ngoài nắng. Khám thấy viêm các khớp bàn ngón và ngón gần đối xứng, không có biến dạng. Xét nghiệm có giảm nhẹ bạch cầu và tiểu cầu, ANA dương tính mạnh (1:640), anti-CCP âm tính.
Câu 1:
Dựa trên bệnh sử và các kết quả xét nghiệm, chẩn đoán nào là phù hợp nhất?
A. Viêm khớp dạng thấp
B. Thấp khớp cấp 
C. Lupus ban đỏ hệ thống (SLE)
D. Viêm da cơ
Đáp án: C
Giải thích: Bệnh nhân là một phụ nữ trẻ có biểu hiện đa hệ thống: viêm khớp, triệu chứng toàn thân (sốt, mệt), rụng tóc, ban nhạy cảm với ánh sáng (ban cánh bướm), và bất thường huyết học (giảm bạch cầu, tiểu cầu). Kết quả ANA dương tính mạnh càng củng cố chẩn đoán Lupus ban đỏ hệ thống (SLE).
Tại sao các lựa chọn khác là sai:
A: Mặc dù có viêm khớp giống VKDT, nhưng các triệu chứng ngoài khớp khác và anti-CCP âm tính làm cho SLE có khả năng cao hơn.
B: Thấp khớp cấp thường gặp ở trẻ em sau nhiễm liên cầu, có viêm khớp kiểu di chuyển và các tiêu chuẩn Jones khác.
D: Viêm da cơ đặc trưng bởi yếu cơ gốc chi và các loại ban da khác (ban Heliotrope, sẩn Gottron).
Câu 2:
Xét nghiệm tự kháng thể nào sau đây có độ đặc hiệu cao nhất cho Lupus ban đỏ hệ thống và thường liên quan đến bệnh viêm thận lupus?
A. Anti-Ro (SSA)
B. Anti-Sm (Smith)
C. Anti-dsDNA (kháng thể kháng DNA chuỗi kép)
D. Anti-histone
Đáp án: C
Giải thích: Anti-dsDNA là một kháng thể rất đặc hiệu cho SLE. Nồng độ của nó thường tương quan với hoạt động của bệnh, đặc biệt là viêm thận lupus. Cùng với Anti-Sm, đây là một trong những tiêu chuẩn phân loại của SLE8.
Tại sao các lựa chọn khác là sai:
A: Anti-Ro/SSA có thể dương tính trong SLE (cũng như hội chứng Sjögren) và liên quan đến lupus sơ sinh, nhưng không đặc hiệu bằng anti-dsDNA.
B: Anti-Sm cũng rất đặc hiệu cho SLE nhưng ít phổ biến hơn anti-dsDNA và ít liên quan đến hoạt động bệnh.
D: Anti-histone thường liên quan đến lupus do thuốc.
Câu 3:
Viêm khớp trong SLE thường có đặc điểm gì khác biệt so với viêm khớp trong VKDT?
A. Thường gây phá hủy xương và bào mòn khớp trên X-quang
B. Thường đối xứng và ảnh hưởng đến các khớp nhỏ
C. Thường không gây bào mòn xương và có thể gây biến dạng khớp có thể hồi phục (Jaccoud's arthropathy)
D. Luôn đi kèm với nồng độ anti-CCP dương tính
Đáp án: C
Giải thích: Viêm khớp trong SLE thường là không bào mòn. Mặc dù có thể gây đau, sưng và hạn chế vận động, nó hiếm khi gây ra tổn thương phá hủy sụn và xương như trong VKDT. Một dạng biến dạng hiếm gặp gọi là "Jaccoud's arthropathy" có thể xảy ra do lỏng lẻo dây chằng, nhưng các biến dạng này có thể nắn chỉnh được.
Tại sao các lựa chọn khác là sai:
A: Đây là đặc điểm của VKDT.
B: Đặc điểm này có thể giống nhau ở cả hai bệnh, không phải là điểm khác biệt chính.
D: Viêm khớp lupus thường có anti-CCP âm tính.
Câu 4:
Thuốc nào sau đây là nền tảng trong điều trị lâu dài cho hầu hết các bệnh nhân SLE, giúp kiểm soát các biểu hiện ở da, khớp và giảm các đợt bùng phát?
A. Methotrexate
B. Hydroxychloroquine
C. Aspirin liều cao
D. Azathioprine
Đáp án: B
Giải thích: Hydroxychloroquine được khuyến cáo cho hầu hết tất cả bệnh nhân SLE, bất kể mức độ nặng của bệnh. Nó đã được chứng minh là giúp kiểm soát các triệu chứng ở da và khớp, giảm các đợt bùng phát, giảm tổn thương cơ quan tích lũy, và cải thiện tỷ lệ sống còn.
Tại sao các lựa chọn khác là sai:
A: Methotrexate được sử dụng cho viêm khớp trong SLE không đáp ứng với Hydroxychloroquine, nhưng không phải là thuốc nền tảng cho mọi bệnh nhân.
C: Aspirin liều cao không còn được sử dụng rộng rãi.
D: Azathioprine là một thuốc ức chế miễn dịch mạnh hơn, được dành cho các biểu hiện nội tạng nghiêm trọng (ví dụ: viêm thận).

TÌNH HUỐNG LÂM SÀNG 24
Một phụ nữ 56 tuổi bị viêm khớp dạng thấp (VKDT) hoạt động mạnh trong 8 năm (DAS28 = 5.5) đến khám vì ngày càng mệt mỏi và khó thở nhẹ khi gắng sức. Bà không có dấu hiệu mất máu rõ ràng. Xét nghiệm công thức máu cho thấy: Hemoglobin 9.5 g/dL, MCV 85 fL (bình thường), MCHC 33 g/dL (bình thường). Xét nghiệm sắt cho thấy Sắt huyết thanh giảm, Ferritin tăng, và Transferrin bão hòa (TSAT) giảm.
Câu 1:
Loại thiếu máu nào có khả năng nhất ở bệnh nhân này?
A. Thiếu máu do thiếu sắt 
B. Thiếu máu do thiếu vitamin B12
C. Thiếu máu do viêm mạn tính 
D. Thiếu máu tan máu tự miễn
Đáp án: C
Giải thích: Bệnh nhân có thiếu máu hồng cầu bình thường, đẳng sắc trong bối cảnh một bệnh viêm hệ thống hoạt động mạnh. Các chỉ số sắt (sắt huyết thanh giảm, ferritin tăng) là kinh điển cho thiếu máu do viêm mạn tính. Tình trạng viêm làm tăng sản xuất hepcidin từ gan, gây giữ sắt trong đại thực bào và giảm hấp thu sắt từ ruột, dẫn đến thiếu sắt chức năng.
Tại sao các lựa chọn khác là sai:
A: Thiếu máu do thiếu sắt thực sự thường có ferritin giảm và hồng cầu nhỏ.
B: Thiếu máu do thiếu vitamin B12 là thiếu máu hồng cầu to.
D: Thiếu máu tan máu tự miễn thường đi kèm với tăng bilirubin gián tiếp, tăng LDH và xét nghiệm Coombs dương tính.
Câu 2:
Phương pháp điều trị nào là hiệu quả và cơ bản nhất để cải thiện tình trạng thiếu máu của bệnh nhân về lâu dài?
A. Truyền khối hồng cầu
B. Bổ sung sắt liều cao đường uống
C. Tiêm Erythropoietin (EPO)
D. Kiểm soát hiệu quả bệnh viêm khớp dạng thấp nền
Đáp án: D
Giải thích: Vì nguyên nhân gốc rễ của tình trạng thiếu máu này là do viêm mạn tính, liệu pháp hiệu quả nhất là điều trị và kiểm soát tốt tình trạng viêm của bệnh VKDT. Khi hoạt động bệnh giảm (ví dụ, bằng cách tối ưu hóa phác đồ DMARDs), sản xuất hepcidin sẽ giảm, sắt sẽ được giải phóng để tạo hồng cầu, và tình trạng thiếu máu sẽ dần được cải thiện.
Tại sao các lựa chọn khác là sai:
A: Truyền máu chỉ là giải pháp tạm thời cho các trường hợp thiếu máu nặng, có triệu chứng.
B: Bổ sung sắt đường uống thường không hiệu quả trong thiếu máu do viêm mạn tính vì hepcidin làm giảm hấp thu sắt.
C: EPO có thể được sử dụng trong một số trường hợp, đặc biệt là khi có kèm suy thận, nhưng không giải quyết được nguyên nhân gốc rễ là sự ứ sắt do viêm.
Câu 3:
Hepcidin, phân tử trung tâm trong cơ chế bệnh sinh của loại thiếu máu này, được sản xuất chủ yếu ở đâu và được kích thích bởi cytokine nào?
A. Tủy xương, được kích thích bởi TNF-α
B. Gan, được kích thích bởi Interleukin-6 (IL-6)
C. Lách, được kích thích bởi Interleukin-1 (IL-1)
D. Thận, được kích thích bởi Interferon-gamma (IFN-γ)
Đáp án: B
Giải thích: Hepcidin là một hormone được sản xuất chủ yếu ở gan. Trong các trạng thái viêm, cytokine IL-6 là chất kích thích chính làm gan tăng sản xuất hepcidin. Hepcidin sau đó tác động lên các tế bào ruột và đại thực bào, làm giảm sự sẵn có của sắt cho quá trình tạo máu.
Tại sao các lựa chọn khác là sai:
A, C, D: Các lựa chọn này sai về vị trí sản xuất chính hoặc cytokine kích thích chính của hepcidin.
Câu 4:
Bác sĩ nghi ngờ bệnh nhân có thể có tình trạng thiếu sắt thực sự cùng tồn tại. Xét nghiệm nào sau đây có thể giúp phân biệt giữa thiếu máu do viêm đơn thuần và tình trạng hỗn hợp (viêm và thiếu sắt)?
A. Nồng độ Vitamin B12
B. Số lượng hồng cầu lưới
C. Nồng độ thụ thể transferrin hòa tan (sTfR)
D. Nồng độ haptoglobin
Đáp án: C
Giải thích: Ferritin là một protein phản ứng pha cấp, do đó nó sẽ tăng trong tình trạng viêm, làm che lấp đi tình trạng thiếu sắt thực sự (nơi mà ferritin thường giảm). Thụ thể transferrin hòa tan (sTfR) không bị ảnh hưởng bởi tình trạng viêm. Nồng độ sTfR sẽ tăng khi có tình trạng thiếu sắt thực sự ở mô. Do đó, ở một bệnh nhân bị viêm, nếu sTfR tăng thì khả năng cao là có thiếu sắt thực sự cùng tồn tại.
Tại sao các lựa chọn khác là sai:
A: Vitamin B12 không liên quan đến chuyển hóa sắt.
B: Hồng cầu lưới phản ánh đáp ứng của tủy xương nhưng không giúp phân biệt hai tình trạng này.
D: Haptoglobin dùng để đánh giá tan máu.

TÌNH HUỐNG LÂM SÀNG 25
Một cụ bà 72 tuổi đến khám vì đau và cứng dữ dội ở vùng vai và vùng hông hai bên, khởi phát đột ngột cách đây 2 tuần. Bà mô tả tình trạng cứng khớp buổi sáng rất nặng, kéo dài vài giờ, khiến bà không thể tự ra khỏi giường. Bà cũng có triệu chứng toàn thân như mệt mỏi, sút 3 kg và sốt nhẹ. Khám lâm sàng thấy khó khăn khi nâng tay qua đầu và đứng dậy khỏi ghế. Không có biểu hiện sưng rõ rệt ở các khớp nhỏ bàn tay hay bàn chân. Xét nghiệm máu cho thấy tốc độ máu lắng (ESR) là 95 mm/giờ và CRP là 10.5 mg/dL.
Câu 1:
Chẩn đoán có khả năng nhất ở bệnh nhân này là gì?
A. Viêm khớp dạng thấp khởi phát ở người già 
B. Đau đa cơ dạng thấp (PMR)
C. Thoái hóa khớp vai và khớp háng
D. Đau cơ xơ hóa (Fibromyalgia)
Đáp án: B
Giải thích: Bệnh cảnh lâm sàng rất điển hình cho Đau đa cơ dạng thấp (PMR): tuổi > 50, khởi phát cấp/bán cấp, đau và cứng đối xứng ở vùng gốc chi (vai, hông), kèm theo các triệu chứng toàn thân và các chỉ số viêm tăng rất cao. Sự vắng mặt của viêm khớp ngoại biên (bàn tay, bàn chân) cũng là một đặc điểm gợi ý.
Tại sao các lựa chọn khác là sai:
A: VKDT khởi phát ở người già có thể có biểu hiện ở gốc chi, nhưng thường vẫn có viêm các khớp nhỏ ở bàn tay/bàn chân và hiếm khi có ESR/CRP tăng cao đến mức này.
C: Thoái hóa khớp gây đau kiểu cơ học, cứng khớp buổi sáng ngắn và không gây ra phản ứng viêm hệ thống mạnh như vậy.
D: Đau cơ xơ hóa không gây tăng các chỉ số viêm.
Câu 2:
Bác sĩ bắt đầu điều trị thử bằng Prednisone 15 mg/ngày. Đặc điểm nào sau đây được coi là một đáp ứng "kinh điển" và giúp củng cố chẩn đoán PMR?
A. Các triệu chứng cải thiện từ từ sau khoảng 2 tuần.
B. Cần phải tăng liều lên 60 mg/ngày để thấy hiệu quả.
C. Cải thiện một phần triệu chứng đau nhưng không giảm cứng khớp.
D. Cải thiện nhanh chóng và đáng kể các triệu chứng trong vòng 24-72 giờ.
Đáp án: D
Giải thích: Một trong những đặc điểm nổi bật và gần như là một tiêu chuẩn chẩn đoán của PMR là đáp ứng rất nhanh và ngoạn mục với liều thấp đến trung bình của corticoid. Bệnh nhân thường mô tả cảm giác "kỳ diệu" khi các triệu chứng đau và cứng khớp gần như biến mất hoàn toàn chỉ sau 1-3 ngày điều trị.
Tại sao các lựa chọn khác là sai:
A, B, C: Các đáp ứng này không phải là điển hình cho PMR và gợi ý cần xem xét các chẩn đoán khác. VKDT thường đáp ứng chậm hơn và có thể cần liều cao hơn.
Câu 3:
Ở tất cả các bệnh nhân được chẩn đoán PMR, việc sàng lọc một bệnh lý liên quan và nguy hiểm nào là bắt buộc?
A. Bệnh gút
B. Viêm động mạch tế bào khổng lồ (GCA)
C. Loãng xương
D. Bệnh ác tính tiềm ẩn
Đáp án: B
Giải thích: PMR và Viêm động mạch tế bào khổng lồ (GCA) được cho là hai biểu hiện khác nhau của cùng một quá trình bệnh. Khoảng 15-20% bệnh nhân PMR có GCA đồng thời, và khoảng 40-50% bệnh nhân GCA có triệu chứng của PMR. GCA là một tình trạng cấp cứu có thể gây mù lòa không hồi phục nếu không được chẩn đoán và điều trị kịp thời. Do đó, tất cả bệnh nhân PMR cần được hỏi và sàng lọc các triệu chứng của GCA (đau đầu mới xuất hiện, đau khi nhai, đau da đầu, rối loạn thị giác).
Tại sao các lựa chọn khác là sai:
A: Không có mối liên quan trực tiếp.
C: Bệnh nhân lớn tuổi dùng corticoid cần được đánh giá và dự phòng loãng xương, nhưng đây là quản lý chung, không phải là một bệnh lý liên quan trực tiếp về mặt bệnh sinh.
D: PMR có thể là một hội chứng cận ung thư, nhưng GCA là mối liên quan phổ biến và cấp bách hơn nhiều cần phải sàng lọc ngay lập tức.
Câu 4:
Bệnh nhân hỏi: "Bệnh này có giống viêm khớp dạng thấp không? Tôi có bị biến dạng khớp không?" Câu trả lời nào của bác sĩ là đúng nhất?
A. "Vâng, đây là một dạng của viêm khớp dạng thấp và bà sẽ bị biến dạng khớp."
B. "Không, đây là một bệnh viêm khác. PMR là bệnh không phá hủy khớp và thường không gây biến dạng khớp vĩnh viễn."
C. "Hai bệnh này hoàn toàn giống nhau về tiên lượng và điều trị."
D. "Chúng ta chỉ có thể biết được sau vài năm theo dõi."
Đáp án: B
Giải thích: Một điểm khác biệt quan trọng giữa PMR và VKDT là tiên lượng về khớp. PMR được coi là một bệnh không phá hủy khớp (non-erosive). Mặc dù gây đau và cứng khớp dữ dội, nó không gây ra tình trạng bào mòn xương hay biến dạng khớp vĩnh viễn như VKDT. Đây là một điểm quan trọng để trấn an bệnh nhân.
Tại sao các lựa chọn khác là sai:
A, C: Sai. Hai bệnh này khác nhau về cơ chế, vị trí tổn thương chính, điều trị và tiên lượng.
D: Mặc dù theo dõi là cần thiết, nhưng dựa trên chẩn đoán PMR, chúng ta có thể đưa ra một tiên lượng khá chắc chắn về việc không bị phá hủy khớp.

TÌNH HUỐNG LÂM SÀNG 26
Một phụ nữ 48 tuổi bị VKDT huyết thanh dương tính, đã không đáp ứng đầy đủ với Methotrexate và sau đó là một thuốc kháng TNF-α (Etanercept). Bệnh vẫn hoạt động ở mức độ trung bình. Bác sĩ tư vấn về việc chuyển sang Tofacitinib, một thuốc uống thuộc nhóm DMARD tổng hợp nhắm đích (tsDMARD).
Câu 1:
Cơ chế tác dụng của Tofacitinib là gì?
A. Ức chế yếu tố hoại tử u alpha (TNF-α)
B. Ức chế Janus kinase (JAK)
C. Gây ly giải tế bào lympho B
D. Chẹn thụ thể Interleukin-6 (IL-6)
Đáp án: B
Giải thích: Tofacitinib là một chất ức chế Janus kinase (JAK). Các enzyme JAK là trung tâm của con đường truyền tín hiệu nội bào cho nhiều cytokine gây viêm trong VKDT (bao gồm IL-6, IFN-gamma). Bằng cách ức chế JAK, Tofacitinib ngăn chặn tín hiệu của các cytokine này, từ đó làm giảm phản ứng viêm.
Tại sao các lựa chọn khác là sai:
A: Đây là cơ chế của các thuốc như Etanercept, Infliximab, Adalimumab.
C: Đây là cơ chế của Rituximab.
D: Đây là cơ chế của Tocilizumab (ức chế thụ thể IL-6).
Câu 2:
So với các thuốc sinh học (bDMARDs), Tofacitinib có một ưu điểm chính về đường dùng là gì?
A. Chỉ cần dùng mỗi 6 tháng một lần
B. Có thể dùng qua đường hít
C. Dùng qua đường uống 
D. Có dạng miếng dán qua da
Đáp án: C
Giải thích: Một trong những lợi thế chính của nhóm thuốc ức chế JAK (tsDMARDs) so với hầu hết các thuốc sinh học (bDMARDs) là chúng có sẵn ở dạng viên uống, giúp bệnh nhân thuận tiện hơn trong việc sử dụng so với việc phải tiêm dưới da hoặc truyền tĩnh mạch.
Tại sao các lựa chọn khác là sai:
A, B, D: Các đường dùng này không áp dụng cho Tofacitinib.
Câu 3:
Bác sĩ cần tư vấn cho bệnh nhân về một nguy cơ nhiễm trùng đặc biệt có liên quan đến nhóm thuốc ức chế JAK. Đó là nguy cơ tái hoạt động của virus nào?
A. Virus viêm gan C (HCV)
B. Virus Epstein-Barr (EBV)
C. Cytomegalovirus (CMV)
D. Virus Varicella-Zoster (Herpes Zoster)
Đáp án: D
Giải thích: Các nghiên cứu và dữ liệu thực tế đã cho thấy nhóm thuốc ức chế JAK có liên quan đến việc tăng nguy cơ mắc bệnh Herpes Zoster (bệnh zona) một cách đáng kể, cao hơn so với các thuốc sinh học khác. Do đó, việc tư vấn cho bệnh nhân về các dấu hiệu sớm của bệnh zona và xem xét tiêm phòng vắc-xin zona (vắc-xin bất hoạt, ví dụ Shingrix) trước khi bắt đầu điều trị là rất quan trọng.
Tại sao các lựa chọn khác là sai:
A, B, C: Mặc dù các thuốc ức chế miễn dịch nói chung có thể làm tăng nguy cơ tái hoạt động của nhiều loại virus, nhưng mối liên quan với Herpes Zoster là nổi bật và đặc hiệu nhất đối với nhóm ức chế JAK.
Câu 4:
Theo các cảnh báo an toàn gần đây, nhóm thuốc ức chế JAK có liên quan đến việc tăng nguy cơ nào sau đây, đặc biệt ở bệnh nhân trên 50 tuổi có ít nhất một yếu tố nguy cơ tim mạch?
A. Suy thận cấp
B. Biến cố tim mạch lớn (MACE) và huyết khối
C. Bệnh phổi kẽ
D. Loãng xương
Đáp án: B
Giải thích: Dữ liệu từ các nghiên cứu hậu mãi, đặc biệt là nghiên cứu ORAL Surveillance, đã chỉ ra rằng Tofacitinib (và các thuốc ức chế JAK khác) có liên quan đến việc tăng nguy cơ biến cố tim mạch lớn (MACE) như nhồi máu cơ tim, đột quỵ, và huyết khối (thuyên tắc huyết khối tĩnh mạch và thuyên tắc phổi) so với nhóm thuốc kháng TNF-α, đặc biệt ở nhóm bệnh nhân có nguy cơ cao. Điều này đã dẫn đến các cảnh báo từ FDA và EMA.
Tại sao các lựa chọn khác là sai:
A, C, D: Các tình trạng này không phải là các nguy cơ đặc trưng và đã được cảnh báo rộng rãi như nguy cơ tim mạch và huyết khối của nhóm ức chế JAK.

TÌNH HUỐNG LÂM SÀNG 27
Một phụ nữ 49 tuổi bị viêm khớp dạng thấp (VKDT) nặng, huyết thanh dương tính 15 năm, đến khám vì mắt phải đỏ và đau nhức dữ dội trong 1 tuần. Cơn đau sâu, âm ỉ, lan ra trán và hàm, và đánh thức bà dậy vào ban đêm. Thị lực của bà cũng bị giảm nhẹ. Khám mắt cho thấy tình trạng cương tụ sâu, lan tỏa ở củng mạc, có màu tím sẫm.
Câu 1:
Biến chứng mắt nghiêm trọng nào có khả năng nhất ở bệnh nhân này?
A. Viêm kết mạc do virus
B. Khô mắt 
C. Viêm củng mạc 
D. Glaucoma góc đóng cấp
Đáp án: C
Giải thích: Viêm củng mạc là một biến chứng mắt nghiêm trọng và đau đớn của VKDT, đặc biệt ở những bệnh nhân có bệnh lâu năm và nặng. Nó được đặc trưng bởi đau sâu, nhức nhối, cương tụ sâu ở củng mạc (màu tím sẫm), và có thể gây giảm thị lực. Đây là một dấu hiệu của viêm mạch hệ thống và cần được xử trí tích cực.
Tại sao các lựa chọn khác là sai:
A: Viêm kết mạc thường gây ngứa, cộm, chảy dịch và cương tụ nông ở kết mạc, không gây đau sâu.
B: Khô mắt là biến chứng mắt phổ biến nhất trong VKDT (thường do hội chứng Sjögren thứ phát) nhưng gây cảm giác nóng rát, cộm, chứ không phải đau nhức dữ dội.
D: Glaucoma góc đóng cấp gây đau dữ dội và giảm thị lực nhưng đi kèm với các dấu hiệu khác như nhìn thấy quầng sáng, buồn nôn, và tăng nhãn áp.
Câu 2:
Tình trạng viêm củng mạc này có liên quan chặt chẽ nhất với cơ chế bệnh sinh nào sau đây?
A. Nhiễm trùng cơ hội tại mắt
B. Tăng nhãn áp
C. Viêm mạch máu nhỏ ở củng mạc 
D. Tác dụng phụ của Hydroxychloroquine
Đáp án: C
Giải thích: Viêm củng mạc trong VKDT được coi là một biểu hiện của viêm mạch dạng thấp (rheumatoid vasculitis) tại các mạch máu của củng mạc. Tình trạng viêm mạch này có thể dẫn đến thiếu máu cục bộ và hoại tử củng mạc (viêm củng mạc hoại tử), có nguy cơ gây thủng nhãn cầu và mất thị lực vĩnh viễn.
Tại sao các lựa chọn khác là sai:
A, B: Không phải là cơ chế chính.
D: Hydroxychloroquine gây độc tính võng mạc, không phải viêm củng mạc.
Câu 3:
Cách tiếp cận điều trị phù hợp nhất cho viêm củng mạc liên quan đến VKDT là gì?
A. Chỉ dùng thuốc nhỏ mắt kháng sinh
B. Chỉ dùng thuốc nhỏ mắt corticoid
C. Điều trị bằng thuốc ức chế miễn dịch hệ thống
D. Phẫu thuật laser
Đáp án: C
Giải thích: Vì viêm củng mạc là một biểu hiện của bệnh hệ thống, việc điều trị tại chỗ thường không đủ. Cần phải điều trị bằng các thuốc ức chế miễn dịch hệ thống để kiểm soát tình trạng viêm nền. Các lựa chọn bao gồm glucocorticoid liều cao đường toàn thân, phối hợp với các DMARDs khác như Methotrexate, hoặc các thuốc sinh học (ví dụ: Rituximab, kháng TNF-α).
Tại sao các lựa chọn khác là sai:
A: Kháng sinh không có vai trò trừ khi có bội nhiễm.
B: Thuốc nhỏ mắt corticoid có thể được dùng hỗ trợ trong một số trường hợp viêm thượng củng mạc (episcleritis) nhưng không đủ mạnh và có thể nguy hiểm trong viêm củng mạc hoại tử.
D: Phẫu thuật laser không phải là phương pháp điều trị chính.
Câu 4:
Viêm thượng củng mạc cũng có thể xảy ra ở bệnh nhân VKDT. Dấu hiệu nào giúp phân biệt viêm thượng củng mạc với viêm củng mạc?
A. Viêm thượng củng mạc không bao giờ gây đỏ mắt.
B. Viêm thượng củng mạc gây đau dữ dội hơn viêm củng mạc.
C. Các mạch máu cương tụ trong viêm thượng củng mạc co lại khi dùng thuốc nhỏ mắt phenylephrine.
D. Viêm thượng củng mạc luôn gây giảm thị lực.
Đáp án: C
Giải thích: Viêm thượng củng mạc là tình trạng viêm của lớp mô nông hơn so với viêm củng mạc. Các mạch máu cương tụ là ở lớp thượng củng mạc. Khi nhỏ thuốc co mạch tại chỗ như phenylephrine 2.5%, các mạch máu này sẽ co lại, làm mắt bớt đỏ (blanching). Trong khi đó, các mạch máu củng mạc nằm sâu hơn và sẽ không co lại. Đây là một nghiệm pháp lâm sàng hữu ích để phân biệt.
Tại sao các lựa chọn khác là sai:
A: Viêm thượng củng mạc gây đỏ mắt, nhưng thường là đỏ khu trú và sáng hơn.
B: Viêm thượng củng mạc thường chỉ gây khó chịu nhẹ hoặc không đau, trong khi viêm củng mạc gây đau dữ dội.
D: Viêm thượng củng mạc thường không ảnh hưởng đến thị lực.

TÌNH HUỐNG LÂM SÀNG 28
Một bệnh nhân 51 tuổi được theo dõi VKDT. Tại buổi tái khám, bác sĩ đánh giá hoạt động bệnh để điều chỉnh điều trị. Kết quả ghi nhận như sau:
Số khớp đau (TJC): 8
Số khớp sưng (SJC): 6
Bệnh nhân tự đánh giá mức độ hoạt động bệnh toàn thể (PGA) trên thang VAS 100mm: 60 mm
Tốc độ máu lắng (ESR): 40 mm/giờ
Câu 1:
Dựa trên các thông số trên, chỉ số hoạt động bệnh nào có thể được tính toán?
A. CDAI 
B. DAS28-ESR 
C. RAPID3 
D. Chỉ số Sharp/van der Heijde
Đáp án: B
Giải thích: Chỉ số DAS28-ESR được tính toán dựa trên 4 thành phần: số khớp đau trên 28 khớp, số khớp sưng trên 28 khớp, tốc độ máu lắng (ESR), và đánh giá của bệnh nhân về sức khỏe toàn thể (PGA). Bệnh nhân đã có đủ cả 4 thông số này.
Tại sao các lựa chọn khác là sai:
A: CDAI cũng dùng TJC, SJC, PGA nhưng còn cần thêm đánh giá của bác sĩ về hoạt động bệnh toàn thể (Provider Global Assessment), thông tin này chưa có.
C: RAPID3 chủ yếu dựa vào các bảng câu hỏi do bệnh nhân tự điền (đánh giá chức năng, đau, và sức khỏe toàn thể), không dùng số khớp sưng/đau do bác sĩ đếm.
D: Chỉ số Sharp/van der Heijde là một chỉ số đánh giá tổn thương cấu trúc trên X-quang, không phải là chỉ số hoạt động bệnh.
Câu 2:
Giá trị DAS28-ESR của bệnh nhân này được tính ra là 5.2. Mức độ hoạt động bệnh này được phân loại là gì?
A. Lui bệnh 
B. Hoạt động bệnh mức độ thấp 
C. Hoạt động bệnh mức độ trung bình 
D. Hoạt động bệnh mức độ cao 
Đáp án: D
Giải thích: Theo phân loại mức độ hoạt động bệnh dựa trên DAS28-ESR:
Lui bệnh: DAS28 < 2.6
Hoạt động thấp: 2.6 ≤ DAS28 ≤ 3.2
Hoạt động trung bình: 3.2 < DAS28 ≤ 5.1
Hoạt động cao: DAS28 > 5.1
Với giá trị 5.2, bệnh nhân được phân loại là có hoạt động bệnh mức độ cao. 
Tại sao các lựa chọn khác là sai:
A, B, C: Các lựa chọn này tương ứng với các khoảng điểm DAS28 thấp hơn.
Câu 3:
Mục tiêu chính của chiến lược điều trị "Treat-to-Target" (T2T) trong quản lý VKDT là gì?
A. Giảm đau hoàn toàn cho bệnh nhân bằng mọi giá
B. Đạt được và duy trì trạng thái lui bệnh hoặc hoạt động bệnh mức độ thấp
C. Bình thường hóa hoàn toàn kết quả X-quang
D. Ngừng tất cả các loại thuốc sau 1 năm điều trị
Đáp án: B
Giải thích: Chiến lược T2T trong VKDT có mục tiêu chính là tối đa hóa kết quả lâu dài bằng cách thường xuyên theo dõi hoạt động bệnh và điều chỉnh phác đồ điều trị để đạt được một mục tiêu xác định trước, lý tưởng nhất là lui bệnh hoặc ít nhất là hoạt động bệnh mức độ thấp. Việc này giúp ngăn ngừa tổn thương khớp và duy trì chức năng.
Tại sao các lựa chọn khác là sai:
A: Giảm đau là quan trọng, nhưng việc dùng thuốc giảm đau mạnh "bằng mọi giá" không phải là mục tiêu chính và có thể gây hại. Mục tiêu là kiểm soát viêm.
C: Tổn thương cấu trúc trên X-quang (bào mòn, hẹp khe khớp) một khi đã xảy ra thường không hồi phục hoàn toàn. Mục tiêu là ngăn ngừa tổn thương tiến triển thêm.
D: VKDT là bệnh mạn tính, hầu hết bệnh nhân cần điều trị duy trì lâu dài, thậm chí suốt đời. 
Câu 4:
Một hạn chế của chỉ số DAS28 là gì?
A. Nó quá phức tạp để tính toán trong thực hành lâm sàng.
B. Nó không bao gồm việc đánh giá các khớp ở bàn chân và cổ chân.
C. Nó chỉ có giá trị ở bệnh nhân có huyết thanh dương tính.
D. Nó không tương quan với tiên lượng lâu dài của bệnh.
Đáp án: B
Giải thích: Tên gọi DAS28 cho thấy chỉ số này chỉ đánh giá 28 khớp được xác định trước, bao gồm các khớp ở tay, khuỷu, vai và gối. Nó hoàn toàn bỏ qua các khớp ở bàn chân và cổ chân. Điều này có thể dẫn đến việc đánh giá thấp mức độ hoạt động bệnh ở những bệnh nhân có biểu hiện viêm chủ yếu ở chi dưới.
Tại sao các lựa chọn khác là sai:
A: Mặc dù cần công thức tính, nhiều ứng dụng và công cụ trực tuyến giúp tính toán DAS28 rất nhanh chóng.
C: DAS28 có giá trị để theo dõi hoạt động bệnh ở cả bệnh nhân huyết thanh dương tính và âm tính.
D: DAS28 đã được chứng minh là có tương quan tốt với tình trạng chức năng và tổn thương cấu trúc lâu dài.

TÌNH HUỐNG LÂM SÀNG 29
Một nam bệnh nhân 40 tuổi được chẩn đoán VKDT cách đây 2 tháng. Bệnh nhân có chống chỉ định với Methotrexate do bệnh gan từ trước. Bác sĩ quyết định bắt đầu điều trị bằng Sulfasalazine (Salazopyrine®).
Câu 1:
Chiến lược bắt đầu liều Sulfasalazine nào sau đây là phù hợp nhất để giảm thiểu tác dụng phụ trên đường tiêu hóa?
A. Bắt đầu ngay với liều đích 2 gam/ngày
B. Bắt đầu với liều cao 3 gam/ngày và giảm dần
C. Bắt đầu với liều thấp (ví dụ, 500 mg/ngày) và tăng dần mỗi tuần
D. Dùng một liều tấn công duy nhất 4 gam
Đáp án: C
Giải thích: Sulfasalazine thường gây ra các tác dụng phụ trên đường tiêu hóa như buồn nôn, đau bụng khi bắt đầu điều trị. Để cải thiện khả năng dung nạp, phác đồ chuẩn là bắt đầu với liều thấp (ví dụ: 500 mg một hoặc hai lần mỗi ngày) và tăng liều từ từ sau mỗi tuần cho đến khi đạt được liều đích (thường là 2-3 gam/ngày). 
Tại sao các lựa chọn khác là sai:
A, B, D: Bắt đầu với liều cao ngay lập tức có khả năng cao gây ra các tác dụng phụ không dung nạp, khiến bệnh nhân phải ngừng thuốc.
Câu 2:
Bệnh nhân có tiền sử dị ứng với kháng sinh nào sau đây cần phải rất thận trọng khi sử dụng Sulfasalazine?
A. Penicillin
B. Thuốc nhóm Sulfa (Sulfonamides)
C. Tetracycline
D. Macrolide
Đáp án: B
Giải thích: Sulfasalazine (Salazopyrine®) được cấu tạo từ sự kết hợp giữa 5-aminosalicylic acid (5-ASA) và sulfapyridine.  Sulfapyridine là một hợp chất thuộc nhóm sulfa. Do đó, bệnh nhân có tiền sử dị ứng nặng với các thuốc nhóm sulfa (ví dụ, trimethoprim-sulfamethoxazole) có nguy cơ dị ứng chéo và nên tránh hoặc sử dụng Sulfasalazine một cách rất thận trọng.
Tại sao các lựa chọn khác là sai:
A, C, D: Không có nguy cơ dị ứng chéo giữa các nhóm kháng sinh này với Sulfasalazine.
Câu 3:
Một tác dụng phụ hiếm gặp nhưng nghiêm trọng cần được tư vấn cho bệnh nhân nam khi dùng Sulfasalazine là gì?
A. Tăng huyết áp
B. Giảm khả năng sinh sản có hồi phục 
C. Rụng tóc vĩnh viễn
D. Mất vị giác
Đáp án: B
Giải thích: Sulfasalazine có thể gây ra tình trạng giảm số lượng và khả năng vận động của tinh trùng (oligospermia), dẫn đến vô sinh tạm thời ở nam giới. Tuy nhiên, tình trạng này thường có thể hồi phục hoàn toàn sau khi ngừng thuốc khoảng 2-3 tháng. Đây là một thông tin quan trọng cần tư vấn cho bệnh nhân nam trong độ tuổi sinh sản.
Tại sao các lựa chọn khác là sai:
A, C, D: Đây không phải là các tác dụng phụ đặc trưng của Sulfasalazine.
Câu 4:
Ngoài VKDT, Sulfasalazine còn là một thuốc điều trị hiệu quả cho bệnh lý viêm mạn tính nào sau đây?
A. Hen phế quản
B. Bệnh Crohn
C. Viêm loét đại tràng 
D. Bệnh vảy nến
Đáp án: C
Giải thích: Sulfasalazine là một trong những loại thuốc nền tảng trong điều trị Viêm loét đại tràng mức độ nhẹ đến trung bình. Thành phần 5-ASA của nó có tác dụng chống viêm tại chỗ ở niêm mạc đại tràng, giúp duy trì sự lui bệnh. Nó ít hiệu quả hơn đối với Bệnh Crohn.
Tại sao các lựa chọn khác là sai:
A, D: Sulfasalazine không được chỉ định cho hen phế quản hay bệnh vảy nến.
B: Mặc dù đôi khi được sử dụng, hiệu quả của nó trong Bệnh Crohn (đặc biệt là tổn thương ruột non) kém hơn nhiều so với Viêm loét đại tràng.

TÌNH HUỐNG LÂM SÀNG 30
Một phụ nữ 38 tuổi bị VKDT huyết thanh dương tính 2 năm, đang điều trị bằng Methotrexate 15 mg/tuần và Hydroxychloroquine 400 mg/ngày. Tại buổi tái khám định kỳ, bà không có triệu chứng gì về mắt. Bác sĩ giải thích tầm quan trọng của việc theo dõi tác dụng phụ trên mắt của một trong các loại thuốc bà đang dùng.
Câu 1:
Thuốc nào trong phác đồ hiện tại của bệnh nhân có nguy cơ gây độc tính không hồi phục cho mắt?
A. Methotrexate
B. Hydroxychloroquine
C. Folic acid
D. NSAID (dùng khi cần)
Đáp án: B
Giải thích: Hydroxychloroquine có thể gây ra độc tính trên võng mạc, cụ thể là bệnh võng mạc hình mắt bò (bull's-eye maculopathy), một tình trạng có thể không hồi phục và dẫn đến mất thị lực vĩnh viễn. Nguy cơ tăng lên theo liều dùng hàng ngày (tính theo kg cân nặng thực tế) và tổng liều tích lũy.
Tại sao các lựa chọn khác là sai:
A: Methotrexate có thể gây các tác dụng phụ khác như loét miệng, ức chế tủy, độc gan, nhưng không gây độc tính võng mạc.
C, D: Folic acid và NSAIDs không có liên quan đến bệnh võng mạc.
Câu 2:
Để sàng lọc độc tính trên mắt của Hydroxychloroquine, phương pháp nào được Học viện Nhãn khoa Hoa Kỳ (AAO) khuyến nghị là hiệu quả nhất?
A. Bảng thị lực Snellen
B. Soi đáy mắt trực tiếp
C. Chụp cắt lớp quang học võng mạc (OCT) và kiểm tra thị trường tự động 
D. Đo nhãn áp
Đáp án: C
Giải thích: Các hướng dẫn mới nhất của AAO khuyến nghị sàng lọc bằng các phương pháp khách quan có độ nhạy cao hơn. Chụp OCT có thể phát hiện những thay đổi cấu trúc sớm ở lớp tế bào cảm quang của võng mạc, và kiểm tra thị trường (ví dụ, 10-2) có thể phát hiện các khuyết thị trường cận trung tâm sớm, trước khi bệnh nhân nhận thấy bất kỳ thay đổi nào về thị lực.
Tại sao các lựa chọn khác là sai:
A, B: Bảng thị lực và soi đáy mắt trực tiếp không đủ nhạy để phát hiện những thay đổi sớm. Khi những phương pháp này phát hiện ra bất thường, bệnh thường đã ở giai đoạn tiến triển.
D: Đo nhãn áp dùng để sàng lọc bệnh glaucoma, không liên quan đến độc tính của Hydroxychloroquine.
Câu 3:
Yếu tố nào sau đây làm tăng nguy cơ độc tính võng mạc do Hydroxychloroquine nhiều nhất?
A. Giới tính nam
B. Thời gian điều trị dưới 5 năm
C. Liều dùng hàng ngày > 5 mg/kg cân nặng thực tế
D. Hút thuốc lá
Đáp án: C
Giải thích: Nguy cơ độc tính võng mạc phụ thuộc chặt chẽ vào liều lượng. Các hướng dẫn hiện tại khuyến cáo giữ liều Hydroxychloroquine không quá 5 mg/kg cân nặng thực tế mỗi ngày để giảm thiểu nguy cơ. Các yếu tố nguy cơ khác bao gồm tổng thời gian sử dụng > 5 năm, bệnh thận mạn tính, và bệnh võng mạc có từ trước.
Tại sao các lựa chọn khác là sai:
A: Giới tính không phải là yếu tố nguy cơ.
B: Nguy cơ thấp hơn đáng kể khi thời gian điều trị dưới 5 năm.
D: Hút thuốc là yếu tố nguy cơ của VKDT và bệnh phổi kẽ, nhưng không phải là yếu tố nguy cơ chính của độc tính võng mạc do HCQ.
Câu 4:
Bệnh nhân nên được khám sàng lọc mắt theo lịch trình nào?
A. Chỉ một lần duy nhất trước khi bắt đầu điều trị.
B. Khám lúc bắt đầu điều trị và sau đó hàng năm.
C. Ba tháng một lần trong năm đầu tiên.
D. Mỗi năm năm một lần.
Đáp án: B
Giải thích: Bệnh nhân nên được khám mắt toàn diện (khám ban đầu) trong vòng một năm đầu tiên sau khi bắt đầu dùng Hydroxychloroquine để thiết lập một đường cơ sở. Sau 5 năm điều trị, việc sàng lọc nên được thực hiện hàng năm. Nếu bệnh nhân có các yếu tố nguy cơ cao khác (như liều cao, bệnh thận), việc sàng lọc hàng năm có thể cần bắt đầu sớm hơn.
Tại sao các lựa chọn khác là sai:
A: Một lần khám là không đủ để theo dõi.
C: Ba tháng một lần là không cần thiết và quá tốn kém.
D: Năm năm một lần là quá dài, có thể bỏ lỡ các tổn thương sớm.

TÌNH HUỐNG LÂM SÀNG 31
Một phụ nữ 60 tuổi bị VKDT 10 năm, có nhiều biến dạng khớp và loãng xương nặng (T-score -3.0 ở cột sống), đang điều trị bằng Methotrexate và Prednisone 5 mg/ngày. Bà nhập viện vì đau lưng dữ dội sau khi cố gắng nâng một chậu cây. Bà không có triệu chứng thần kinh như yếu liệt hay rối loạn cơ tròn. Chụp X-quang cột sống cho thấy hình ảnh xẹp đốt sống ngực mới.
Câu 1:
Nguyên nhân có khả năng nhất gây ra tình trạng xẹp đốt sống của bệnh nhân là gì?
A. Di căn ung thư vào xương
B. Gãy xương do loãng xương 
C. Chấn thương do tai nạn giao thông
D. Viêm thân đốt sống do lao
Đáp án: B
Giải thích: Bệnh nhân có nhiều yếu tố nguy cơ cao gây loãng xương: lớn tuổi, nữ giới, bệnh viêm mạn tính (VKDT), và sử dụng glucocorticoid kéo dài. Xẹp đốt sống sau một chấn thương tối thiểu (nâng vật nhẹ) là biểu hiện kinh điển của gãy xương do loãng xương.
Tại sao các lựa chọn khác là sai:
A, D: Có thể xảy ra nhưng ít phổ biến hơn. Bối cảnh lâm sàng không có các dấu hiệu gợi ý ung thư (sút cân) hay lao.
C: Chấn thương của bệnh nhân được mô tả là nhẹ, không tương xứng với một gãy xương thông thường.
Câu 2:
Ngoài việc giảm đau và vật lý trị liệu, liệu pháp dược lý nào sau đây được chỉ định để điều trị bệnh loãng xương và giảm nguy cơ gãy xương trong tương lai cho bệnh nhân này?
A. Tăng liều Prednisone
B. Bổ sung Calcitriol
C. Thuốc nhóm Bisphosphonate (ví dụ, Alendronate)
D. Raloxifene
Đáp án: C
Giải thích: Bisphosphonates là nhóm thuốc chống hủy xương, được coi là lựa chọn đầu tay để điều trị loãng xương ở phụ nữ sau mãn kinh và loãng xương do glucocorticoid. Chúng đã được chứng minh là làm tăng mật độ xương và giảm đáng kể nguy cơ gãy xương cột sống và ngoài cột sống.
Tại sao các lựa chọn khác là sai:
A: Tăng liều Prednisone sẽ làm tình trạng loãng xương tồi tệ hơn.
B: Calcitriol là một dạng hoạt động của vitamin D, thường dành cho bệnh nhân suy thận nặng, không phải là điều trị đầu tay cho loãng xương thông thường.
D: Raloxifene (một SERM) có thể được sử dụng nhưng thường ít hiệu quả hơn Bisphosphonates trong việc tăng mật độ xương hông và chỉ định hẹp hơn.
Câu 3:
Khi tư vấn cho bệnh nhân về cách uống Alendronate, hướng dẫn nào sau đây là quan trọng nhất để đảm bảo hấp thu thuốc tối đa và giảm nguy cơ tác dụng phụ?
A. Uống thuốc cùng với bữa ăn sáng để giảm kích ứng dạ dày.
B. Uống thuốc với một ly sữa đầy để bổ sung canxi.
C. Uống thuốc vào buổi sáng lúc bụng đói với một ly nước đầy và giữ tư thế thẳng đứng trong 30 phút.
D. Uống thuốc ngay trước khi đi ngủ.
Đáp án: C
Giải thích: Bisphosphonates đường uống có sinh khả dụng rất thấp (<1%) và có thể gây kích ứng thực quản nghiêm trọng. Để giải quyết vấn đề này, bệnh nhân phải được hướng dẫn: 1) Uống thuốc lúc bụng đói hoàn toàn (vào buổi sáng) với một ly nước lọc đầy (không phải đồ uống khác); 2) Không ăn, uống, hoặc dùng thuốc khác trong ít nhất 30 phút sau đó; 3) Giữ tư thế thẳng đứng (ngồi hoặc đứng) trong ít nhất 30 phút để ngăn ngừa trào ngược và viêm thực quản.
Tại sao các lựa chọn khác là sai:
A, B: Thức ăn, sữa, hoặc bất kỳ đồ uống nào khác ngoài nước sẽ làm giảm đáng kể sự hấp thu của thuốc.
D: Uống thuốc trước khi đi ngủ làm tăng nguy cơ thuốc đọng lại trong thực quản, gây loét thực quản.
Câu 4:
Một lựa chọn điều trị khác cho bệnh nhân loãng xương nặng không dung nạp hoặc chống chỉ định với Bisphosphonates là Denosumab. Denosumab hoạt động bằng cơ chế nào?
A. Kích thích hoạt động của tế bào tạo xương 
B. Ức chế tái hấp thu canxi ở ống thận
C. Là một kháng thể đơn dòng kháng lại RANKL
D. Thay thế hormone Estrogen
Đáp án: C
Giải thích: Denosumab là một kháng thể đơn dòng hoàn toàn người, có tác dụng gắn vào và ức chế RANKL (Receptor Activator of Nuclear factor Kappa-B Ligand). RANKL là một cytokine thiết yếu cho sự hình thành, hoạt động và tồn tại của các tế bào hủy xương (osteoclasts). Bằng cách ức chế RANKL, Denosumab làm giảm mạnh quá trình hủy xương, từ đó làm tăng mật độ xương và giảm nguy cơ gãy xương.
Tại sao các lựa chọn khác là sai:
A: Đây là cơ chế của các thuốc đồng hóa như Teriparatide (một chất tương tự PTH).
B: Đây là tác dụng của lợi tiểu Thiazide.
D: Đây là cơ chế của liệu pháp hormon thay thế.

TÌNH HUỐNG LÂM SÀNG 32
Một người đàn ông 35 tuổi, đầu bếp, đến khám vì đau và sưng ở khớp cổ tay trái và các khớp bàn ngón tay (MCP) thứ 2, 3 bên phải. Các triệu chứng xuất hiện sau một đợt viêm họng 3 tuần trước. Ông không có tiền sử bệnh khớp. Khám lâm sàng cho thấy viêm khớp không đối xứng, không có tổn thương da hay triệu chứng toàn thân khác.
Câu 1:
Dựa trên tiền sử nhiễm trùng đường hô hấp gần đây và biểu hiện viêm khớp không đối xứng, chẩn đoán phân biệt nào cần được xem xét hàng đầu?
A. Viêm khớp dạng thấp
B. Thấp khớp cấp 
C. Viêm khớp phản ứng 
D. Viêm khớp Gout
Đáp án: C
Giải thích: Viêm khớp phản ứng là một tình trạng viêm khớp vô khuẩn, xảy ra sau một nhiễm trùng ở một nơi khác trong cơ thể (thường là đường sinh dục do Chlamydia hoặc đường tiêu hóa do Salmonella, Shigella, Campylobacter, Yersinia). Nhiễm trùng đường họng do liên cầu cũng có thể là tác nhân. Bệnh đặc trưng bởi viêm một hoặc vài khớp, không đối xứng, thường ở chi dưới nhưng cũng có thể ở chi trên.
Tại sao các lựa chọn khác là sai:
A: VKDT thường đối xứng và diễn tiến mạn tính hơn.
B: Thấp khớp cấp thường có viêm khớp kiểu di chuyển (migratory) và các tiêu chuẩn Jones khác (viêm tim, ban vòng, nốt Meynet).
D: Gout thường khởi phát rất đột ngột, dữ dội và thường ở một khớp (ví dụ, khớp bàn ngón chân cái).
Câu 2:
Ngoài viêm khớp, bộ ba triệu chứng kinh điển của hội chứng Reiter (một dạng của viêm khớp phản ứng) bao gồm những gì?
A. Viêm khớp, viêm niệu đạo và viêm kết mạc
B. Viêm khớp, ban đỏ và sốt
C. Viêm khớp, rụng tóc và loét miệng
D. Viêm khớp, viêm gân và biến dạng ngón
Đáp án: A
Giải thích: Bộ ba kinh điển được mô tả trong hội chứng Reiter là "Can't see, can't pee, can't climb a tree", tương ứng với viêm kết mạc (conjunctivitis), viêm niệu đạo (urethritis), và viêm khớp (arthritis). Mặc dù không phải tất cả bệnh nhân viêm khớp phản ứng đều có đủ bộ ba này, nhưng sự hiện diện của chúng rất gợi ý chẩn đoán.
Tại sao các lựa chọn khác là sai:
B, C, D: Các triệu chứng này có thể gặp trong các bệnh lý khớp viêm khác nhưng không phải là bộ ba kinh điển của hội chứng Reiter.
Câu 3:
Xét nghiệm gen nào sau đây thường dương tính ở một tỷ lệ lớn bệnh nhân bị viêm khớp phản ứng và các bệnh lý cột sống huyết thanh âm tính khác?
A. HLA-DR4
B. HLA-B27
C. HLA-DQ2
D. HLA-A3
Đáp án: B
Giải thích: HLA-B27 là một kháng nguyên bạch cầu người có liên quan chặt chẽ với nhóm bệnh lý cột sống huyết thanh âm tính, bao gồm viêm khớp phản ứng, viêm cột sống dính khớp, và viêm khớp vảy nến. Khoảng 30-50% bệnh nhân viêm khớp phản ứng có HLA-B27 dương tính. Sự hiện diện của nó làm tăng nguy cơ và có thể liên quan đến bệnh mạn tính.
Tại sao các lựa chọn khác là sai:
A: HLA-DR4 có liên quan mạnh mẽ với VKDT, đặc biệt là thể nặng, huyết thanh dương tính.
C: HLA-DQ2 liên quan đến bệnh Celiac.
D: Không có mối liên quan rõ ràng.
Câu 4:
Điều trị ban đầu cho viêm khớp phản ứng cấp tính thường bao gồm thuốc gì?
A. Kháng sinh liều cao
B. Allopurinol
C. Thuốc chống viêm không steroid (NSAIDs)
D. Methotrexate
Đáp án: C
Giải thích: NSAIDs là liệu pháp đầu tay để kiểm soát triệu chứng đau và viêm trong giai đoạn cấp của viêm khớp phản ứng. Hầu hết các bệnh nhân đáp ứng tốt với NSAIDs liều chống viêm.
Tại sao các lựa chọn khác là sai:
A: Kháng sinh chỉ được chỉ định nếu vẫn còn bằng chứng của nhiễm trùng ban đầu đang hoạt động (ví dụ, viêm niệu đạo do Chlamydia). Chúng không có tác dụng điều trị tình trạng viêm khớp tự miễn đã được kích hoạt.
B: Allopurinol dùng cho bệnh gút.
D: Methotrexate và các DMARDs khác được dành cho những trường hợp bệnh trở nên mạn tính và không đáp ứng với NSAIDs hoặc corticoid.

TÌNH HUỐNG LÂM SÀNG 33
Một phụ nữ 65 tuổi, được chẩn đoán viêm khớp dạng thấp (VKDT) 15 năm, có nhiều biến dạng khớp và hạn chế vận động. Bà được chỉ định phẫu thuật thay khớp háng. Để đánh giá khả năng thực hiện các hoạt động hàng ngày và phân loại mức độ tàn phế, bác sĩ sử dụng bảng phân loại chức năng của Hội Thấp khớp học Hoa Kỳ (ACR). Bệnh nhân cho biết bà có thể tự thực hiện các hoạt động chăm sóc cá nhân (ăn uống, mặc quần áo) nhưng không thể đi làm hoặc tham gia các hoạt động giải trí.
Câu 1:
Theo bảng phân loại chức năng của ACR (1992), bệnh nhân này thuộc loại nào?
A. Loại I
B. Loại II
C. Loại III
D. Loại IV
Đáp án: C
Giải thích: Bảng phân loại chức năng của ACR (1992) định nghĩa Loại III là những người có khả năng tự chăm sóc cá nhân nhưng bị hạn chế trong các hoạt động nghề nghiệp và giải trí. Tình trạng của bệnh nhân hoàn toàn phù hợp với mô tả này.
Tại sao các lựa chọn khác là sai:
A: Loại I là hoàn toàn có khả năng thực hiện mọi hoạt động bình thường.
B: Loại II có khả năng thực hiện các hoạt động tự chăm sóc và nghề nghiệp nhưng hạn chế trong các hoạt động giải trí. Bệnh nhân này đã không thể đi làm (hạn chế hoạt động nghề nghiệp).
D: Loại IV là bị hạn chế nặng, có thể phải nằm liệt giường hoặc ngồi xe lăn, hạn chế cả khả năng tự chăm sóc.
Câu 2:
Bệnh nhân có chỉ số hoạt động bệnh DAS28 là 3.1. Mức độ hoạt động bệnh này được phân loại là gì?
A. Lui bệnh 
B. Hoạt động bệnh mức độ nhẹ 
C. Hoạt động bệnh mức độ trung bình 
D. Hoạt động bệnh mức độ cao 
Đáp án: B
Giải thích: Theo thang điểm DAS28, mức độ hoạt động bệnh được phân loại như sau:
< 2.6: Lui bệnh 
2.6 đến ≤ 3.2: Hoạt động bệnh mức độ nhẹ 
> 3.2 đến ≤ 5.1: Hoạt động bệnh mức độ trung bình 
> 5.1: Hoạt động bệnh mức độ cao 
Với chỉ số 3.1, bệnh nhân thuộc nhóm hoạt động bệnh mức độ nhẹ.
Tại sao các lựa chọn khác là sai:
A, C, D: Các lựa chọn này tương ứng với các khoảng điểm DAS28 khác.
Câu 3:
Loại biến dạng nào sau đây ở bàn chân là một di chứng thường gặp trong VKDT lâu năm?
A. Ngón chân hình vòm và gan bàn chân tròn
B. Bàn chân bẹt
C. Ngón cái vẹo ra ngoài 
D. Cả A và C
Đáp án: D
Giải thích: VKDT lâu năm thường gây ra các biến dạng đáng kể ở bàn chân. Tình trạng viêm các khớp bàn ngón chân có thể dẫn đến bán trật khớp, làm cho gan bàn chân mất độ cong và trở nên tròn1010. Đồng thời, tình trạng viêm cũng có thể gây ra ngón chân hình vuốt thú và vẹo ngón chân cái.
Tại sao các lựa chọn khác là sai:
A và C đều đúng, do đó D là câu trả lời đầy đủ nhất.
B: Bàn chân bẹt không phải là biến dạng đặc trưng của VKDT.
Câu 4:
Ngoài phẫu thuật thay khớp, phương pháp điều trị nào sau đây đóng vai trò quan trọng trong việc duy trì chức năng vận động và giảm cứng khớp cho bệnh nhân?
A. Xạ trị liều thấp
B. Phục hồi chức năng và vật lý trị liệu
C. Châm cứu
D. Chỉ dùng thuốc giảm đau mạnh
Đáp án: B
Giải thích: Phục hồi chức năng và vật lý trị liệu là một phần không thể thiếu trong quản lý toàn diện VKDT. Các bài tập phù hợp giúp duy trì tầm vận động khớp, tăng cường sức mạnh cơ bắp hỗ trợ khớp, giảm đau và cứng khớp, từ đó cải thiện chức năng và chất lượng cuộc sống cho người bệnh.
Tại sao các lựa chọn khác là sai:
A: Xạ trị không phải là phương pháp điều trị VKDT.
C: Châm cứu có thể giúp giảm triệu chứng đau ở một số bệnh nhân nhưng không phải là phương pháp điều trị chính để duy trì chức năng vận động.
D: Chỉ dùng thuốc giảm đau sẽ che lấp triệu chứng mà không giải quyết được các vấn đề cơ bản như yếu cơ hay hạn chế tầm vận động.

TÌNH HUỐNG LÂM SÀNG 34
Một nam bệnh nhân 45 tuổi, được chẩn đoán VKDT cách đây 6 tháng, đang điều trị bằng Methotrexate 15mg/tuần. Ông đến khám vì tình trạng bệnh chưa cải thiện, DAS28 là 4.5. Bác sĩ quyết định thêm Sulfasalazine và Hydroxychloroquine vào phác đồ, tạo thành "liệu pháp bộ ba".
Câu 1:
Mục tiêu chính của việc kết hợp ba loại thuốc DMARDs kinh điển này là gì?
A. Giảm nhanh triệu chứng đau trong vòng 24 giờ
B. Tăng hiệu quả kiểm soát bệnh so với đơn trị liệu
C. Giảm tổng liều của Methotrexate
D. Thay thế hoàn toàn cho việc sử dụng corticoid
Đáp án: B
Giải thích: Liệu pháp bộ ba (Methotrexate + Sulfasalazine + Hydroxychloroquine) đã được chứng minh trong nhiều nghiên cứu là có hiệu quả tương đương với phác đồ Methotrexate kết hợp với một số thuốc sinh học kháng TNF-α trong việc kiểm soát hoạt động bệnh và ngăn ngừa tổn thương khớp. Đây là một chiến lược tăng cường hiệu quả khi đơn trị liệu bằng Methotrexate không thành công.
Tại sao các lựa chọn khác là sai:
A: Các thuốc DMARDs đều có tác dụng chậm (từ vài tuần đến vài tháng), không dùng để giảm đau nhanh.
C: Mục tiêu là tăng hiệu quả, không phải giảm liều MTX, trừ khi có tác dụng phụ.
D: Liệu pháp bộ ba có thể giúp giảm nhu cầu sử dụng corticoid, nhưng không phải lúc nào cũng thay thế hoàn toàn được, đặc biệt trong các đợt cấp.
Câu 2:
Tác dụng phụ tiềm tàng nào của Hydroxychloroquine đòi hỏi bệnh nhân phải được theo dõi nhãn khoa định kỳ?
A. Đục thủy tinh thể
B. Tăng nhãn áp
C. Bệnh võng mạc (Retinopathy)
D. Viêm màng bồ đào
Đáp án: C
Giải thích: Hydroxychloroquine có nguy cơ gây độc tính trên võng mạc, một tình trạng có thể không hồi phục và dẫn đến mất thị lực. Do đó, bệnh nhân cần được khám sàng lọc mắt lúc bắt đầu và sau đó là hàng năm (sau 5 năm sử dụng) để phát hiện sớm những thay đổi.
Tại sao các lựa chọn khác là sai:
A, B, D: Đây là các bệnh lý mắt khác, không phải là tác dụng phụ đặc trưng cần theo dõi của Hydroxychloroquine.
Câu 3:
Bệnh nhân này cần được tư vấn rằng Sulfasalazine có thể gây ra tác dụng phụ nào sau đây, đặc biệt là ở những người thiếu men G6PD?
A. Tăng kali máu
B. Hạ đường huyết
C. Tan máu (Hemolysis)
D. Tăng calci máu
Đáp án: C
Giải thích: Sulfasalazine có thể gây ra tan máu, đặc biệt ở những bệnh nhân có thiếu hụt men Glucose-6-phosphate dehydrogenase (G6PD). Do đó, việc sử dụng thuốc này cần thận trọng và nên sàng lọc G6PD ở những quần thể có nguy cơ cao.
Tại sao các lựa chọn khác là sai:
A, B, D: Đây không phải là các tác dụng phụ điển hình của Sulfasalazine.
Câu 4:
Khi bắt đầu liệu pháp bộ ba, bác sĩ cần theo dõi các xét nghiệm nào một cách thường xuyên nhất để đảm bảo an toàn?
A. Công thức máu và chức năng gan
B. Nồng độ hormone tuyến giáp
C. Điện giải đồ và chức năng thận
D. Nồng độ acid uric và lipid máu
Đáp án: A
Giải thích: Cả Methotrexate và Sulfasalazine đều có nguy cơ gây ức chế tủy xương (giảm bạch cầu, thiếu máu, giảm tiểu cầu) và độc tính trên gan (tăng men gan). Do đó, việc theo dõi công thức máu và men gan định kỳ (ví dụ, mỗi 1-3 tháng) là bắt buộc để phát hiện sớm các tác dụng phụ này và điều chỉnh điều trị kịp thời.
Tại sao các lựa chọn khác là sai:
B, C, D: Các xét nghiệm này có thể cần thiết để quản lý các bệnh đi kèm nhưng không phải là theo dõi chính cho các độc tính phổ biến của liệu pháp bộ ba.

TÌNH HUỐNG LÂM SÀNG 35
Một phụ nữ 35 tuổi bị VKDT 3 năm, đang điều trị bằng Methotrexate 20mg/tuần, bệnh vẫn hoạt động ở mức độ cao (DAS28 = 5.8). Bệnh nhân đã thất bại với một thuốc kháng TNF-α trước đó. Bác sĩ xem xét chuyển sang Rituximab.
Câu 1:
Cơ chế tác dụng của Rituximab trong điều trị VKDT là gì?
A. Ức chế tế bào T
B. Ức chế Interleukin-17
C. Gây ly giải tế bào lympho B mang kháng nguyên CD20
D. Trung hòa yếu tố tăng trưởng nội mô mạch máu (VEGF)
Đáp án: C
Giải thích: Rituximab là một kháng thể đơn dòng chimeric, gắn đặc hiệu vào kháng nguyên CD20 trên bề mặt của tế bào lympho B (từ tiền B-cell đến B-cell trưởng thành). Sự gắn kết này kích hoạt các cơ chế miễn dịch gây ra sự ly giải (phá hủy) các tế bào B này, từ đó làm giảm sản xuất tự kháng thể (như RF, anti-CCP) và giảm trình diện kháng nguyên cho tế bào T, giúp kiểm soát quá trình viêm trong VKDT.
Tại sao các lựa chọn khác là sai:
A: Abatacept là thuốc ức chế đồng kích thích tế bào T.
B: Secukinumab là thuốc ức chế IL-17, dùng trong viêm khớp vảy nến và viêm cột sống dính khớp.
D: Bevacizumab là thuốc ức chế VEGF, dùng trong điều trị ung thư.
Câu 2:
Sự hiện diện của yếu tố huyết thanh nào sau đây có thể dự đoán một đáp ứng tốt hơn với Rituximab?
A. Kháng thể kháng nhân (ANA) dương tính
B. Bổ thể C3 và C4 giảm
C. Yếu tố dạng thấp (RF) và/hoặc anti-CCP dương tính
D. CRP tăng rất cao
Đáp án: C
Giải thích: Các nghiên cứu đã chỉ ra rằng những bệnh nhân VKDT có huyết thanh dương tính (RF dương tính và/hoặc anti-CCP dương tính) có xu hướng đáp ứng tốt hơn với liệu pháp làm cạn kiệt tế bào B bằng Rituximab. Điều này là do tế bào B đóng vai trò quan trọng trong việc sản xuất các tự kháng thể này, và việc loại bỏ chúng sẽ ảnh hưởng trực tiếp đến cơ chế bệnh sinh ở nhóm bệnh nhân này.
Tại sao các lựa chọn khác là sai:
A: ANA không phải là yếu tố dự đoán đáp ứng với Rituximab trong VKDT.
B, D: Bổ thể giảm và CRP tăng cao chỉ phản ánh hoạt động bệnh nặng, không phải là yếu tố dự đoán đáp ứng đặc hiệu cho Rituximab so với các thuốc sinh học khác.
Câu 3:
Rituximab được dùng qua đường nào và thường được kết hợp với thuốc nào để tăng hiệu quả?
A. Tiêm dưới da, dùng đơn độc
B. Uống, kết hợp với Leflunomide
C. Truyền tĩnh mạch, kết hợp với Methotrexate
D. Tiêm bắp, kết hợp với Hydroxychloroquine
Đáp án: C
Giải thích: Rituximab được sử dụng qua đường truyền tĩnh mạch (IV infusion), thường gồm hai liều cách nhau 2 tuần, và có thể lặp lại sau mỗi 6-9 tháng. Để đạt hiệu quả tối ưu trong điều trị VKDT, Rituximab được khuyến cáo nên kết hợp với Methotrexate.
Tại sao các lựa chọn khác là sai:
A, B, D: Các đường dùng và các thuốc kết hợp này không đúng với phác đồ chuẩn của Rituximab trong VKDT.
Câu 4:
Một phản ứng không mong muốn có thể xảy ra trong hoặc ngay sau khi truyền Rituximab là gì?
A. Hội chứng ly giải u
B. Phản ứng liên quan đến tiêm truyền 
C. Tăng huyết áp ác tính
D. Suy thận cấp
Đáp án: B
Giải thích: Phản ứng liên quan đến tiêm truyền là tác dụng phụ phổ biến nhất của Rituximab, đặc biệt trong lần truyền đầu tiên. Phản ứng này xảy ra do sự giải phóng cytokine ồ ạt khi các tế bào B bị ly giải. Các triệu chứng có thể bao gồm sốt, ớn lạnh, ngứa, phát ban, khó thở, và thay đổi huyết áp. Để giảm nguy cơ, bệnh nhân thường được dùng thuốc dự phòng trước khi truyền (ví dụ: paracetamol, kháng histamine, và glucocorticoid).
Tại sao các lựa chọn khác là sai:
A: Hội chứng ly giải u là một biến chứng hiếm gặp, chủ yếu thấy ở bệnh nhân ung thư huyết học có gánh nặng khối u lớn.
C, D: Đây không phải là các phản ứng cấp tính phổ biến liên quan đến việc truyền Rituximab.

TÌNH HUỐNG LÂM SÀNG 36
Một phụ nữ 40 tuổi được chẩn đoán viêm khớp dạng thấp (VKDT) cách đây 5 năm. Bà đã được điều trị bằng Meloxicam 15 mg/ngày, Methotrexate (MTX) 10 mg/tuần, và Chloroquine 250 mg/ngày. Trong 3 tháng gần đây, bà bị sưng đau khớp cổ tay hai bên dai dẳng, không cải thiện. Mức độ hoạt động bệnh trung bình.
Câu 1:
Hướng xử trí tiếp theo phù hợp nhất cho bệnh nhân này là gì?
A. Tăng liều Chloroquine 
B. Thay MTX bằng Sulfasalazine 
C. Tăng liều MTX đến liều tối đa dung nạp được 
D. Thêm một thuốc corticoid liều thấp 
Đáp án: C
Giải thích: Bệnh nhân đang dùng MTX ở liều tương đối thấp (10 mg/tuần) và chưa kiểm soát được bệnh. Methotrexate là thuốc nền tảng, và chiến lược đầu tiên khi chưa đáp ứng là tối ưu hóa liều của nó. Liều MTX có thể tăng dần lên đến 20-25 mg/tuần (đường uống hoặc tiêm) để đạt hiệu quả tối đa trước khi cân nhắc thêm hoặc đổi thuốc khác.
Tại sao các lựa chọn khác là sai:
A: Tăng liều Chloroquine ít có khả năng mang lại hiệu quả đáng kể và làm tăng nguy cơ độc tính trên mắt.
B: Thay thế MTX (thuốc hiệu quả nhất) bằng Sulfasalazine (thường ít hiệu quả hơn) không phải là một bước tiến trong điều trị.
D: Thêm corticoid chỉ là giải pháp tạm thời để giảm triệu chứng, không giải quyết được vấn đề kiểm soát bệnh nền không hiệu quả.
Câu 2:
Sau khi tăng liều MTX lên 20 mg/tuần trong 3 tháng, tình trạng bệnh vẫn không cải thiện đáng kể, với chỉ số DAS-28 là 4.8. Chỉ số CRP là 4.7 mg/L. Hướng điều trị tiếp theo tốt nhất là gì?
A. Thêm Sulfasalazine vào phác đồ hiện tại 
B. Cân nhắc bắt đầu một thuốc sinh học 
C. Bỏ MTX và chỉ dùng thuốc sinh học
D. Thêm một đợt corticoid liều cao 
Đáp án: B
Giải thích: Bệnh nhân đã thất bại với liều MTX tối ưu. Với mức độ hoạt động bệnh vẫn còn từ trung bình đến cao (DAS-28 = 4.8), các hướng dẫn điều trị khuyến cáo bước tiếp theo là thêm một thuốc sinh học (ví dụ, kháng TNF-α) hoặc một thuốc DMARDs tổng hợp nhắm đích (ví dụ, ức chế JAK) vào phác đồ MTX.
Tại sao các lựa chọn khác là sai:
A: Thêm Sulfasalazine để tạo thành liệu pháp bộ ba là một lựa chọn, nhưng ở bệnh nhân có hoạt động bệnh cao và đã thất bại với MTX, thuốc sinh học thường mang lại hiệu quả nhanh và mạnh mẽ hơn.
C: Việc kết hợp thuốc sinh học với MTX thường mang lại hiệu quả tốt hơn so với dùng thuốc sinh học đơn độc.
D: Corticoid chỉ là giải pháp tình thế, không phải là chiến lược điều trị lâu dài cho bệnh không đáp ứng.
Câu 3:
Nếu bệnh nhân được bắt đầu điều trị bằng một thuốc kháng TNF-α, cơ chế nào sau đây sẽ bị ức chế?
A. Sản xuất tự kháng thể bởi tế bào B
B. Kích hoạt tế bào T
C. Quá trình tổng hợp các cytokine và phân tử kết dính tiền viêm 
D. Sự hình thành tinh thể acid uric
Đáp án: C
Giải thích: TNF-α là một cytokine trung tâm trong VKDT, có vai trò kích thích các tế bào khác (đại thực bào, tế bào nội mô, tế bào màng hoạt dịch) để sản xuất ra một loạt các chất trung gian gây viêm khác, bao gồm các cytokine (như IL-1, IL-6), chemokines, và các phân tử kết dính. Việc ức chế TNF-α sẽ chặn đứng dòng thác viêm này.
Tại sao các lựa chọn khác là sai:
A: Đây là cơ chế chính của Rituximab (kháng CD20).
B: Đây là cơ chế chính của Abatacept.
D: Đây là cơ chế bệnh sinh của bệnh Gout.
Câu 4:
Bệnh nhân lo ngại về chi phí của thuốc sinh học. Bác sĩ giải thích rằng liệu pháp bộ ba (MTX + Sulfasalazine + Hydroxychloroquine) là một phương án thay thế hiệu quả. Một ưu điểm của liệu pháp bộ ba so với thuốc sinh học là gì?
A. Hiệu quả nhanh hơn
B. Ít tác dụng phụ hơn
C. Chi phí điều trị thấp hơn đáng kể
D. Chỉ cần dùng một lần mỗi tuần
Đáp án: C
Giải thích: Ưu điểm lớn nhất của liệu pháp bộ ba so với các phác đồ có chứa thuốc sinh học là chi phí thấp hơn rất nhiều, trong khi các nghiên cứu lớn (như nghiên cứu TEAR) đã cho thấy hiệu quả gần như tương đương trong một bộ phận lớn bệnh nhân. Điều này làm cho nó trở thành một lựa chọn quan trọng, đặc biệt ở những nơi có nguồn lực hạn chế.
Tại sao các lựa chọn khác là sai:
A: Thuốc sinh học thường có hiệu quả nhanh hơn liệu pháp bộ ba.
B: Liệu pháp bộ ba có phổ tác dụng phụ riêng và bệnh nhân phải uống nhiều loại thuốc, không thể khẳng định là ít tác dụng phụ hơn.
D: Phác đồ này yêu cầu uống thuốc hàng ngày (SSZ, HCQ) và hàng tuần (MTX).

TÌNH HUỐNG LÂM SÀNG 37
Một phụ nữ 28 tuổi đến khám vì xuất huyết tự nhiên dưới da và niêm mạc. Xét nghiệm công thức máu cho thấy Hb: 108 g/l, BC: 12.2 G/L, Tiểu cầu (TC): 10 G/L. Tỷ lệ Prothrombin (PT) là 70%, aPTT bình thường. Tủy đồ cho thấy số lượng mẫu tiểu cầu bình thường, không có tế bào ác tính. Bệnh nhân cũng có đau các khớp nhỏ ở bàn tay.
Câu 1:
Chẩn đoán có khả năng nhất gây ra tình trạng giảm tiểu cầu nặng ở bệnh nhân này là gì?
A. Xuất huyết giảm tiểu cầu miễn dịch (ITP) 
B. Suy tủy xương 
C. Leucemie cấp 
D. Bệnh Hemophilia A 
Đáp án: A
Giải thích: Bệnh nhân có tình trạng giảm tiểu cầu đơn độc và rất nặng (10 G/L) mà không có bất thường ở dòng hồng cầu hay bạch cầu (loại trừ suy tủy, leucemie) và đông máu bình thường (loại trừ DIC). Tủy đồ có số lượng mẫu tiểu cầu bình thường cho thấy tủy xương vẫn sản xuất nhưng tiểu cầu bị phá hủy ở ngoại vi. Đây là bệnh cảnh kinh điển của ITP, một bệnh tự miễn.
Tại sao các lựa chọn khác là sai:
B: Suy tủy xương sẽ gây giảm cả ba dòng tế bào máu.
C: Leucemie cấp thường có các tế bào blast trong máu và tủy xương, và có thể ảnh hưởng đến các dòng tế bào khác.
D: Hemophilia A là bệnh rối loạn đông máu do thiếu yếu tố VIII, gây kéo dài aPTT, số lượng tiểu cầu hoàn toàn bình thường.
Câu 2:
Sự kết hợp giữa viêm khớp và ITP gợi ý một bệnh lý hệ thống tiềm ẩn nào?
A. Viêm khớp dạng thấp (RA)
B. Lupus ban đỏ hệ thống (SLE)
C. Xơ cứng bì
D. Viêm cột sống dính khớp
Đáp án: B
Giải thích: Cả viêm khớp và giảm tiểu cầu miễn dịch đều là những biểu hiện phổ biến của Lupus ban đỏ hệ thống (SLE). Khi một bệnh nhân trẻ có biểu hiện tự miễn ở nhiều hệ cơ quan (khớp và huyết học), SLE phải luôn được đặt lên hàng đầu trong chẩn đoán phân biệt. ITP có thể là biểu hiện đầu tiên của SLE.
Tại sao các lựa chọn khác là sai:
A: Mặc dù VKDT là bệnh tự miễn, nhưng giảm tiểu cầu nặng do miễn dịch ít phổ biến hơn nhiều so với trong SLE.
C, D: Xơ cứng bì và Viêm cột sống dính khớp hiếm khi gây ra ITP.
Câu 3:
Với số lượng tiểu cầu là 10 G/L và có xuất huyết, chỉ định điều trị ban đầu cấp thiết nhất là gì?
A. Truyền khối tiểu cầu đơn độc
B. Cắt lách cấp cứu
C. Glucocorticoid liều cao (ví dụ, Prednisone 1 mg/kg/ngày hoặc Methylprednisolone tĩnh mạch)
D. Theo dõi và chờ đợi
Đáp án: C
Giải thích: Glucocorticoid liều cao là liệu pháp đầu tay cho ITP cấp tính, có triệu chứng. Chúng có tác dụng ức chế hệ miễn dịch, giảm sự phá hủy tiểu cầu bởi các tự kháng thể và tăng sản xuất tiểu cầu. Mục tiêu là nâng số lượng tiểu cầu lên mức an toàn (>20-30 G/L) một cách nhanh chóng.
Tại sao các lựa chọn khác là sai:
A: Truyền tiểu cầu trong ITP thường không hiệu quả vì các tiểu cầu được truyền vào cũng sẽ nhanh chóng bị các tự kháng thể phá hủy. Nó chỉ được dành riêng cho các trường hợp chảy máu đe dọa tính mạng.
B: Cắt lách là một lựa chọn điều trị hàng hai cho các trường hợp kháng trị hoặc tái phát, không phải là điều trị cấp cứu.
D: Với số lượng tiểu cầu < 20-30 G/L và có xuất huyết, việc chờ đợi là rất nguy hiểm do nguy cơ chảy máu nội sọ.
Câu 4:
Xét nghiệm nào sau đây cần được thực hiện để hoàn thiện chẩn đoán bệnh hệ thống nghi ngờ ở bệnh nhân này?
A. Anti-CCP
B. HLA-B27
C. Kháng thể kháng nhân (ANA) và anti-dsDNA 
D. Yếu tố dạng thấp (RF)
Đáp án: C
Giải thích: Để xác định chẩn đoán SLE, cần thực hiện các xét nghiệm tự kháng thể đặc hiệu. ANA là xét nghiệm sàng lọc có độ nhạy cao (dương tính ở >95% bệnh nhân SLE). Nếu ANA dương tính, cần làm tiếp các xét nghiệm đặc hiệu hơn như anti-dsDNA và anti-Sm để xác định chẩn đoán.
Tại sao các lựa chọn khác là sai:
A, D: Anti-CCP và RF dùng để chẩn đoán VKDT.
B: HLA-B27 liên quan đến nhóm bệnh lý cột sống.

TÌNH HUỐNG LÂM SÀNG 38
Một người đàn ông 50 tuổi, có tiền sử viêm khớp dạng thấp (VKDT) 5 năm, được điều trị bằng Methotrexate và Etanercept. Ông nhập viện vì một cơn đau dữ dội và sưng phồng ở bắp chân trái. Khám lâm sàng thấy bắp chân trái sưng to, căng bóng và đau khi sờ nắn. Không có dấu hiệu chấn thương. Siêu âm Doppler mạch máu chi dưới không phát hiện huyết khối tĩnh mạch sâu.
Câu 1:
Chẩn đoán có khả năng nhất cho tình trạng sưng đau bắp chân cấp tính này là gì?
A. Vỡ kén Baker 
B. Viêm mô tế bào 
C. Huyết khối động mạch cấp tính
D. Rách cơ bắp chân
Đáp án: A
Giải thích: Kén Baker (hay kén khoeo chân) là tình trạng thoát vị của bao hoạt dịch khớp gối ra phía sau, thường gặp ở bệnh nhân VKDT do tràn dịch khớp gối mạn tính. Khi kén này bị vỡ, dịch khớp sẽ tràn xuống bắp chân, gây ra một phản ứng viêm cấp tính với các triệu chứng sưng, đau dữ dội, tương tự như huyết khối tĩnh mạch sâu (DVT). Tình trạng này còn được gọi là hội chứng giả huyết khối.
Tại sao các lựa chọn khác là sai:
B: Viêm mô tế bào thường có các dấu hiệu nhiễm trùng tại chỗ như da đỏ, nóng và có thể có đường vào của vi khuẩn.
C: Huyết khối động mạch cấp gây đau dữ dội nhưng thường đi kèm với các dấu hiệu thiếu máu cục bộ cấp như da lạnh, tím, mất mạch.
D: Rách cơ bắp chân thường xảy ra sau một hoạt động gắng sức đột ngột.
Câu 2:
Kỹ thuật chẩn đoán hình ảnh nào là tốt nhất để xác nhận chẩn đoán vỡ kén Baker?
A. X-quang khớp gối
B. Chụp cộng hưởng từ khớp gối và bắp chân
C. Siêu âm khớp và mô mềm
D. Chụp tĩnh mạch cản quang 
Đáp án: C
Giải thích: Siêu âm là một phương pháp nhanh chóng, không xâm lấn và hiệu quả để chẩn đoán kén Baker và tình trạng vỡ kén. Siêu âm có thể xác định được sự tồn tại của kén ở khoeo chân, thấy được dịch tụ ở bắp chân và hình ảnh "cổ" của kén thông với khớp gối. Nó cũng đồng thời giúp loại trừ chẩn đoán phân biệt quan trọng nhất là DVT.
Tại sao các lựa chọn khác là sai:
A: X-quang không thể hiện hình ảnh mô mềm như kén hoạt dịch.
B: MRI rất chính xác nhưng tốn kém hơn và không cần thiết nếu siêu âm đã có thể xác định chẩn đoán.
D: Chụp tĩnh mạch cản quang là một thủ thuật xâm lấn để chẩn đoán DVT và hiếm khi được sử dụng hiện nay.
Câu 3:
Hướng xử trí ban đầu phù hợp nhất cho bệnh nhân này là gì?
A. Phẫu thuật cắt bỏ kén cấp cứu
B. Bất động, gác cao chân, chườm lạnh và dùng thuốc giảm đau
C. Bắt đầu ngay thuốc chống đông Heparin
D. Kháng sinh đường tĩnh mạch
Đáp án: B
Giải thích: Điều trị vỡ kén Baker chủ yếu là điều trị bảo tồn và giảm triệu chứng. Các biện pháp ban đầu bao gồm nghỉ ngơi, gác cao chân để giảm phù nề, chườm lạnh và sử dụng thuốc giảm đau/chống viêm (như NSAIDs hoặc một đợt corticoid ngắn ngày). Tiêm corticoid vào khớp gối để kiểm soát tình trạng viêm nền cũng có thể được xem xét.
Tại sao các lựa chọn khác là sai:
A: Phẫu thuật cắt bỏ kén chỉ được xem xét cho các trường hợp kén rất lớn, gây chèn ép, hoặc tái phát nhiều lần, không phải là điều trị cấp cứu cho vỡ kén.
C: Chống đông được chỉ định cho DVT, nếu dùng cho vỡ kén có thể gây ra hội chứng khoang do chảy máu.
D: Kháng sinh chỉ cần thiết nếu có bằng chứng nhiễm trùng.
Câu 4:
Nguyên nhân gốc rễ dẫn đến sự hình thành kén Baker ở bệnh nhân VKDT là gì?
A. Yếu cơ tứ đầu đùi
B. Sử dụng thuốc sinh học
C. Viêm màng hoạt dịch và tràn dịch khớp gối mạn tính
D. Chấn thương lặp đi lặp lại
Đáp án: C
Giải thích: Kén Baker hình thành do áp lực trong khớp gối tăng cao, đẩy dịch khớp qua một điểm yếu ở bao khớp phía sau. Ở bệnh nhân VKDT, tình trạng viêm màng hoạt dịch (synovitis) dai dẳng dẫn đến sản xuất quá mức dịch khớp (tràn dịch khớp mạn tính), làm tăng áp lực nội khớp và là nguyên nhân chính gây ra kén Baker.
Tại sao các lựa chọn khác là sai:
A: Yếu cơ là hậu quả hơn là nguyên nhân.
B: Thuốc sinh học giúp kiểm soát viêm, do đó có tác dụng ngăn ngừa hoặc làm giảm kích thước kén Baker.
D: Chấn thương có thể gây ra kén Baker nhưng ở bệnh nhân VKDT, nguyên nhân chính là do viêm.

TÌNH HUỐNG LÂM SÀNG 39
Một phụ nữ 33 tuổi, bị VKDT 1 năm, đang điều trị bằng Methotrexate 20 mg/tuần và Etanercept 50 mg/tuần. Cô nhập viện vì sốt, ho khan và khó thở tiến triển nhanh trong 3 ngày. Khám phổi nghe có ran nổ lan tỏa hai bên. Chụp X-quang ngực cho thấy thâm nhiễm kẽ lan tỏa hai bên.
Câu 1:
Tình trạng cấp tính này có nhiều khả năng nhất là do nguyên nhân gì?
A. Bùng phát bệnh phổi kẽ liên quan đến VKDT
B. Viêm phổi do Methotrexate 
C. Suy tim sung huyết
D. Nhiễm nấm Pneumocystis jirovecii (PJP)
Đáp án: B
Giải thích: Viêm phổi do Methotrexate là một phản ứng đặc ứng hiếm gặp nhưng nghiêm trọng, có thể xảy ra bất cứ lúc nào trong quá trình điều trị. Bệnh cảnh kinh điển là khởi phát cấp hoặc bán cấp với các triệu chứng ho khan, khó thở, sốt, và hình ảnh thâm nhiễm kẽ hoặc phế nang lan tỏa trên X-quang.
Tại sao các lựa chọn khác là sai:
A: Bệnh phổi kẽ liên quan đến VKDT thường có diễn tiến mạn tính, kéo dài hàng tháng đến hàng năm, không phải cấp tính trong vài ngày.
C: Suy tim có thể gây khó thở và thâm nhiễm phổi nhưng thường có các dấu hiệu khác như tĩnh mạch cổ nổi, phù ngoại biên.
D: PJP là một nhiễm trùng cơ hội cần được xem xét ở bệnh nhân ức chế miễn dịch. Tuy nhiên, viêm phổi do MTX là một chẩn đoán phân biệt quan trọng và đặc hiệu hơn trong bối cảnh này.
Câu 2:
Bước xử trí quan trọng nhất ngay lập tức cho bệnh nhân này là gì?
A. Bắt đầu kháng sinh phổ rộng
B. Tăng liều Etanercept
C. Ngừng ngay lập tức Methotrexate
D. Cho thuốc lợi tiểu Furosemide
Đáp án: C
Giải thích: Khi nghi ngờ viêm phổi do Methotrexate, bước xử trí đầu tiên và quan trọng nhất là ngừng ngay lập tức thuốc nghi ngờ gây bệnh (Methotrexate). Việc tiếp tục sử dụng thuốc có thể làm tình trạng tổn thương phổi nặng hơn và dẫn đến suy hô hấp không hồi phục.
Tại sao các lựa chọn khác là sai:
A: Kháng sinh sẽ được chỉ định để bao phủ các tác nhân nhiễm trùng có thể xảy ra, nhưng việc ngừng thuốc gây độc là ưu tiên hàng đầu.
B: Tăng liều thuốc ức chế miễn dịch trong bối cảnh tổn thương phổi cấp là nguy hiểm.
D: Lợi tiểu chỉ được chỉ định nếu có bằng chứng của quá tải dịch/suy tim.
Câu 3:
Ngoài việc ngừng thuốc, liệu pháp điều trị chính cho viêm phổi do Methotrexate mức độ nặng là gì?
A. Thuốc kháng virus
B. Liệu pháp oxy và Glucocorticoid liều cao
C. Thuốc giãn phế quản dạng hít
D. Thuốc chống đông
Đáp án: B
Giải thích: Điều trị chính cho viêm phổi do Methotrexate bao gồm chăm sóc hỗ trợ (liệu pháp oxy để duy trì SpO2) và sử dụng Glucocorticoid liều cao (ví dụ, Methylprednisolone tĩnh mạch). Corticoid có tác dụng ức chế phản ứng viêm quá mức ở phổi gây ra bởi thuốc.
Tại sao các lựa chọn khác là sai:
A, C, D: Các liệu pháp này không có vai trò trong việc điều trị cơ chế bệnh sinh của viêm phổi do thuốc.
Câu 4:
Yếu tố nào sau đây được cho là một yếu tố nguy cơ của viêm phổi do Methotrexate?
A. Bệnh nhân trẻ tuổi
B. Bệnh phổi đã có từ trước 
C. Liều Methotrexate hàng tuần thấp (< 7.5 mg)
D. Giới tính nam
Đáp án: B
Giải thích: Bệnh nhân có bệnh phổi từ trước, tuổi cao, và đái tháo đường được cho là có nguy cơ cao hơn bị viêm phổi do Methotrexate. Do đó, cần phải rất thận trọng khi chỉ định MTX cho những đối tượng này và cần đánh giá chức năng phổi ban đầu.
Tại sao các lựa chọn khác là sai:
A, C, D: Tuổi cao, không phải tuổi trẻ, là một yếu tố nguy cơ. Phản ứng này không phụ thuộc vào liều (idiosyncratic) và có thể xảy ra ở cả liều thấp. Không có sự khác biệt rõ ràng về giới tính.

TÌNH HUỐNG LÂM SÀNG 40
Một phụ nữ 75 tuổi đến khám vì đau nhiều khớp, đặc biệt là khớp gối hai bên và các khớp ở bàn tay. Cơn đau có cả đặc điểm cơ học (tăng khi đi lại) và đặc điểm viêm (cứng khớp buổi sáng khoảng 1 giờ, sưng khớp). Bà có chỉ số khối cơ thể (BMI) là 32 kg/m². Chụp X-quang khớp gối cho thấy hẹp khe khớp và gai xương, trong khi X-quang bàn tay cho thấy hình ảnh bào mòn xương ở các khớp bàn ngón tay.
Câu 1:
Tình trạng của bệnh nhân được mô tả chính xác nhất là gì?
A. Chỉ có viêm khớp dạng thấp
B. Chỉ có thoái hóa khớp
C. Viêm khớp dạng thấp và thoái hóa khớp cùng tồn tại
D. Viêm khớp vảy nến
Đáp án: C
Giải thích: Bệnh nhân này có các đặc điểm của cả hai bệnh lý. Đau kiểu cơ học, gai xương ở khớp gối và béo phì là những dấu hiệu của thoái hóa khớp. Trong khi đó, sưng đau các khớp bàn ngón tay, cứng khớp buổi sáng kéo dài và hình ảnh bào mòn xương trên X-quang lại là những đặc điểm kinh điển của viêm khớp dạng thấp. Ở người lớn tuổi, hai bệnh này rất thường cùng tồn tại.
Tại sao các lựa chọn khác là sai:
A, B: Mỗi chẩn đoán đơn lẻ không giải thích được toàn bộ các triệu chứng và dấu hiệu của bệnh nhân.
D: Không có bằng chứng về bệnh vảy nến.
Câu 2:
Đối với thành phần thoái hóa khớp gối của bệnh nhân, lời khuyên nào về thay đổi lối sống là quan trọng nhất?
A. Tăng cường ăn các thực phẩm giàu purine
B. Giảm cân
C. Nghỉ ngơi tại giường hoàn toàn
D. Tránh tất cả các sản phẩm từ sữa
Đáp án: B
Giải thích: Béo phì (BMI > 30) là một yếu tố nguy cơ chính gây ra và làm nặng thêm thoái hóa khớp gối do tăng tải trọng cơ học lên khớp. Giảm cân, thậm chí chỉ một lượng nhỏ, đã được chứng minh là làm giảm đau và cải thiện chức năng một cách đáng kể ở những bệnh nhân này.
Tại sao các lựa chọn khác là sai:
A: Chế độ ăn giàu purine liên quan đến bệnh gút.
C: Nghỉ ngơi hoàn toàn sẽ gây yếu cơ và cứng khớp, làm bệnh nặng hơn.
D: Không có bằng chứng cho thấy các sản phẩm từ sữa làm nặng thêm thoái hóa khớp.
Câu 3:
Trong việc điều trị thành phần viêm khớp dạng thấp, loại thuốc nào sau đây là nền tảng để ngăn ngừa tổn thương khớp tiến triển?
A. Thuốc giảm đau Opioid
B. Thuốc giãn cơ
C. Thuốc chống viêm không steroid (NSAIDs)
D. Thuốc chống thấp khớp thay đổi bệnh (DMARDs)
Đáp án: D
Giải thích: Chỉ có các thuốc DMARDs (như Methotrexate, Sulfasalazine, thuốc sinh học) mới có khả năng can thiệp vào quá trình bệnh sinh của VKDT, làm chậm hoặc ngăn chặn sự phá hủy khớp. Các loại thuốc khác chỉ có tác dụng điều trị triệu chứng.
Tại sao các lựa chọn khác là sai:
A, B, C: Các thuốc này chỉ giúp giảm đau, giãn cơ hoặc giảm viêm tạm thời, chúng không có khả năng ngăn ngừa tổn thương cấu trúc khớp về lâu dài.
Câu 4:
Khi kê đơn NSAID cho bệnh nhân lớn tuổi này, bác sĩ cần đặc biệt lưu ý đến nguy cơ tác dụng phụ trên hệ cơ quan nào nhất?
A. Hô hấp và Mắt
B. Thận và Tiêu hóa
C. Da và Tóc
D. Nội tiết và Gan
Đáp án: B
Giải thích: Người lớn tuổi có nguy cơ cao bị các tác dụng phụ của NSAIDs. Hai hệ cơ quan bị ảnh hưởng nghiêm trọng nhất là thận (gây tổn thương thận cấp, giữ muối nước) và tiêu hóa (gây viêm loét, xuất huyết dạ dày). Do đó, cần sử dụng NSAIDs ở liều thấp nhất có hiệu quả, trong thời gian ngắn nhất có thể và cân nhắc kết hợp với thuốc bảo vệ dạ dày.
Tại sao các lựa chọn khác là sai:
A, C, D: Các tác dụng phụ trên các hệ cơ quan này ít phổ biến và ít nghiêm trọng hơn so với nguy cơ trên thận và tiêu hóa.

TÌNH HUỐNG LÂM SÀNG 41
Một phụ nữ 30 tuổi, bị viêm khớp dạng thấp (VKDT) 2 năm, đến khám vì đau ngực. Bà mô tả cơn đau nhói, tăng lên khi hít sâu và khi nằm ngửa, giảm khi ngồi cúi người ra trước. Khám lâm sàng nghe thấy tiếng cọ màng tim. Điện tâm đồ cho thấy đoạn ST chênh lên lan tỏa và PR chênh xuống.
Câu 1:
Biến chứng tim mạch nào có khả năng nhất ở bệnh nhân này?
A. Nhồi máu cơ tim cấp
B. Viêm màng ngoài tim cấp 
C. Bóc tách động mạch chủ
D. Thuyên tắc phổi
Đáp án: B
Giải thích: Bệnh cảnh lâm sàng rất điển hình cho viêm màng ngoài tim cấp: đau ngực kiểu màng phổi (tăng khi hít sâu), tư thế giảm đau (giảm khi cúi người ra trước), và tiếng cọ màng tim khi nghe. Các thay đổi trên điện tâm đồ (ST chênh lên lan tỏa, PR chênh xuống) cũng là những dấu hiệu kinh điển. Viêm màng ngoài tim là một biểu hiện ngoài khớp có thể xảy ra trong VKDT, đặc biệt là khi bệnh hoạt động.
Tại sao các lựa chọn khác là sai:
A: Nhồi máu cơ tim thường gây đau ngực kiểu đè ép và có ST chênh lên khu trú theo vùng tưới máu của động mạch vành, không lan tỏa.
C: Bóc tách động mạch chủ gây đau dữ dội, như xé, lan ra sau lưng.
D: Thuyên tắc phổi gây khó thở đột ngột và đau ngực kiểu màng phổi nhưng không có tiếng cọ màng tim và có các thay đổi ECG khác (S1Q3T3).
Câu 2:
Phương pháp chẩn đoán hình ảnh ban đầu tốt nhất để xác nhận chẩn đoán và đánh giá mức độ tràn dịch màng ngoài tim là gì?
A. X-quang ngực
B. Siêu âm tim qua thành ngực 
C. Chụp cắt lớp vi tính ngực
D. Chụp cộng hưởng từ tim
Đáp án: B
Giải thích: Siêu âm tim là phương pháp chẩn đoán hình ảnh nhanh chóng, không xâm lấn, và có độ nhạy cao nhất để phát hiện tràn dịch màng ngoài tim, ngay cả với lượng dịch rất nhỏ. Nó cũng cho phép đánh giá các ảnh hưởng huyết động của tràn dịch, ví dụ như các dấu hiệu của ép tim cấp.
Tại sao các lựa chọn khác là sai:
A: X-quang ngực chỉ có thể thấy bóng tim to hình "bình nước" khi lượng dịch rất nhiều (>250ml) và không nhạy cho các trường hợp dịch ít.
C, D: CT và MRI cũng có thể phát hiện tràn dịch nhưng tốn kém hơn, mất nhiều thời gian hơn và thường không cần thiết cho chẩn đoán ban đầu trừ khi nghi ngờ các biến chứng phức tạp.
Câu 3:
Lựa chọn điều trị đầu tay cho viêm màng ngoài tim cấp liên quan đến VKDT (không có biến chứng ép tim) là gì?
A. Thuốc chống đông Heparin
B. Thuốc ức chế men chuyển 
C. Thuốc chống viêm không steroid (NSAIDs) liều cao
D. Phẫu thuật mở cửa sổ màng ngoài tim
Đáp án: C
